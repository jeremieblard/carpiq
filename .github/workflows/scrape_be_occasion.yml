          git add prices_be_v6.json
          git diff --staged --quiet || git commit -m "🤖 Scrape Belgique occasion — Premium [$(date +%Y-%m-%d)]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  scrape-fr-jp:
