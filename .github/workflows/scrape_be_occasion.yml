name: CarPIQ — Scrape Belgique Occasion

on:
  schedule:
    - cron: '0 21 8-14 * 1'
  workflow_dispatch:

jobs:

  scrape-vag:
    name: VAG Group
    runs-on: ubuntu-latest
    timeout-minutes: 340
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Chrome
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update -q
          sudo apt-get install -y google-chrome-stable
      - run: pip install selenium webdriver-manager
      - run: git pull origin main --rebase || true
      - name: Scrape VAG
        run: |
          python3 carpiq_price_scraper_v6.py --country be --brand vw --output prices_be_v6.json
          python3 carpiq_price_scraper_v6.py --country be --brand audi --output prices_be_v6.json
          python3 carpiq_price_scraper_v6.py --country be --brand skoda --output prices_be_v6.json
          python3 carpiq_price_scraper_v6.py --country be --brand seat --output prices_be_v6.json
          python3 carpiq_price_scraper_v6.py --country be --brand cupra --output prices_be_v6.json
          python3 carpiq_price_scraper_v6.py --country be --brand porsche --output prices_be_v6.json
      - name: Commit
        run: |
          git config user.name "CarPIQ Bot"
          git config user.email "bot@carpiq.eu"
          git add prices_be_v6.json
          git diff --staged --quiet || git commit -m "🤖 Scrape Belgique occasion — VAG [$(date +%Y-%m-%d)]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  scrape-premium:
