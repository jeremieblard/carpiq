name: CarPIQ Weekly Price Update

on:
  schedule:
    # Every Monday at 07:00 UTC (09:00 Paris / Genève)
    - cron: "0 7 * * 1"

  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:
    inputs:
      country:
        description: "Country to scrape"
        required: false
        default: "fr"
        type: choice
        options: [fr, ch, de, be]
      test_mode:
        description: "Test mode (3 models only)"
        required: false
        default: false
        type: boolean

env:
  CARPIQ_HTML: carpiq-layer1-v12.html   # ← adjust to your filename
  COUNTRY: ${{ github.event.inputs.country || 'fr' }}

jobs:
  update-prices:
    name: Scrape → Patch → GitHub Pages Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 120   # 2h max (scraping 62 models × 5 ages)

    steps:
      # ── 1. Checkout repo ──────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── 2. Setup Python ───────────────────────────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 3. Scrape prices ──────────────────────────────────────────────────
      - name: Scrape AutoScout24 prices
        run: |
          if [ "${{ github.event.inputs.test_mode }}" = "true" ]; then
            echo "🧪 TEST MODE — 3 models only"
            python3 carpiq_price_scraper.py \
              --country ${{ env.COUNTRY }} \
              --output prices_${{ env.COUNTRY }}.json \
              --test
          else
            echo "🚀 Full scrape — 62 models"
            python3 carpiq_price_scraper.py \
              --country ${{ env.COUNTRY }} \
              --output prices_${{ env.COUNTRY }}.json
          fi

      # ── 4. Check scrape results ───────────────────────────────────────────
      - name: Validate prices.json
        run: |
          python3 -c "
          import json, sys
          with open('prices_${{ env.COUNTRY }}.json') as f:
              data = json.load(f)
          models = data.get('models', {})
          curves = data.get('depr_curves', {})
          scraped = sum(1 for m in models.values() if 'error' not in m)
          print(f'Models scraped: {scraped}/{len(models)}')
          print(f'PT curves: {list(curves.keys())}')
          if scraped < 10:
              print('ERROR: too few models scraped — aborting')
              sys.exit(1)
          print('✅ Prices JSON valid')
          "

      # ── 5. Apply patch to HTML ────────────────────────────────────────────
      - name: Apply price patch to CarPIQ HTML
        run: |
          python3 apply_prices.py \
            --prices prices_${{ env.COUNTRY }}.json \
            --html ${{ env.CARPIQ_HTML }} \
            --out ${{ env.CARPIQ_HTML }}
          echo "✅ HTML patched"

      # ── 6. Commit → GitHub Pages auto-deploys ────────────────────────────
      # No FTP needed — GitHub Pages serves directly from this repo.
      # Every push to main triggers a Pages rebuild automatically.
      - name: Commit updated HTML + prices (triggers GitHub Pages deploy)
        run: |
          git config user.name  "carpiq-bot"
          git config user.email "bot@carpiq.eu"
          git add prices_${{ env.COUNTRY }}.json
          git add ${{ env.CARPIQ_HTML }}
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "chore: weekly price update ${{ env.COUNTRY }} $(date +%Y-%m-%d)"
          git push
          echo "✅ Pushed — GitHub Pages will redeploy carpiq.eu in ~1 min"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 8. Notify on failure ──────────────────────────────────────────────
      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Pipeline failed — check logs at:"
          echo "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          # Optional: add webhook/email notification here
