let _mobileTabIdx = 0;

function initMobileTabs(bestIdx) {
  if(window.innerWidth > 680) return;
  _mobileTabIdx = bestIdx || 0;
  renderMobileTabs();
  initMobileSwipe();
}

function renderMobileTabs() {
  const grid = document.querySelector('.budget-compare-grid');
  if(!grid) return;
  const cols = grid.querySelectorAll('.bc-col');
  if(!cols.length) return;

  // Remove old tab bar if exists
  const oldBar = document.getElementById('mobile-tab-bar');
  if(oldBar) oldBar.remove();
  const oldDots = document.getElementById('mobile-dots');
  if(oldDots) oldDots.remove();

  // Build tab labels from column headers
  const tabLabels = Array.from(cols).map((col,i) => {
    const lbl = col.querySelector('.bc-header-label');
    const sub = col.querySelector('.bc-header-sub');
    const isBest = col.classList.contains('best-col');
    return {
      label: lbl ? lbl.textContent.trim() : (i===0?'Neuf':'Occ'),
      sub: sub ? sub.textContent.trim().replace(/\s*·\s*/g,' ') : '',
      isBest
    };
  });

  // Tab bar HTML
  const tabBar = document.createElement('div');
  tabBar.id = 'mobile-tab-bar';
  tabBar.className = 'mobile-tab-bar';
  tabBar.innerHTML = tabLabels.map((t,i) => `
    <button class="mobile-tab-btn${i===_mobileTabIdx?' active':''}${t.isBest?' best-tab':''}"
      onclick="setMobileTab(${i})">
      ${t.label}
    </button>`).join('');
  grid.parentNode.insertBefore(tabBar, grid);

  // Dots
  const dots = document.createElement('div');
  dots.id = 'mobile-dots';
  dots.className = 'mobile-dots';
  dots.innerHTML = tabLabels.map((_,i) =>
    `<div class="mobile-dot${i===_mobileTabIdx?' active':''}" onclick="setMobileTab(${i})"></div>`
  ).join('');
  grid.parentNode.insertBefore(dots, grid.nextSibling);

  // Show active col
  cols.forEach((col,i) => col.classList.toggle('mobile-active', i===_mobileTabIdx));
}

function setMobileTab(idx) {
  // Suppress stagger animation on tab switch
  document.querySelectorAll('.bc-col').forEach(col=>{
    col.style.animation='none';
    col.style.opacity='1';
    col.style.transform=col.classList.contains('best-col')?'translateY(-6px)':'translateY(0)';
  });
  const grid = document.querySelector('.budget-compare-grid');
  if(!grid) return;
  const cols = grid.querySelectorAll('.bc-col');
  _mobileTabIdx = Math.max(0, Math.min(idx, cols.length-1));

  cols.forEach((col,i) => col.classList.toggle('mobile-active', i===_mobileTabIdx));

  // Update tabs
  document.querySelectorAll('.mobile-tab-btn').forEach((btn,i) =>
    btn.classList.toggle('active', i===_mobileTabIdx));

  // Update dots
  document.querySelectorAll('.mobile-dot').forEach((dot,i) =>
    dot.classList.toggle('active', i===_mobileTabIdx));
}

function initMobileSwipe() {
  const grid = document.querySelector('.budget-compare-grid');
  if(!grid) return;
  let startX = 0, startY = 0;
  grid.addEventListener('touchstart', e => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
  }, {passive:true});
  grid.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - startX;
    const dy = e.changedTouches[0].clientY - startY;
    if(Math.abs(dx) < 40 || Math.abs(dy) > Math.abs(dx)) return;
    const cols = grid.querySelectorAll('.bc-col');
    if(dx < 0) setMobileTab(Math.min(_mobileTabIdx+1, cols.length-1));
    else setMobileTab(Math.max(_mobileTabIdx-1, 0));
  }, {passive:true});
}

// Re-init on resize
window.addEventListener('resize', () => {
  if(window.innerWidth <= 680) {
    const bestCol = document.querySelector('.bc-col.best-col');
    const cols = document.querySelectorAll('.bc-col');
    let bestIdx = 0;
    cols.forEach((c,i) => { if(c.classList.contains('best-col')) bestIdx=i; });
    initMobileTabs(bestIdx);
  } else {
    const oldBar = document.getElementById('mobile-tab-bar');
    if(oldBar) oldBar.remove();
    const oldDots = document.getElementById('mobile-dots');
    if(oldDots) oldDots.remove();
    document.querySelectorAll('.bc-col').forEach(c => c.classList.remove('mobile-active'));
  }
});

</script>
</body>
</html>
