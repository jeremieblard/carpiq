// ── RÉPARATIONS NON PROGRAMMÉES PAR ÂGE (heures main d'oeuvre + pièces)
// Basé sur les taux de défaut TÜV Report 2024 par tranche d'âge
// TÜV 2-3 ans ~4% défauts, 4-5 ans ~7%, 6-7 ans ~11%, 8-9 ans ~15%
// Coût moyen d'une réparation non programmée: ~3h MO + pièces ~200€
// = laborRate × 3 + 200€ pour un véhicule moyen à l'âge de référence
// Probabilité de réparation × coût moyen = coût annuel attendu
// Source: TÜV Report 2024 (taux défaut) + fiches-auto.fr (coût moyen réparation)
const REPAIR_PROB_BY_AGE=[
//  an0   an1   an2   an3   an4   an5   an6   an7   an8   an9   an10
  0.005,0.012,0.020,0.035,0.055,0.080,0.110,0.145,0.185,0.230,0.280
];
// Coût moyen réparation non programmée (pièces + MO, véhicule moyen)
// Source: fiches-auto.fr — vidange+filtres 80€, plaquettes 120€, courroie 400€
// Moyenne pondérée selon fréquence: ~450€ pour réparation "notable'
const AVG_REPAIR_COST_BASE=450;

function repairCost(pt,brand,age){
  const prob=REPAIR_PROB_BY_AGE[Math.min(age,10)];
  const lr=laborRate(brand);
  const partsFactor=lr>100?1.6:lr>90?1.3:lr>80?1.1:1.0;
  // ptFactor: réparations non programmées par motorisation
  // Diesel: FAP (700-1500€), EGR (300-400€), injection HP, turbo (1100-2500€)
  // Source: powersystem-lille.fr, idgarages.com, autobutler.fr
  const ptFactor={ice:1.0,hev:0.9,phev:1.2,bev:0.8,die:1.35}[pt]||1.0;
  const baseCost=AVG_REPAIR_COST_BASE*partsFactor*partsFactor;
  // Diesel: majoration risque FAP selon usage
  // Source: idgarages.com (750€ moyen), techno-car.fr
  const fapRisk=(pt==='die'&&st && st.trips==='short')?Math.round(750/5):
                (pt==='die'&&st && st.trips==='mixed')?Math.round(750/8):
                (pt==='die')?Math.round(750/10):0;
  return Math.round(prob*baseCost*12+fapRisk);
}

// ── ENTRETIEN PROGRAMMÉ ANNUEL (révisions constructeur)
// Source: estimations basées sur intervalles révision constructeurs
// ICE: vidange+filtres ~150€ + révision annuelle ~180€ = ~330€ base
// HEV: moins de vidanges MO mais inspection batterie = ~300€
// PHEV: deux systèmes = ~380€
// BEV: pas d'huile mais freins/liquides/batterie = ~200€
// Ajustement par taux horaire marque
// MAINT_BASE_BY_PT: coût révision programmée annuelle (€) à taux horaire moyen 82€/h
// Sources:
//   ICE: maurelauto.fr "300-600€ essence/an" → moyenne 380€
//   HEV: automobile-propre.com "-40% vs thermique', dbf-autos.fr "250-600€/an" → 265€
//   PHEV: dbf-autos.fr "300-650€/an, légèrement > HEV" → 320€
//   BEV: maurelauto.fr "120-200€/an", engie.fr "120€/an" → 180€
// Note: ne couvre PAS les réparations non programmées (calculées via REPAIR_PROB_BY_AGE)
// Sources: engie.fr "240-420€ révision hybride diesel", maurelauto.fr "300-600€ diesel/an"
// Diesel légèrement > essence ICE (filtre à particules, additif AdBlue, injection haute pression)
const MAINT_BASE_BY_PT={ice:380,hev:265,phev:320,bev:180,die:420};

function annualMaint(pt,brand){
  const base=MAINT_BASE_BY_PT[pt]||330;
  const lr=laborRate(brand);
  // AdBlue diesel: ~15L/15000km à ~1.5€/L = ~35€/an à 15000km/an
  // Source: consommation moyenne AdBlue constructeurs diesel Euro6
  const adblue=pt==='die'?35:0;
  // Majoration si taux horaire élevé (premium)
  const laborMult=lr/82; // 82€ = taux moyen national
  return Math.round(base*laborMult+adblue);
}

// MAINT_MULT: multiplicateur âge sur entretien programmé
// Véhicule âgé = révisions plus fréquentes (courroie, liquides, joints)
// Note: pas de source publique directe — estimation basée sur intervalles constructeur
// An0-2: entretien standard; An3-4: +10-18% (courroies, filtres hab.); An5+: +28%+
const MAINT_MULT=[1,1,1.05,1.10,1.18,1.28,1.42,1.60,1.82,2.10,2.45];
// MAINT_MULT: multiplicateur par âge sur révisions programmées
// Représente la fréquence accrue de remplacement des pièces d'usure
// (courroie de distribution ~an4-5, joints, filtres supplémentaires, amortisseurs)
// ⚠ Estimation sans source publique directe — basé sur intervalles constructeurs
// An0-2: révisions standard · An3-4: +10% (filtres habitacle, liquides) 
// An5: +28% (courroie distribution moyenne) · An8+: +82%+ (moteur vieillissant)

// FIX remplacé par annualMaint() — taux horaire par marque + base PT
function fp(){return FP_BASE}
function insMod(){return AGE_INS[st.age]||1.0}

function bevWinterPen(){
  const wp=getDd().wp/100;
  return 1+(wp*4/12);// weighted 4 winter months
}
function urbanMod(pt){
  // Urban driving penalty: stop-and-go increases ICE/HEV consumption
  // Urban BEV: slightly better ratio EP vs EPU (more charging options)
  const isUrban=st.urban==='city';
  if(!isUrban)return 1.0;
  if(pt==='ice')return 1.14; // stop-and-go +14%
  if(pt==='hev')return 0.92; // HEV excels urban — better than average
  if(pt==='phev')return 0.85; // PHEV urban = mostly electric
  if(pt==='bev')return 1.02; // slight + on kWh but cheaper EP ratio
  return 1.0;
}
function fuelCost(pt,trips,km){
  const c=CONS[trips]||CONS.mixed,h=home(),f=fp();
  const um=urbanMod(pt);
  const wm=wltpMult(pt,trips); // real-world correction by PT + trip type
  if(pt==='ice')return(km/100)*c.ice*WLTP.ice*wm*f*um;
  if(pt==='die'){const fp_die=getFP()*0.88;
    return(km/100)*(c.die||c.ice)*WLTP.die*wm*fp_die*um;}
  if(pt==='hev')return(km/100)*c.hev*WLTP.hev*wm*f*um;
  if(pt==='phev'){
    // PHEV cost depends on charging access — Source: Fraunhofer/EU OBFCM
    // socket=fully charged (55% elec), maybe=partial (mix), street=never charged (×2.5 penalty)
    const cf=phevChargeFactor();
    if(cf>0){
      // Partial to full charging: blend of electric and thermal
      const elecShare=cf*0.55; // socket→55% elec, maybe→33% elec
      return((km*elecShare/100)*c.pon*WLTP.phev*wm*getEP()+
             (km*(1-elecShare)/100)*c.poff*WLTP.phev*wm*f)*um;
    }
    // Uncharged (street/unsure): battery = dead weight, worse than pure ICE
    return(km/100)*c.poff*WLTP.phev*(wm*2.5)*f*um; // uncharged: battery dead weight ×2.5
  }
  if(pt==='bev'){
    // Electricity rate based on charging access + country prices
    // v60.9 BUG FIX : utilisait 'home'/'work' mais form stocke 'socket'/'maybe'/'street'
    // Conséquence v60.8 : tous les BEV étaient calculés en mode "no home charge" même
    // pour les users qui avaient renseigné garage avec prise.
    const ep_home=getEP();   // home rate (€/kWh) — country-aware
    const ep_pub=getEPU();   // public rate (€/kWh) — country-aware
    let r;
    if (st.charging==='socket') {
      // Garage avec prise → 85% home cheap, 15% public (longs trajets)
      r = ep_home*0.85 + ep_pub*0.15;
    } else if (st.charging==='maybe') {
      // Recharge occasionnelle → ~50/50 mix
      r = ep_home*0.50 + ep_pub*0.50;
    } else {
      // 'street' ou indéfini → pas de prise domicile
      // Urbain : 50/50 (souvent quelques bornes locales/au boulot accessibles)
      // Rural : 70% public, 30% home (rare ami/famille avec prise)
      r = st.urban==='city'
        ? ep_pub*0.5 + ep_home*0.5
        : ep_pub*0.7 + ep_home*0.3;
    }
    return(km/100)*c.bev*WLTP.bev*bevWinterPen()*r*um;
  }
  return 0;
}
function tripCost(pt,trips){
  const c=CONS[trips]||CONS.mixed,h=home(),f=fp();
  if(pt==='ice')return(500/100)*c.ice*WLTP.ice*f;
  if(pt==='hev')return(500/100)*c.hev*WLTP.hev*f;
  if(pt==='phev'){const er=h?60:15,pk=Math.max(0,500-er);return(er/100)*c.pon*EP+(pk/100)*c.poff*WLTP.phev*f;}
  if(pt==='bev'){const r=h?EP*.3+EPU*.7:EPU;return(500/100)*c.bev*WLTP.bev*r;}
  return 0;
}
function bevBonus(p){if(p<12000)return 0;if(p<=30000)return 4000;if(p<=47000)return 3000;return 0;}
function incForCar(car,age){
  if(age>0)return 0;
  if(car.pt==='bev')return bevBonus(car.newP);
  if(car.pt==='phev')return car.newP<=50000?1000:0;
  return 0;
}
function calcTCO(pt,newP,brand,age,km){
  const curve=DEPR[pt]||DEPR.ice;
  const idx=Math.min(age,10),sIdx=Math.min(idx+5,10);
  const purchP=Math.round(newP*curve[idx]),saleP=Math.round(newP*curve[sIdx]);
  const depr5=purchP-saleP;
  const yf=fuelCost(pt,st.trips||'mixed',km);
  const maint=Math.round(annualMaint(pt,brand)*MAINT_MULT[idx]*insMod());
  const rep=repairCost(pt,brand,idx);
  const mo=(depr5+(yf+maint+rep)*5)/60;  // sans assurance — calculée séparément
  const risk=(BPROB[pt]||BPROB.ice)[idx];
  return{purchP,saleP,depr5,yf,maint,rep,mo,risk};
}

// Budget mensuel tout compris = TCO + assurance/12 + taxes/12
function calcMonthlyTotal(car, age) {
  const pp   = purchAtAge(car, age);
  const inc  = incForCar(car, age);
  const net  = pp - inc;
  const km   = getKm();
  const tco  = calcTCO(car.pt, car.newP, car.brand, age, km);
  const ins  = calcInsurance(car, net, age);
  const tax  = calcAnnualTax(car, net, age);
  return Math.round(tco.mo + ins / 12 + tax / 12);
}

// GARAGE MODULE (v38)
// ══════════════════════════════════════════════════════════════
// Module garage virtuel : permet a l'utilisateur d'enregistrer ses
// vehicules (manuel, plusieurs vehicules) et de visualiser leur
// valeur actuelle, decote projetee et TCO decompose.
//
// V1 : localStorage (pas d'auth requise).
// V1.5 : sync Supabase via meme API (GarageStore reste identique).
//
// Schema vehicule :
//   {
//     id: 'uuid',
//     modelId: 'bmw_330e',     // reference vers DB (peut etre null si absent)
//     snapshot: {brand, name, pt, segment, newP},  // backup si DB change
//     year: 2021,
//     km: 45000,
//     purchasePrice: 38000,
//     purchaseYear: 2022,
//     country: 'ch',

//     createdAt, updatedAt

const GarageStore = {
  KEY: 'carpiq_garage_v1',

  _read() {
    try {
      const raw = localStorage.getItem(this.KEY);
      return raw ? JSON.parse(raw) : [];
    } catch (e) {
      console.warn('[GarageStore] read error:', e);
      return [];
    }
  },

  _write(items) {
    try {
      localStorage.setItem(this.KEY, JSON.stringify(items));
      return true;
    } catch (e) {
      console.warn('[GarageStore] write error:', e);
      return false;
    }
  },

  list() {
    return this._read();
  },

  get(id) {
    return this._read().find(v => v.id === id) || null;
  },

  add(vehicle) {
    const items = this._read();
    const id = (crypto.randomUUID && crypto.randomUUID()) ||
               ('v_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8));
    const now = new Date().toISOString();
    const v = Object.assign({}, vehicle, {
      id, createdAt: now, updatedAt: now
    });
    items.push(v);
    this._write(items);
    return v;
  },

  update(id, patch) {
    const items = this._read();
    const idx = items.findIndex(v => v.id === id);
    if (idx === -1) return null;
    items[idx] = Object.assign({}, items[idx], patch, {
      updatedAt: new Date().toISOString()
    });
    this._write(items);
    return items[idx];
  },

  remove(id) {
    const items = this._read().filter(v => v.id !== id);
    return this._write(items);
  },

  clear() {
    return this._write([]);
  },

  count() {
    return this._read().length;
  },
};

// ── Resolve vehicle to DB entry (avec fallback snapshot si modelId disparu)
function garageResolveCar(vehicle) {
  // v39 priority order:
  //   1. Grid identity (gridBrand + gridSlug + gridPt) — most precise, allows GBM L1
  //   2. modelId in DB (legacy v38)
  //   3. snapshot (degraded mode, e.g. DB shrunk, grid changed)

  // --- Priority 1 : grid identity ---
  if (vehicle.gridBrand && vehicle.gridSlug && vehicle.gridPt) {
    // Build a car-like object that purchAtAge will map to the grid via AS24_MODEL_BASE
    // We need a stable id for AS24_MODEL_BASE lookup; we use a synthetic "garage_<slug>" but
    // also patch the grid lookup directly via the gridBrand/gridSlug if available.
    return {
      // Synthetic id with marker so purchAtAge knows to use vehicle's grid identity
      id: '_garage_' + vehicle.gridBrand + '_' + vehicle.gridSlug,
      brand: vehicle.gridBrand,
      pt: vehicle.gridPt,
      // newP: best-effort — try to estimate from grid at age=0
      newP: garageEstimateNewPrice(vehicle.gridBrand, vehicle.gridSlug, vehicle.gridPt, vehicle.country) || 30000,
      seg: [(vehicle.snapshot && vehicle.snapshot.segment) || 'compact'],
      // Mark this is a "garage-resolved" car to short-circuit AS24_MODEL_BASE lookup in purchAtAge
      _garageGridId: vehicle.gridBrand + '/' + vehicle.gridSlug,
    };
  }

  // --- Priority 2 : DB lookup ---
  if (vehicle.modelId && typeof DB !== 'undefined') {
    const car = DB.find(c => c.id === vehicle.modelId);
    if (car) return car;
  }

  // --- Priority 3 : snapshot fallback ---
  if (vehicle.snapshot) {
    return Object.assign({}, vehicle.snapshot, {
      id: vehicle.modelId || ('snapshot_' + vehicle.id),
    });
  }
  return null;
}

// v39 : estime le newP à partir de la grille à age=0 (si dispo)
function garageEstimateNewPrice(brand, slug, pt, country) {
  if (typeof priceGridData === 'undefined' || !priceGridData) return null;
  const mid = brand + '/' + slug;
  const m = priceGridData[mid];
  if (!m) return null;
  const ptData = m[pt];
  if (!ptData) return null;
  const c = country || (typeof activeCountry !== 'undefined' ? activeCountry : 'fr');
  const cdata = ptData[c] || ptData[Object.keys(ptData)[0]];
  if (!cdata) return null;
  // age=0 km=0 = closest to "new"
  const a0 = cdata['0'] || cdata[Object.keys(cdata).sort((a,b)=>parseInt(a)-parseInt(b))[0]];
  if (!a0) return null;
  const kms = Object.keys(a0).map(Number).sort((a,b)=>a-b);
  return a0[String(kms[0])];
}

// ── Calculer l'age du vehicule en annees
function garageAge(vehicle) {
  const currentYear = new Date().getFullYear();
  return Math.max(0, currentYear - (vehicle.year || currentYear));
}

// ── Valeur actuelle (utilise purchAtAge cascade L1/L2/L3)
function garageCurrentValue(vehicle) {
  const car = garageResolveCar(vehicle);
  if (!car) return null;
  const age = garageAge(vehicle);
  // purchAtAge se base sur "country" via activeCountry global, mais on peut
  // surcharger pour le garage si vehicle.country est defini.
  const savedCountry = (typeof activeCountry !== 'undefined') ? activeCountry : null;
  if (vehicle.country && typeof activeCountry !== 'undefined') {
    activeCountry = vehicle.country;
  }
  let value;
  try {
    value = (typeof purchAtAge === 'function') ? purchAtAge(car, age) : null;
  } finally {
    if (savedCountry !== null) activeCountry = savedCountry;
  }
  // v60.5 : engine delta lu en LIVE depuis le catalog (au lieu du snapshot stocké).
  // Permet aux mises à jour du catalog de prendre effet sans re-save du véhicule.
  const eDelta = getEngineDeltaLive(vehicle);
  if (value && eDelta && Math.abs(eDelta) > 0.1) {
    value = Math.round(value * (1 + eDelta / 100));
  }
  return value;
}

// v60.5 : lecture en temps réel du engine_delta depuis le catalog
// (fallback sur vehicle.engineDeltaPct si catalog inaccessible)
function getEngineDeltaLive(vehicle) {
  if (!vehicle || !vehicle.engineCode) return 0;
  if (typeof vehicleCatalogData === 'undefined' || !vehicleCatalogData || !vehicleCatalogData.catalog) {
    return vehicle.engineDeltaPct || 0;
  }
  const brand = vehicle.gridBrand;
  const slug  = vehicle.gridSlug;
  const pt    = vehicle.gridPt;
  if (!brand || !slug || !pt) return vehicle.engineDeltaPct || 0;
  const entry = Object.values(vehicleCatalogData.catalog).find(e =>
    e && e.brand === brand && e.model_family === slug &&
    e.engines_observed && e.engines_observed[pt]
  );
  if (!entry) return vehicle.engineDeltaPct || 0;
  const eng = (entry.engines_observed[pt] || []).find(x => x.code === vehicle.engineCode);
  return eng ? (eng.delta_pct || 0) : (vehicle.engineDeltaPct || 0);
}

// v35 : fallback L2 — applique une courbe de depreciation derivee empiriquement
// Retourne null si pas de donnee pour ce couple (tier, pt, country, age, km).
function deprRatioBySegment(car, age, kmTotal, country) {
  if (!deprCurvesData) return null;
  if (age === 0) return 1.0;

  const tier = BRAND_TIER_MAP[car.brand] || 'mainstream';
  const pt = (car.pt || 'ice').toLowerCase();
  // Try country-specific first, then cross-country fallback via '_any'
  const tierData = deprCurvesData[tier];
  if (!tierData) return null;
  const ptData = tierData[pt];
  if (!ptData) return null;
  const countryData = ptData[country] || ptData['_any'];
  if (!countryData) return null;

  // Bilinear interp on (age, km)
  const AGES = [0,1,2,3,4,5];
  const KMS = [0,10000,25000,50000,75000,100000,150000,200000];
  const clampedAge = Math.max(0, Math.min(age, 5));
  const clampedKm = Math.max(0, Math.min(kmTotal, 200000));

  function bracket(arr, v){
    if (v <= arr[0]) return [arr[0], arr[0]];
    if (v >= arr[arr.length-1]) return [arr[arr.length-1], arr[arr.length-1]];
    for (let i=0; i<arr.length-1; i++) {
      if (v >= arr[i] && v <= arr[i+1]) return [arr[i], arr[i+1]];
    }
    return [arr[0], arr[0]];
  }
  const [a1, a2] = bracket(AGES, clampedAge);
  const [k1, k2] = bracket(KMS, clampedKm);
  const d1 = countryData[a1];
  const d2 = countryData[a2];
  if (!d1 || !d2) return null;
  const v11 = d1[k1], v12 = d1[k2], v21 = d2[k1], v22 = d2[k2];
  if (v11 == null || v12 == null || v21 == null || v22 == null) return null;
  function lerp(x, x1, x2, y1, y2){ return x1===x2 ? y1 : y1 + (x-x1)*(y2-y1)/(x2-x1); }
  const r1 = lerp(clampedKm, k1, k2, v11, v12);
  const r2 = lerp(clampedKm, k1, k2, v21, v22);
  return lerp(clampedAge, a1, a2, r1, r2);
}

// v34/v35 : prix predits en CASCADE :
//   L1 : prediction GBM specifique au modele (price_grid)
//   L2 : courbe derivee par segment (depr_curves) — fallback si modele absent
//   L3 : courbe statique DEPR[pt] + brandMult — fallback ultime
//
// Mapping CarPIQ id -> price_grid id via AS24_MODEL_BASE.
function purchAtAge(car, age){
  // Fallback immediat si age=0 (neuf) -> newP direct
  if (age === 0) return car.newP;

  const country = (typeof activeCountry !== 'undefined') ? activeCountry : 'fr';
  const kmAnnual = (typeof getKm === 'function') ? getKm() : 15000;
  const kmTotal = kmAnnual * age;

  // ── L1 : prediction GBM specifique au modele ───────────────
  if (typeof priceGridReady === 'function' && priceGridReady()) {
    let gridId;
    // v39 : if car has _garageGridId (synthetic from garage), use it directly
    // (court-circuite AS24_MODEL_BASE qui n'existe pas pour ces cars synthétiques)
    if (car._garageGridId) {
      gridId = car._garageGridId;
    } else if (typeof AS24_MODEL_BASE !== 'undefined') {
      const key = (car.brand || '') + ':' + (car.id || '');
      const slug = AS24_MODEL_BASE[key] || car.id;
      gridId = (car.brand || '') + '/' + slug;
    } else {
      gridId = null;
    }
    if (gridId) {
      const pt = (car.pt || 'ice').toLowerCase();
      const predicted = predictPrice(gridId, pt, country, age, kmTotal);
      if (predicted && predicted > 0) return predicted;
    }
  }

  // ── L2 : courbe derivee par (tier, pt, country) ────────────
  if (deprCurvesData) {
    const ratio = deprRatioBySegment(car, age, kmTotal, country);
    if (ratio && ratio > 0) {
      return Math.round(car.newP * ratio);
    }
  }

  // ── L3 : fallback statique (courbe DEPR + brandMult) ───────
  return purchAtAgeStatic(car, age);
}

// ── Bilinear interpolation on (age, km) for quantile grid
function _bilinearQuantile(cells, age, km, q) {
  const AGES = Object.keys(cells).map(Number).sort((a,b)=>a-b);
  if (AGES.length === 0) return null;
  const KMS_RAW = cells[AGES[0]] ? Object.keys(cells[AGES[0]]).map(Number).sort((a,b)=>a-b) : [];
  if (KMS_RAW.length === 0) return null;

  const clampedAge = Math.max(AGES[0], Math.min(age, AGES[AGES.length-1]));
  const clampedKm = Math.max(KMS_RAW[0], Math.min(km, KMS_RAW[KMS_RAW.length-1]));

  function bracket(arr, v){
    if (v <= arr[0]) return [arr[0], arr[0]];
    if (v >= arr[arr.length-1]) return [arr[arr.length-1], arr[arr.length-1]];
    for (let i=0; i<arr.length-1; i++) {
      if (v >= arr[i] && v <= arr[i+1]) return [arr[i], arr[i+1]];
    }
    return [arr[0], arr[0]];
  }
  const [a1, a2] = bracket(AGES, clampedAge);
  const [k1, k2] = bracket(KMS_RAW, clampedKm);
  const c11 = cells[a1] && cells[a1][k1];
  const c12 = cells[a1] && cells[a1][k2];
  const c21 = cells[a2] && cells[a2][k1];
  const c22 = cells[a2] && cells[a2][k2];
  if (!c11 || !c12 || !c21 || !c22) return null;
  const v11 = c11[q], v12 = c12[q], v21 = c21[q], v22 = c22[q];
  if (v11 == null || v12 == null || v21 == null || v22 == null) return null;
  function lerp(x, x1, x2, y1, y2){ return x1===x2 ? y1 : y1 + (x-x1)*(y2-y1)/(x2-x1); }
  const r1 = lerp(clampedKm, k1, k2, v11, v12);
  const r2 = lerp(clampedKm, k1, k2, v21, v22);
  return Math.round(lerp(clampedAge, a1, a2, r1, r2));
}

// ── Predict at a specific quantile (p10, p50, p90)
function predictPriceQuantile(modelId, pt, country, age, km, q) {
  if (!priceGridQData) return null;
  const m = priceGridQData[modelId];
  if (!m) return null;
  const ptData = m[pt];
  if (!ptData) return null;
  const countryData = ptData[country];
  if (!countryData) {
    // Fallback: try any country if specific not found (rare)
    const firstCountry = Object.keys(ptData)[0];
    if (!firstCountry) return null;
    return _bilinearQuantile(ptData[firstCountry], age, km, q);
  }
  return _bilinearQuantile(countryData, age, km, q);
}

// ══════════════════════════════════════════════════════════════
// PROJECTION CONE (v38 Phase B)
// ══════════════════════════════════════════════════════════════
// Pour un véhicule donné, projette sa valeur sur N années à venir
// avec quantiles p10/p50/p90 issus du GBM.
// Si quantiles indisponibles, fallback heuristique (±8% à année 0,
// +2% par année supplémentaire).
//
// Retourne un tableau de points :
//   [{yearOffset, year, age, km, p10, p50, p90, source}, ...]
function projectValueCone(vehicle, yearsAhead) {
  yearsAhead = yearsAhead || 5;
  const car = garageResolveCar(vehicle);
  if (!car) return [];

  const currentAge = garageAge(vehicle);
  const annualKm = vehicle.annual_km || 15000;
  const country = vehicle.country || (typeof activeCountry !== 'undefined' ? activeCountry : 'fr');
  const pt = (car.pt || 'ice').toLowerCase();

  // v39 : if synthetic garage car, use _garageGridId directly
  let gridId;
  if (car._garageGridId) {
    gridId = car._garageGridId;
  } else {
    const key = (car.brand || '') + ':' + (car.id || '');
    let slug = (typeof AS24_MODEL_BASE !== 'undefined' && AS24_MODEL_BASE[key]) || car.id;
    gridId = (car.brand || '') + '/' + slug;
  }

  const points = [];
  for (let dy = 0; dy <= yearsAhead; dy++) {
    const age = currentAge + dy;
    const km = (vehicle.km || 0) + annualKm * dy;
    const year = (new Date().getFullYear()) + dy;

    // v60.3 : Toujours utiliser purchAtAge pour la médiane (même source que
    // garageCurrentValue, donc cohérent avec le top "Valeur actuelle").
    // Le quantile grid (price_grid_q.json) n'est PAS mis à jour par le smoothing
    // bayésien, donc on ne s'y fie plus pour la médiane.
    const median = (typeof purchAtAge === 'function') ? purchAtAge(car, age) : null;
    if (median == null) continue;

    // Bounds IC : préfère le quantile grid si dispo (cone réaliste depuis training),
    // sinon heuristique ±(8% + 2%/an)
    let lower, upper, source;
    const p10q = (typeof predictPriceQuantile === 'function') ? predictPriceQuantile(gridId, pt, country, age, km, 'p10') : null;
    const p50q = (typeof predictPriceQuantile === 'function') ? predictPriceQuantile(gridId, pt, country, age, km, 'p50') : null;
    const p90q = (typeof predictPriceQuantile === 'function') ? predictPriceQuantile(gridId, pt, country, age, km, 'p90') : null;
    if (p10q != null && p50q != null && p90q != null && p50q > 0) {
      // Scale bounds proportionally around OUR median (preserve IC width relative to p50)
      lower = Math.round(median * (p10q / p50q));
      upper = Math.round(median * (p90q / p50q));
      source = 'gbm_scaled';
    } else {
      const uncertaintyPct = 0.08 + 0.02 * dy;
      lower = Math.round(median * (1 - uncertaintyPct));
      upper = Math.round(median * (1 + uncertaintyPct));
      source = 'heuristic';
    }

    points.push({
      yearOffset: dy,
      year: year,
      age: age,
      km: km,
      p10: lower,
      p50: median,
      p90: upper,
      source: source,
    });
  }

  // v60.3 : applique engine_delta_pct cohérent avec garageCurrentValue / decomposeTcoMonthly
  // Sans ce fix, le chart montre la médiane catalog (sans variante engine) alors que
  // le top "Valeur actuelle" applique la variante → discordance visuelle.
  const eDelta = getEngineDeltaLive(vehicle);
  if (eDelta && Math.abs(eDelta) > 0.1) {
    const mult = 1 + eDelta / 100;
    for (let i = 0; i < points.length; i++) {
      points[i].p10 = Math.round(points[i].p10 * mult);
      points[i].p50 = Math.round(points[i].p50 * mult);
      points[i].p90 = Math.round(points[i].p90 * mult);
    }
  }

  return points;
}

function phevFuelBoth(km){
  const tr=st.trips||'mixed';
  const cv=CONS[tr]||CONS.mixed;
  const wm=wltpMult('phev',tr);
  const f=fp();
  const cf=phevChargeFactor();
  // Scenario A: daily charger — 55% electric, 45% thermal
  const fcA=(km*.55/100)*cv.pon*WLTP.phev*wm*getEP()+(km*.45/100)*cv.poff*WLTP.phev*wm*fp();
  // Scenario B: partial charger — 33% electric, 67% thermal
  const fcMaybe=(km*.33/100)*cv.pon*WLTP.phev*wm*getEP()+(km*.67/100)*cv.poff*WLTP.phev*wm*fp();
  // Scenario C: never charges — battery dead weight ×2.5
  const fcB=(km/100)*cv.poff*WLTP.phev*(wm*2.5)*f;
  // fcA/fcB are already annual costs (km = annual km)
  return{
    charged:Math.round(fcA),
    partial:Math.round(fcMaybe),
    uncharged:Math.round(fcB),
    current:Math.round(cf>0.8?fcA:cf>0?fcMaybe:fcB),
    isCharged:cf>0.8,isPartial:cf>0&&cf<=0.8,isUncharged:cf===0
  };
}


function purchPriceAtAge(car,age){

  // Note historique : cette fonction etait "sans multiplicateur marque".

  if (age === 0) return car.newP;
  const country = (typeof activeCountry !== 'undefined') ? activeCountry : 'fr';
  const kmAnnual = (typeof getKm === 'function') ? getKm() : 15000;
  const kmTotal = kmAnnual * age;

  // L1
  if (typeof priceGridReady === 'function' && priceGridReady() &&
      typeof AS24_MODEL_BASE !== 'undefined') {
    const key = (car.brand || '') + ':' + (car.id || '');
    const slug = AS24_MODEL_BASE[key] || car.id;
    const gridId = (car.brand || '') + '/' + slug;
    const pt = (car.pt || 'ice').toLowerCase();
    const predicted = predictPrice(gridId, pt, country, age, kmTotal);
    if (predicted && predicted > 0) return predicted;
  }
  // L2
  if (deprCurvesData) {
    const ratio = deprRatioBySegment(car, age, kmTotal, country);
    if (ratio && ratio > 0) return Math.round(car.newP * ratio);
  }
  // L3 : static SANS mult marque (comportement historique de cette fonction)
  return Math.round(car.newP*(DEPR[car.pt]||DEPR.ice)[Math.min(age,10)]);
}

function getBodySegs(){
  if(!st.body.length)return[];
  // st.body contient: base (mini/small/saloon/coupe) + mods (suv/break/awd)
  const bases=st.body.filter(b=>SEG_MAP[b]);
  const mods=st.body.filter(b=>MOD_MAP[b]);
  if(!bases.length)return[]; // rien de sélectionné
  // Récupérer les seg DB pour chaque base
  let segs=new Set(bases.flatMap(b=>SEG_MAP[b]||[]));
  // Chaque mod filtre/enrichit les résultats
  if(mods.includes('suv')){
    // SUV: remplacer les segs de base par leurs équivalents SUV
    const suv_segs=new Set();
    if(bases.includes('mini')||bases.includes('small'))suv_segs.add('suv_urban'),suv_segs.add('suv_compact');
    if(bases.includes('saloon'))suv_segs.add('suv_compact'),suv_segs.add('suv_family');
    segs=suv_segs;
  }
  if(mods.includes('break')){
    // Break: ajouter variantes break aux segs existants
    const break_segs=new Set(segs);
    if(segs.has('small'))break_segs.add('small_break');
    if(segs.has('compact')||segs.has('saloon'))break_segs.add('compact_break'),break_segs.add('saloon_break');
    segs=break_segs;
  }
  if(mods.includes('awd')){
    // AWD: ajouter uniquement les voitures avec intégrale dans les segs sélectionnés
    const awd_segs=new Set([...segs,'suv_compact','suv_family']);
    segs=awd_segs;
  }
  return [...segs];
}

}

// ──────────────────────────────────────────────────────────────
// v53 : Pipeline d'assouplissement progressif
// ──────────────────────────────────────────────────────────────
// Quand "premium + saloon + budget X" donne 0 résultat, on relâche progressivement :
//   Niveau 0 : strict (segment + driver respectés)
//   Niveau 1 : segment élargi famille proche (saloon → +saloon_break +coupe_sport)
//   Niveau 2 : segment élargi large (+ compact, compact_break, suv_compact)
//   Niveau 3 : driver descendu (premium → ratio)
//   Niveau 4 : aucun match possible
// ──────────────────────────────────────────────────────────────

function _expandSegments(baseSegs, level) {
  // baseSegs : segments demandés à l'origine (ex: ['saloon'])
  // level 0 : tels quels
  // level 1 : ajouter saloon_break + coupe_sport pour segments saloon/executive
  //           ajouter compact_break pour compact, etc.
  // level 2 : ajouter compact + compact_break + suv_compact (élargi)
  if (!baseSegs || baseSegs.length === 0) return [];
  const set = new Set(baseSegs);
  if (level >= 1) {
    if (set.has('saloon') || set.has('executive')) {
      set.add('saloon_break');
      set.add('coupe_sport');
    }
    if (set.has('compact')) {
      set.add('compact_break');
    }
    if (set.has('small')) {
      set.add('small_break');
    }
  }
  if (level >= 2) {
    if (set.has('saloon') || set.has('executive')) {
      set.add('compact');
      set.add('compact_break');
      set.add('suv_compact');
    }
    if (set.has('compact') || set.has('compact_break')) {
      set.add('suv_urban');
      set.add('suv_compact');
      set.add('small');
    }
  }
  return Array.from(set);
}

function _relaxedDriver(currentDriver) {
  // premium → ratio
  // ratio → cost
  // sport, eco, family, cost → null (pas de descente)
  if (currentDriver === 'premium') return 'ratio';
  if (currentDriver === 'ratio') return 'cost';
  return null;
}

/**
 * v53 : applique les filtres pour un niveau d'assouplissement donné.
 * Retourne le pool filtré (sans tri).
 */
function _applyFilters_v53(allCars, stRef, age, level) {
  let pool = allCars.slice();

  // Filtre budget (toujours respecté)
  pool = pool.filter(car => {
    const purch = (typeof purchAtAge === 'function') ? purchAtAge(car, age) : car.newP;
    const inc = (typeof incForCar === 'function') ? incForCar(car, age) : 0;
    return (purch - inc) <= stRef.budget;
  });

  // Filtre segment selon level (0/1/2)
  if (level <= 2) {
    const baseSegs = (typeof getBodySegs === 'function') ? getBodySegs() : [];
    if (baseSegs.length > 0) {
      const segs = _expandSegments(baseSegs, level);
      pool = pool.filter(car => car.seg && car.seg.some(s => segs.includes(s)));
    }
  }
  // level 3 : on ne filtre plus par segment

  // AWD
  if (typeof wantsAWD === 'function' && wantsAWD()) {
    pool = pool.filter(car => typeof carHasAWD !== 'function' || carHasAWD(car));
  }

  // Filtre driver pool
  let activeDriver = stRef.pref;
  if (level === 3 && stRef.pref) {
    const relaxed = _relaxedDriver(stRef.pref);
    if (relaxed) activeDriver = relaxed;
  }
  if (activeDriver && DRIVER_BRAND_POOLS[activeDriver]) {
    const allowedBrands = DRIVER_BRAND_POOLS[activeDriver];
    pool = pool.filter(car => allowedBrands.includes((car.brand || '').toLowerCase()));
  }

  // Filtres additionnels eco/sport (toujours stricts, c'est le sens même du driver)
  if (stRef.pref === 'eco') {
    pool = pool.filter(car =>
      ['bev','hev','phev'].includes(car.pt) &&
      (car.co2_wltp == null || car.co2_wltp <= 100)
    );
  }
  if (stRef.pref === 'sport') {
    pool = pool.filter(car => isSportCar(car));
  }

  // Refine excludes user-set
  if (stRef.brand_prefs && stRef.brand_prefs.excluded && stRef.brand_prefs.excluded.length) {
    const excl = new Set(stRef.brand_prefs.excluded.map(b => String(b).toLowerCase()));
    pool = pool.filter(car => !excl.has((car.brand || '').toLowerCase()));
  }

  return pool;
}

function rankVehiclesByTCO(allCars, stRef, age) {
  age = (age == null) ? 0 : age;
  // v51 garde la signature : retour direct trié pour rétro-compat
  // (la nouvelle logique d'assouplissement passe par buildResultsView_v53 ci-dessous)
  let pool = _applyFilters_v53(allCars, stRef, age, 0);
  const scored = pool.map(car => {
    const purch = (typeof purchAtAge === 'function') ? purchAtAge(car, age) : car.newP;
    const inc = (typeof incForCar === 'function') ? incForCar(car, age) : 0;
    return { car: car, tcoMonthly: tcoMonthly_v51(car, age), age: age,
             purchPrice: purch, net: purch - inc, level: 0 };
  }).filter(s => s.tcoMonthly > 0);
  scored.sort((a, b) => a.tcoMonthly - b.tcoMonthly);
  return scored;
}

/**
 * v53 : Cherche le meilleur véhicule en assouplissant progressivement.
 * Retourne {rankings: [scored], level: 0|1|2|3|4, levelDescription: string}
 */
function _rankWithRelaxation_v53(allCars, stRef, age) {
  for (let level = 0; level <= 3; level++) {
    const pool = _applyFilters_v53(allCars, stRef, age, level);
    if (pool.length === 0) continue;
    const scored = pool.map(car => {
      const purch = (typeof purchAtAge === 'function') ? purchAtAge(car, age) : car.newP;
      const inc = (typeof incForCar === 'function') ? incForCar(car, age) : 0;
      return { car: car, tcoMonthly: tcoMonthly_v51(car, age), age: age,
               purchPrice: purch, net: purch - inc, level: level };
    }).filter(s => s.tcoMonthly > 0);
    scored.sort((a, b) => a.tcoMonthly - b.tcoMonthly);
    if (scored.length > 0) return { rankings: scored, level: level };
  }
  return { rankings: [], level: 4 };
}



function buildResultsView(allCars, stRef) {
  // v60 : Option C — top indépendant par colonne (pas de dedup), siblings TCO inter-âges,
  //                  ptAlternative cherche dans même âge que topGlobal avec fallback.
  const r = {
    'new':    _rankWithRelaxation_v53(allCars, stRef, 0),
    'used2y': _rankWithRelaxation_v53(allCars, stRef, 2),
    'used5y': _rankWithRelaxation_v53(allCars, stRef, 5),
  };
  // Niveau d'assouplissement le plus bas atteint à travers les 3 colonnes
  // (= le niveau le plus strict qui a donné un résultat)
  const validLevels = ['new','used2y','used5y']
    .filter(k => r[k].rankings.length > 0)
    .map(k => r[k].level);
  const overallLevel = validLevels.length > 0 ? Math.min(...validLevels) : 4;

  const topNew = r['new'].rankings[0]    || null;
  const top2y  = r['used2y'].rankings[0] || null;
  const top5y  = r['used5y'].rankings[0] || null;

  if (!topNew && !top2y && !top5y) {
    return { empty: true, reason: 'no_match', level: 4 };
  }

  // ── v60 : calcule les TCO inter-âges du MÊME véhicule
  //   Pour chaque top de colonne, regarde dans les 2 autres colonnes si le même car.id existe.
  //   Si oui : récupère le tcoMonthly. Sinon : calcule via calcTCO directement.
  const ageMap = { 0: 'new', 2: 'used2y', 5: 'used5y' };
  const computeSiblings = (topRank) => {
    if (!topRank || !topRank.car) return {};
    const siblings = {};
    [0, 2, 5].forEach(age => {
      const colKey = ageMap[age];
      if (topRank.age === age) {
        siblings[age] = topRank.tcoMonthly;
        return;
      }
      // 1. Look for same car in other column's full ranking
      const ranking = (r[colKey] && r[colKey].rankings) || [];
      const sameCar = ranking.find(rk => rk.car && rk.car.id === topRank.car.id);
      if (sameCar) {
        siblings[age] = sameCar.tcoMonthly;
        return;
      }
      // 2. Fallback: compute TCO on-the-fly (car may not be in that age's ranking pool)
      try {
        const km = (typeof curveKm === 'number' ? curveKm : 15000);
        const tco = calcTCO(topRank.car.pt, topRank.car.newP, topRank.car.brand, age, km);
        if (tco && tco.mo > 0) siblings[age] = Math.round(tco.mo);
      } catch (e) { /* skip */ }
    });
    return siblings;
  };
  if (topNew) topNew.siblings = computeSiblings(topNew);
  if (top2y)  top2y.siblings  = computeSiblings(top2y);
  if (top5y)  top5y.siblings  = computeSiblings(top5y);

  const candidates = [topNew, top2y, top5y].filter(c => c !== null);
  let topGlobal = candidates[0];
  let topColumn = topNew === topGlobal ? 'new' : (top2y === topGlobal ? 'used2y' : 'used5y');
  for (const c of candidates) {
    if (c.tcoMonthly < topGlobal.tcoMonthly) {
      topGlobal = c;
      topColumn = (c === topNew) ? 'new' : (c === top2y ? 'used2y' : 'used5y');
    }
  }

  // ── v60 : ptAlternative cherche d'abord dans MÊME âge que topGlobal,
  //          puis fallback sur âges adjacents (avec flag _fromDifferentAge).
  const preferredPt = (typeof bestPt === 'function') ? bestPt() : null;
  let ptAlternative = null;
  if (preferredPt && topGlobal && topGlobal.car.pt !== preferredPt) {
    // 1. Same age as topGlobal
    const sameAgeRanked = (r[topColumn] && r[topColumn].rankings) || [];
    let ptCand = sameAgeRanked.find(s => s.car && s.car.pt === preferredPt);
    let _fromAge = null;
    if (!ptCand) {
      // 2. Fallback to adjacent ages
      const fallbackOrder = topColumn === 'new' ? ['used2y', 'used5y']
                          : topColumn === 'used2y' ? ['new', 'used5y']
                          : ['used2y', 'new'];
      for (const ageKey of fallbackOrder) {
        ptCand = ((r[ageKey] && r[ageKey].rankings) || [])
                   .find(s => s.car && s.car.pt === preferredPt);
        if (ptCand) { _fromAge = ageKey; break; }
      }
    }
    if (ptCand) {
      // Compute siblings for the alt too
      ptCand.siblings = computeSiblings(ptCand);
      ptCand._fromDifferentAge = _fromAge;
      ptAlternative = ptCand;
    }
  }

  const currentTCO = getCurrentVehicleTCO();
  let savings = null;
  if (currentTCO && topGlobal) {
    savings = {
      monthly: currentTCO - topGlobal.tcoMonthly,
      yearly:  (currentTCO - topGlobal.tcoMonthly) * 12,
      currentTCO: currentTCO,
    };
  }
  const poolSize = r['new'].rankings.length + r['used2y'].rankings.length + r['used5y'].rankings.length;
  return {
    empty: false,
    columns: { new: topNew, used2y: top2y, used5y: top5y },
    columnsLevels: { new: r['new'].level, used2y: r['used2y'].level, used5y: r['used5y'].level },
    columnsRankings: { new: r['new'].rankings, used2y: r['used2y'].rankings, used5y: r['used5y'].rankings },
    topGlobal, topColumn, ptAlternative, preferredPt, savings, poolSize,
    level: overallLevel,
    relaxedDriver: (overallLevel >= 3 && stRef.pref) ? _relaxedDriver(stRef.pref) : null,
  };
}

function getCurrentVehicleTCO() {
  try {
    if (typeof GarageStore === 'undefined' || !GarageStore.list) return null;
    const vehicles = GarageStore.list();
    if (!vehicles || vehicles.length === 0) return null;
    const main = vehicles.find(v => v.isMain) || vehicles[0];
    if (!main) return null;
    if (typeof decomposeTcoMonthly === 'function') {
      const tco = decomposeTcoMonthly(main);
      if (tco && tco.monthly) return tco.monthly;
    }
    return null;
  } catch(e) { return null; }
}

function getCurrentVehicleName() {
  try {
    if (typeof GarageStore === 'undefined' || !GarageStore.list) return '';
    const vehicles = GarageStore.list();
    if (!vehicles || vehicles.length === 0) return '';
    const main = vehicles.find(v => v.isMain) || vehicles[0];
    if (!main) return '';
    const brand = (main.brand || '').toString();
    const model = (main.model || '').toString();
    return (brand + ' ' + model).trim();
  } catch(e) { return ''; }
}

function carPrefScore(car,preferredPt){
  // v44 / Architecture B :
  //   - Plus de bonus +80 quand car.pt === preferredPt (supprimé)
  //   - La recommandation PT est désormais gérée séparément via getPtAlternative()
  //   - Le scoring respecte 100% le driver utilisateur
  //   - preferredPt reste dans la signature pour compatibilité ascendante
  //     (anciens appels qui le passent encore), mais n'est plus utilisé ici.
  let s=0;
  // Segment rank
  s+=segRank(car)*20;
  // Preference modifier
  if(st.pref==='cost'){
    // v44 : pénalité prix renforcée pour vraiment privilégier les moins chères
    // Avant v44 : -newP/1000 (jusqu'à -50). Trop léger face à autres facteurs.
    // Après v44 : -newP/700 (jusqu'à -85), pénalité prédominante comme attendu.
    s-=car.newP/700;
  }else if(st.pref==='ratio'){
    // v43 : véritable rapport qualité/prix — combine fiabilité ET prix.
    // Avant v43, la formule ne tenait que la fiabilité, ce qui faisait gagner
    // des voitures plus chères face à des moins chères équivalentes.
    //
    // Fiabilité : +50 pour les plus fiables (rel=0.65), 0 pour rel=1.5
    // Prix     : pénalité proportionnelle au newP (~20-50 selon le prix)
    // Source : MODEL_REL (modèle TÜV/WhatCar) > BREL_BRAND (marque) > 1.0 défaut
    const relEntry=MODEL_REL[car.id];
    const rel=(relEntry && relEntry[0] !== undefined && relEntry[0] !== null ? relEntry[0] : (BREL_BRAND[car.brand] || 1.0));
    s+=Math.round((1.5-rel)*60); // fiabilité (jusqu'à +50)
    s-=Math.round(car.newP/1500); // pénalité prix (~20-50 selon achat)
  }else if(st.pref==='premium'){
    if(PREMIUM_BRANDS.has(car.brand))s+=80;
    if(car.pt==='bev'||car.pt==='phev')s+=40;
  }else if(st.pref==='sport'){
    if(SPORT_BRANDS.has(car.brand))s+=80;
    if(car.pt==='bev')s+=60; // instant torque
    if(car.pt==='phev')s+=30;
  }else if(st.pref==='eco'){
    // Eco : if CO2 WLTP available, use continuous score based on emissions.
    // Source: EEA official dataset 2024P.
    //   co2_wltp=0 (BEV)     -> +160
    //   co2_wltp=50 (PHEV)   -> +120
    //   co2_wltp=100 (HEV)   -> +80
    //   co2_wltp=150 (ICE)   -> +40
    //   co2_wltp=200+        -> 0 or negative
    // Fallback on powertrain-based binary scoring if co2_wltp not in DB.
    if(typeof car.co2_wltp === 'number'){
      s += Math.max(-40, Math.round((200 - car.co2_wltp) * 0.8));
    }else{
      if(car.pt==='bev')s+=120;
      else if(car.pt==='phev')s+=70;
      else if(car.pt==='hev')s+=60;
      else if(car.pt==='die')s-=100;
    }
    // Malus léger sur grosses cylindrées essence sport (reste applicable)
    if(car.pt==='ice' && car.newP>45000 && (car.seg||[]).includes('sport'))s-=50;
  }else if(st.pref==='family'){
    // Family : boost SUV/wagon/MPV + toutes les variantes break, favour reliable brands,
    // penalise small/sport/coupe
    const segs = car.seg || [];
    // Segments "famille" au sens large :
    //   - Tous les SUV sauf urbains (trop petits) : suv_compact/family/large/premium
    //   - Tous les breaks (= vrais coffres longs) : small_break, compact_break, saloon_break, executive_break
    //   - Les variantes génériques : wagon, mpv, 'break'
    const familySegs = ['suv_compact','suv_family','suv_large','suv_premium',
                        'small_break','compact_break','saloon_break','executive_break',
                        'wagon','mpv','break'];
    if(segs.some(sg=>familySegs.includes(sg)))s+=80;  // × 1.20 equivalent
    // Bonus supplémentaire pour les breaks purs (si coché dans bodyMod, l'utilisateur
    // cherche explicitement un grand coffre)
    const pureBreak = segs.some(sg=>['small_break','compact_break','saloon_break','executive_break'].includes(sg));
    if(pureBreak)s+=20;
    if(segs.includes('sport')||segs.includes('city')||segs.includes('coupe'))s-=80;  // × 0.75 equivalent
    // Bonus fiabilité (marques connues pour leur fiabilité)
    const reliableBrands = new Set(['toyota','lexus','honda','kia','hyundai','mazda','skoda']);
    if(reliableBrands.has(car.brand))s+=40;  // × 1.10 equivalent
  }

  // ── Refinement modifiers (Part B preferences spec) ──────────────────
  // Brand favorites : × 1.20 equivalent. Exclusions handled as a hard filter
  // in carsForBudget (before scoring).
  if(st.brand_prefs && st.brand_prefs.favorites && st.brand_prefs.favorites.includes(car.brand)){
    s += 80;
  }
  // Style preference : soft bonus matching segment / fuel profile.
  if(st.style_preference){
    const segs = car.seg || [];
    switch(st.style_preference){
      case 'sporty':
        if(SPORT_BRANDS && SPORT_BRANDS.has(car.brand)) s+=50;
        if(car.pt==='bev') s+=30;   // instant torque
        if(segs.includes('sport')||segs.includes('coupe')) s+=60;
        break;
      case 'elegant':
        if(PREMIUM_BRANDS && PREMIUM_BRANDS.has(car.brand)) s+=50;
        if(segs.includes('saloon')) s+=50;
        break;
      case 'modern':
        if(car.pt==='bev') s+=70;
        if(car.pt==='phev') s+=40;
        if(car.brand==='tesla' || car.brand==='polestar' || car.brand==='byd') s+=30;
        break;
      case 'rugged':
        if(segs.includes('suv_compact')||segs.includes('suv_family')||segs.includes('suv_large')) s+=70;
        if(carHasAWD && carHasAWD(car)) s+=30;
        break;
      case 'minimal':
        if(segs.includes('city')||segs.includes('small')||segs.includes('compact')) s+=50;
        if(car.newP && car.newP<22000) s+=30;
        break;
      case 'practical':
        if(segs.includes('compact_break')||segs.includes('break')||segs.includes('wagon')||segs.includes('mpv')) s+=70;
        if(segs.includes('suv_family')) s+=40;
        break;
    }
  }
  // Age/equipment tradeoff is applied at filter level (carsForBudget), not here.
  // Required features & physical constraints : data not available per-model yet,
  // so they don't affect scoring in this MVP. UI captures the preferences for future.
  return s;
}

function relLabel(brand,pt,modelId){
  // Sources: TÜV Report 2024/2026 (10.2M+ inspections) + What Car? Reliability Survey 2024
  // Aucun coefficient PHEV global — chaque modèle scoré individuellement
  const entry=modelId?MODEL_REL[modelId]:null;
  const r=(entry && entry[0] !== undefined && entry[0] !== null ? entry[0] : (BREL_BRAND[brand] || null));
  const source=(entry ? entry[1] : null);
  const extFrom=(entry ? entry[2] : null);
  if(r===null||r===undefined)
    return{stars:'N/D',txt:lang==='fr'?'Données insuffisantes':'No data',
           cls:'rel-nd',score:null,source:null,extFrom:null,isModel:false};
  let stars,txt,cls;
  if(r<=0.70){stars='★★★★★';txt=lang==='fr'?'Excellente':'Excellent';cls='rel-excellent';}
  else if(r<=0.90){stars='★★★★☆';txt=lang==='fr'?'Bonne':'Good';cls='rel-good';}
  else if(r<=1.10){stars='★★★☆☆';txt=lang==='fr'?'Moyenne':'Average';cls='rel-avg';}
  else{stars='★★☆☆☆';txt=lang==='fr'?'À surveiller':'Watch out';cls='rel-poor';}
  return{stars,txt,cls,score:r,source,extFrom,isModel:!!entry};
}

function carsForBudget(budget,age,preferredPt,bodySegs,excludeIds){
  const excl=new Set(excludeIds||[]);
  const allCarsPool = age > 0 ? [...DB, ...DB_HIST.filter(h=>h&&h.id).map(h=>({...h,isHistorical:true}))] : DB.filter(c=>c&&c.id);
  const gap0 = budget<=30000 ? 5000 : 10000; // tranche de base

  // Helper: apply user filters (origin, reliability, network)
  const passFilters=(car)=>{
    if(st.originFilter.size>0&&!st.originFilter.has(carOrigin(car.brand))) return false;
    if(st.relFilter){
      const rl=relLabel(car.brand,car.pt,car.id);
      if(st.relFilter==='excellent'&&rl.cls!=='rel-excellent') return false;
      if(st.relFilter==='good'&&rl.cls!=='rel-excellent'&&rl.cls!=='rel-good') return false;
    }
    // Network filter — brands with dense vs medium networks
    // Filtre réseau garage proche (région sélectionnée)
    if (st.networkFilter === 'local') {
      if (!hasDealerInRegion(car.brand, st.dept, activeCountry)) return false;
    }
    if(st.networkFilter==='dense'){
      const denseBrands=['vw','audi','bmw','mercedes','toyota','peugeot','renault','ford','opel','skoda','seat','hyundai','kia','volvo','citroen'];
      if(!denseBrands.includes(car.brand && car.brand.toLowerCase())) return false;
    }
    if(st.networkFilter==='medium'){
      const mediumBrands=['vw','audi','bmw','mercedes','toyota','peugeot','renault','ford','opel','skoda','seat','hyundai','kia','volvo','citroen','honda','mazda','nissan','mini','fiat','suzuki','dacia','cupra','alfa','jeep'];
      if(!mediumBrands.includes(car.brand && car.brand.toLowerCase())) return false;
    }
    // ── Refinement filters (Part B preferences spec) ────────────────
    // Brand exclusion : hard filter, × 0 equivalent.
    if(st.brand_prefs && st.brand_prefs.excluded && st.brand_prefs.excluded.includes(car.brand)){
      return false;
    }
    // Age/equipment tradeoff — only applies to occasion columns (age > 0).
    if(age > 0 && st.age_equip_tradeoff){
      // "recent" : keep only cars up to ~3 years old
      if(st.age_equip_tradeoff === 'recent' && age > 3) return false;
      // "equipped" : older-but-better-equipped — prefer premium/sport brands on older cars
      if(st.age_equip_tradeoff === 'equipped' && age < 3) {
        // 2-year cars stay eligible but the column usually is "5 years old" anyway.
        // On ne filtre rien ici à ce stade ; le bias se fait au scoring côté "premium" brands.
      }
    }
    // ── Physical constraints (length/width/height) ─────────────────
    // Filtre dur : si l'utilisateur a déclaré une contrainte de garage,
    // on exclut les voitures qui la dépassent. Si la voiture n'a pas de
    // dimensions renseignées dans la BDD, on LAISSE PASSER (on ne punit
    // pas une voiture pour une data absente).
    const pc = st.physical_constraints || {};
    if(pc.max_length_cm && car.length_cm && car.length_cm > pc.max_length_cm) return false;
    if(pc.max_width_cm  && car.width_cm  && car.width_cm  > pc.max_width_cm)  return false;
    if(pc.max_height_cm && car.height_cm && car.height_cm > pc.max_height_cm) return false;

    // ── Plausibilité temporelle (occasion 2/5 ans) ─────────────────
    // v32 logique : fenêtres d'âge exclusives (pas de chevauchement).
    //   "Occasion 2 ans" = voitures 1-2 ans  (production 2024-2025 en 2026)
    //   "Occasion 5 ans" = voitures 3-5 ans  (production 2021-2023 en 2026)
    //
    // Règle : la voiture doit avoir été produite sur AU MOINS une année
    // qui tombe dans la fenêtre. Si genYear > fin_de_fenetre : pas encore née.
    // Si endYear < debut_de_fenetre : déjà arrêtée avant la fenêtre.
    //
    // Pragmatique : le filtre s'applique uniquement quand la data est
    // disponible (genYear défini, ou nom contenant "(YYYY-YYYY)").
    // Pour les voitures sans ces métadonnées, on laisse passer (comportement
    // v30), en attendant l'enrichissement BDD.
    if (age > 0) {
      const CURRENT_YEAR = 2026;
      // age=2 → window [1-2 ans] → production years [2024, 2025]
      // age=5 → window [3-5 ans] → production years [2021, 2023]
      const AGE_WINDOWS = {
        2: { minAge: 1, maxAge: 2 },
        5: { minAge: 3, maxAge: 5 },
      };
      const win = AGE_WINDOWS[age];
      if (win) {
        const winProdMin = CURRENT_YEAR - win.maxAge; // année prod la + ancienne
        const winProdMax = CURRENT_YEAR - win.minAge; // année prod la + récente

        // Filtre 1 : genYear. Si défini, la voiture ne peut être dans cette
        // colonne que si elle a commencé à être produite AVANT la fin de fenêtre.
        if (car.genYear && car.genYear > winProdMax) return false;

        // Filtre 2 : endYear depuis le nom "(YYYY-YYYY)". Si défini, la voiture
        // doit avoir été produite au moins jusqu'au début de fenêtre (tolerance -1).
        const m = car.name && car.name.match(/\((\d{4})-(\d{4})\)/);
        if (m) {
          const endYear = parseInt(m[2], 10);
          if (endYear < winProdMin - 1) return false;
        }
      }
    }
    return true;
  };
  const wantsBreak = (st.bodyMod||[]).includes('break') || (st.body||[]).includes('break');
  const BREAK_SEGS = new Set(['compact_break','saloon_break','small_break','executive_break']);

  const segOk = (car) => {
    if (bodySegs.length === 0) {
      // Pas de filtre carrosserie — exclure quand même les breaks purs si l'utilisateur n'en veut pas
      if (!wantsBreak && car.seg.every(s => BREAK_SEGS.has(s))) return false;
      return true;
    }
    // Filtre carrosserie actif
    if (!car.seg.some(s => bodySegs.includes(s))) return false;
    // Exclure les breaks purs si l'utilisateur n'a pas coché "Break"
    if (!wantsBreak && car.seg.every(s => BREAK_SEGS.has(s))) return false;
    if (!wantsAWD() || carHasAWD(car)) return true;
    return false;
  };

  // Try with progressively wider price range — ALWAYS keep segment/gamme
  let pool=[], _gap=gap0, _widened=false;
  while(pool.length===0 && _gap<=budget*0.6){
    pool=allCarsPool.filter(car=>{
      if(!car||!car.id) return false;
      if(excl.has(car.id)) return false;
      const net=purchAtAge(car,age)-incForCar(car,age);
      if(net>budget||net<budget-_gap) return false;
      if(!segOk(car)) return false;
      return passFilters(car);
    });
    if(pool.length===0){
      _gap += gap0; // élargir d'une tranche à la fois
      _widened=true;
    }
  }
  // Mark widened results so UI can show a note
  if(_widened && pool.length>0){
    pool=pool.map(car=>({...car,_widened:true,_actualGap:_gap}));
  }
  // For occasion: boost score of higher-segment cars (more value for money)
  // A car that costs €50k new but is available for €30k occasion scores higher
  pool.sort((a,b)=>{
    const scoreA = carPrefScore(a,preferredPt) + (age>0?segRankBoost(a,budget,age):0);
    const scoreB = carPrefScore(b,preferredPt) + (age>0?segRankBoost(b,budget,age):0);
    if (scoreA !== scoreB) return scoreB - scoreA;
    // À score égal : trier par budget mensuel total (TCO + assurance) croissant
    const moA = calcMonthlyTotal(a, age);
    const moB = calcMonthlyTotal(b, age);
    return moA - moB;
  });
  const seen = new Set();
  const seenNamePt = new Set(); // Dedup par nom simplifié × carburant
  const deduped = pool.filter(c => {
    if (!c || !c.id) return false;
    if (seen.has(c.id)) return false;
    seen.add(c.id);
    // Clé de déduplication : 3 premiers mots du nom + carburant
    const nameKey = c.name.split(' ').slice(0, 3).join(' ').toLowerCase() + '_' + c.pt;
    if (seenNamePt.has(nameKey)) return false;
    seenNamePt.add(nameKey);
    return true;
  });
  return deduped;
}

// Boost score for occasion: reward cars with higher original value (more segment per €)
function segRankBoost(car,budget,age){
  const net=purchAtAge(car,age)-incForCar(car,age);
  if(net<=0||budget<=0) return 0;
  // Higher newP vs net price = better deal
  const valueRatio=(car.newP-net)/budget;
  return Math.min(valueRatio*3, 3);  // max +3 boost
}

// ══════════════════════════════════════════════════════════════
// RECOMMENDATION ENGINE
// ══════════════════════════════════════════════════════════════
function scorePt(pt){
  // Use REAL cheapest car in budget for this PT — not a fixed reference price
  // This ensures recommendation matches actual best TCO available
  const budget=st.budget||25000;
  const km=getKm(),tr=st.trips||'mixed',h=home();
  const bodySegs=getBodySegs();
  // Find cheapest car of this PT within budget (neuf or 2yr occasion)
  const carsOfPt=DB.filter(car=>{
    if(car.pt!==pt) return false;
    const pp=purchAtAge(car,0); // neuf
    const pp2=purchAtAge(car,2); // 2ans
    return pp<=budget||pp2<=budget;
  });
  let refPrice, refBrand;
  if(carsOfPt.length){
    // Use median price car of this PT to avoid outliers
    const sorted=carsOfPt.sort((a,b)=>a.newP-b.newP);
    const median=sorted[Math.floor(sorted.length/2)];
    refPrice=Math.min(budget, median.newP);
    refBrand=median.brand;
  } else {
    // Fallback if no car found in budget
    const fallback={ice:22000,hev:26000,phev:38000,bev:34000,die:24000};
    refPrice=fallback[pt]||25000; refBrand='toyota';
  }
  const tc=calcTCO(pt,refPrice,refBrand||'toyota',0,km);
  let s=5000-tc.mo*3;
  if(pt==='hev'&&(tr==='short'||tr==='mixed'))s+=120;
  if(pt==='die'&&(tr==='long'||tr==='vlong'))s+=80; // diesel advantage on long trips
  if(pt==='die'&&tr==='short')s-=100; // FAP damage on short urban trips
  if(pt==='bev'&&h&&tr!=='vlong')s+=100;
  if(pt==='bev'&&!h)s-=180;
  if(pt==='phev'&&!h&&(tr==='long'||tr==='vlong'))s-=160;
  if(pt==='phev'&&!h)s-=80;
  if(pt==='ice'&&tr==='short')s-=80;
  // Buyer preference modifier
  if(st.pref==='cost'){
    // Best cost: strongly penalise expensive MOs
    s=5000-tc.mo*4;
  }else if(st.pref==='ratio'){
    // v44 / Architecture B :
    // Cette fonction recommande un PT, pas un véhicule. Pour ratio, on regarde
    // si la marque médiane de ce PT a une bonne fiabilité connue. Sinon neutre.
    // (Avant v44 : relBonus déclaré mais jamais utilisé — bug.)
    const relBonus={toyota:60,lexus:60,honda:50,mazda:40,hyundai:20,kia:20};
    s+=relBonus[refBrand]||20;
  }else if(st.pref==='premium'){
    // Premium: favour BEV and PHEV (tech, quiet, brand)
    if(pt==='bev')s+=150;
    if(pt==='phev')s+=80;
    if(pt==='ice')s-=100;
  }else if(st.pref==='sport'){
    // Sport: favour BEV (instant torque) and PHEV
    if(pt==='bev')s+=120;
    if(pt==='phev')s+=60;
    if(pt==='hev')s-=40;
  }else if(st.pref==='eco'){
    // Eco : strongly favour BEV > PHEV > HEV, penalise diesel
    if(pt==='bev')s+=200;
    if(pt==='phev')s+=100;
    if(pt==='hev')s+=80;
    if(pt==='die')s-=150;
    if(pt==='ice')s-=50;
  }else if(st.pref==='family'){
    // Family : no strong powertrain preference — fiability handled at car-level.
    // Slight preference for HEV and PHEV (silent, low vibration, proven tech),
    // slight malus on pure BEV if no home charging (cf. existing bev/!h penalty).
    if(pt==='hev')s+=40;
    if(pt==='phev'&&h)s+=30;
  }
  return s;
}
function bestPt(){
  const ranked=['ice','hev','phev','bev','die'].sort((a,b)=>scorePt(b)-scorePt(a));
  const bodySegs=getBodySegs();
  // Verify at least one car exists in budget for this PT
  // Check across all 3 scenarios (new + 2yr + 5yr)
  for(const pt of ranked){
    const found=[0,2,5].some(age=>
      DB.some(c=>{
        if(c.pt!==pt)return false;
        const net=purchAtAge(c,age)-incForCar(c,age);
        const segOk=(bodySegs.length===0||c.seg.some(s=>bodySegs.includes(s)))&&(!wantsAWD()||carHasAWD(c));
        return net<=st.budget&&segOk;
      })
    );
    if(found)return pt;
  }
  // Fallback: ignore segment filter
  for(const pt of ranked){
    const found=[0,2,5].some(age=>
      DB.some(c=>c.pt===pt&&purchAtAge(c,age)-incForCar(c,age)<=st.budget)
    );
    if(found)return pt;
  }
  return ranked[0];
}

// ══════════════════════════════════════════════════════════════
// ARCHITECTURE B (v44) — Alternative PT contextuelle
// ══════════════════════════════════════════════════════════════
// Le scoring principal respecte 100% le driver utilisateur (sans bonus PT).
// La recommandation PT (issue de bestPt) est ensuite proposée séparément
// comme "Alternative selon votre profil d'usage".
//
// 3 modes d'affichage finaux :
//   - 'main_only' : aucune alternative à proposer (PT match déjà le top, ou pas de candidat)
//   - 'main_with_pt_confirmation' : top principal correspond au PT recommandé → simple confirmation
//   - 'main_with_alternative' : top principal ne correspond pas au PT → alternative séparée
// ══════════════════════════════════════════════════════════════

// Retourne le meilleur véhicule matchant preferredPt, en évitant les véhicules
// déjà présents dans le top principal.
function getPtAlternative(cars, preferredPt, mainTopIds) {
  if (!cars || cars.length === 0 || !preferredPt) return null;
  mainTopIds = mainTopIds || [];

  const ptMatching = cars.filter(c => c.pt === preferredPt);
  if (ptMatching.length === 0) return null;

  // Score selon le driver utilisateur (PAS de preferredPt — on est déjà filtré)
  const scored = ptMatching.map(car => ({
    car: car,
    score: carPrefScore(car, null),  // null = pas de bonus PT (déjà supprimé)
  }));
  scored.sort((a, b) => b.score - a.score);

  // Premier qui n'est pas dans le top principal
  const best = scored.find(s => !mainTopIds.includes(s.car.id));
  if (!best) return null;

  return {
    car: best.car,
    score: best.score,
    pt: preferredPt,
  };
}

// Génère le texte d'explication "pourquoi ce PT pour votre profil"
// Utilise l'état actuel (charging, trips, km) pour donner une raison contextuelle.
function getPtRecommendationReason(preferredPt, currentLang) {
  currentLang = currentLang || lang;
  const km = st.km;       // 'u10' | 'm20' | 'm35' | 'o35'
  const tr = st.trips;    // 'short' | 'mixed' | 'long' | 'vlong'
  const ch = st.charging; // v44 fix : real values are 'socket'|'maybe'|'street'
  const home = ch === 'socket' || ch === 'maybe';

  // Construire un résumé du profil d'usage
  const reasons = {
    fr: {
      bev: home
        ? `Recharge à domicile et trajets ${tr==='vlong'?'longs':tr==='long'?'mi-longs':tr==='short'?'courts':'mixtes'} : l'électrique offre le meilleur coût d'usage.`
        : `Trajets ${tr==='short'?'urbains':'mixtes'} avec point de charge accessible : l'électrique reste pertinent.`,
      hev: `Profil mixte ville/route sans contrainte de recharge : l'hybride auto-rechargeable est l'optimum.`,
      phev: `Trajets quotidiens courts avec longs trajets occasionnels et possibilité de recharge : l'hybride rechargeable maximise les trajets électriques.`,
      ice: `Longs trajets sans accès à la recharge : l'essence reste le choix le plus pratique.`,
      die: `Très grands kilométrages routiers : le diesel garde l'avantage en consommation autoroutière.`,
    },
    en: {
      bev: home
        ? `Home charging and ${tr==='vlong'?'very long':tr==='long'?'long':tr==='short'?'short':'mixed'} trips: electric offers the best running cost.`
        : `${tr==='short'?'Urban':'Mixed'} trips with accessible charging point: electric remains relevant.`,
      hev: `Mixed urban/road profile without charging constraints: self-charging hybrid is the optimum.`,
      phev: `Short daily trips with occasional long ones and charging available: plug-in hybrid maximises electric mileage.`,
      ice: `Long trips without charging access: petrol remains the most practical choice.`,
      die: `Very high road mileage: diesel keeps the highway efficiency advantage.`,
    },
  };
  const langKey = (reasons[currentLang]) ? currentLang : 'fr';
  return reasons[langKey][preferredPt] || '';
}

// Détermine le mode d'affichage à partir d'un top principal et d'une alternative.
// Retourne 'main_only' | 'main_with_pt_confirmation' | 'main_with_alternative'
function determineDisplayMode(mainTopCars, ptAlternative, preferredPt) {
  if (!preferredPt) return 'main_only';
  // Si le PT recommandé apparaît déjà dans le top principal → confirmation
  const mainTopMatchesPt = mainTopCars.some(c => c && c.pt === preferredPt);
  if (mainTopMatchesPt) {
    return 'main_with_pt_confirmation';
  }
  // Sinon, si une alternative pertinente est calculée → l'afficher
  if (ptAlternative) {
    return 'main_with_alternative';
  }
  return 'main_only';
}

// ══════════════════════════════════════════════════════════════
// SCORE BREAKDOWN (v44 / Architecture B — Module driver)
// ══════════════════════════════════════════════════════════════
// Pour la modale "Comment votre choix est-il interprété ?" :
// retourne le détail du calcul de score pour un véhicule donné selon le driver.
// Permet d'expliciter à l'utilisateur quels facteurs ont compté.
//
// Structure retournée :
//   {
//     driver: 'ratio',
//     factors: [
//       {label: 'Fiabilité', impact: '+38', explanation: 'Marque Ford : score 0.87'},
//       {label: 'Prix d\'achat', impact: '-20', explanation: '29 490 € pénalité 1/1500'},
//     ],
//     total: 18,
//   }
function computeScoreBreakdown(car, driver) {
  driver = driver || st.pref;
  if (!car || !driver) return null;
  const factors = [];
  let total = 0;

  // 1. Segment rank (commun à tous les drivers)
  const segScore = (typeof segRank === 'function' ? segRank(car) : 0) * 20;
  if (segScore !== 0) {
    factors.push({
      key: 'segment',
      label_fr: 'Rang du segment',
      label_en: 'Segment rank',
      impact: (segScore > 0 ? '+' : '') + Math.round(segScore),
      explanation_fr: `Catégorie ${(car.seg || []).join(', ') || 'n/a'} : score qualité du segment.`,
      explanation_en: `Category ${(car.seg || []).join(', ') || 'n/a'}: segment quality score.`,
    });
    total += segScore;
  }

  // 2. Driver-specific factor
  if (driver === 'cost') {
    const pricePenalty = -car.newP / 700;
    factors.push({
      key: 'price',
      label_fr: 'Prix d\'achat',
      label_en: 'Purchase price',
      impact: Math.round(pricePenalty),
      explanation_fr: `Prix neuf ${Math.round(car.newP).toLocaleString('fr-FR')} € : pénalité forte (votre critère = coût total).`,
      explanation_en: `New price €${Math.round(car.newP).toLocaleString('en-GB')}: strong penalty (your criterion = total cost).`,
    });
    total += pricePenalty;
  } else if (driver === 'ratio') {
    // Fiabilité
    const relEntry = (typeof MODEL_REL !== 'undefined') ? MODEL_REL[car.id] : null;
    const rel = (relEntry && relEntry[0] !== undefined && relEntry[0] !== null
      ? relEntry[0]
      : ((typeof BREL_BRAND !== 'undefined' ? BREL_BRAND[car.brand] : null) || 1.0));
    const relScore = Math.round((1.5 - rel) * 60);
    factors.push({
      key: 'reliability',
      label_fr: 'Fiabilité',
      label_en: 'Reliability',
      impact: (relScore > 0 ? '+' : '') + relScore,
      explanation_fr: `Score fiabilité ${rel.toFixed(2)} ${relEntry ? '(modèle TÜV/WhatCar)' : '(marque par défaut)'}.`,
      explanation_en: `Reliability score ${rel.toFixed(2)} ${relEntry ? '(model TÜV/WhatCar)' : '(brand fallback)'}.`,
    });
    total += relScore;
    // Prix
    const pricePenalty = -Math.round(car.newP / 1500);
    factors.push({
      key: 'price',
      label_fr: 'Prix d\'achat',
      label_en: 'Purchase price',
      impact: pricePenalty,
      explanation_fr: `Prix neuf ${Math.round(car.newP).toLocaleString('fr-FR')} € : pénalité modérée pour équilibrer fiabilité et prix.`,
      explanation_en: `New price €${Math.round(car.newP).toLocaleString('en-GB')}: moderate penalty to balance reliability vs price.`,
    });
    total += pricePenalty;
  } else if (driver === 'premium') {
    if (typeof PREMIUM_BRANDS !== 'undefined' && PREMIUM_BRANDS.has(car.brand)) {
      factors.push({
        key: 'premium_brand',
        label_fr: 'Marque premium',
        label_en: 'Premium brand',
        impact: '+80',
        explanation_fr: `${car.brand} fait partie des marques premium reconnues.`,
        explanation_en: `${car.brand} is a recognised premium brand.`,
      });
      total += 80;
    }
    if (car.pt === 'bev' || car.pt === 'phev') {
      factors.push({
        key: 'modern_pt',
        label_fr: 'Motorisation moderne',
        label_en: 'Modern powertrain',
        impact: '+40',
        explanation_fr: `Motorisation ${car.pt.toUpperCase()} : technologie premium associée à la modernité.`,
        explanation_en: `${car.pt.toUpperCase()} powertrain: premium technology.`,
      });
      total += 40;
    }
  } else if (driver === 'sport') {
    if (typeof SPORT_BRANDS !== 'undefined' && SPORT_BRANDS.has(car.brand)) {
      factors.push({
        key: 'sport_brand',
        label_fr: 'Marque sportive',
        label_en: 'Sport brand',
        impact: '+80',
        explanation_fr: `${car.brand} a une réputation sportive.`,
        explanation_en: `${car.brand} has a sport reputation.`,
      });
      total += 80;
    }
    if (car.pt === 'bev') {
      factors.push({
        key: 'instant_torque',
        label_fr: 'Couple instantané',
        label_en: 'Instant torque',
        impact: '+60',
        explanation_fr: `BEV : couple maximum dès 0 tr/min.`,
        explanation_en: `BEV: maximum torque from 0 RPM.`,
      });
      total += 60;
    } else if (car.pt === 'phev') {
      factors.push({
        key: 'hybrid_boost',
        label_fr: 'Boost hybride',
        label_en: 'Hybrid boost',
        impact: '+30',
        explanation_fr: `PHEV : moteur électrique d'appoint pour les accélérations.`,
        explanation_en: `PHEV: electric motor boost for acceleration.`,
      });
      total += 30;
    }
  } else if (driver === 'eco') {
    if (typeof car.co2_wltp === 'number') {
      const ecoScore = Math.max(-40, Math.round((200 - car.co2_wltp) * 0.8));
      factors.push({
        key: 'co2',
        label_fr: 'Émissions CO₂',
        label_en: 'CO₂ emissions',
        impact: (ecoScore > 0 ? '+' : '') + ecoScore,
        explanation_fr: `${car.co2_wltp} g/km WLTP : ${car.co2_wltp === 0 ? 'zéro émission directe' : car.co2_wltp < 50 ? 'très faibles émissions' : car.co2_wltp < 120 ? 'émissions modérées' : 'émissions élevées'}.`,
        explanation_en: `${car.co2_wltp} g/km WLTP: ${car.co2_wltp === 0 ? 'zero direct emissions' : car.co2_wltp < 50 ? 'very low emissions' : car.co2_wltp < 120 ? 'moderate emissions' : 'high emissions'}.`,
      });
      total += ecoScore;
    } else {
      const fallback = {bev: 120, phev: 70, hev: 60, die: -100, ice: 0}[car.pt] || 0;
      factors.push({
        key: 'pt_eco',
        label_fr: 'Motorisation écologique',
        label_en: 'Eco-friendly powertrain',
        impact: (fallback > 0 ? '+' : '') + fallback,
        explanation_fr: `Estimation par motorisation (CO₂ exact non disponible).`,
        explanation_en: `Estimated by powertrain (exact CO₂ not available).`,
      });
      total += fallback;
    }
  } else if (driver === 'family') {
    const segs = car.seg || [];
    const familySegs = ['suv_compact','suv_family','suv_large','suv_premium',
                        'small_break','compact_break','saloon_break','executive_break',
                        'wagon','mpv','break'];
    const isFamily = segs.some(sg => familySegs.includes(sg));
    if (isFamily) {
      factors.push({
        key: 'family_seg',
        label_fr: 'Segment famille',
        label_en: 'Family segment',
        impact: '+80',
        explanation_fr: `Carrosserie adaptée à la famille (SUV, break, MPV).`,
        explanation_en: `Family-friendly body type (SUV, wagon, MPV).`,
      });
      total += 80;
    }
    const reliable = new Set(['toyota', 'lexus', 'honda', 'kia', 'hyundai', 'mazda', 'skoda']);
    if (reliable.has(car.brand)) {
      factors.push({
        key: 'family_reliable',
        label_fr: 'Marque fiable',
        label_en: 'Reliable brand',
        impact: '+40',
        explanation_fr: `${car.brand} : marque réputée pour sa fiabilité (essentiel en famille).`,
        explanation_en: `${car.brand}: reputation for reliability (key for families).`,
      });
      total += 40;
    }
  }

  return {
    driver: driver,
    factors: factors,
    total: Math.round(total),
  };
}

function getRec(){
  const best=bestPt();
  const bodySegs=getBodySegs();
  const km=getKm(),tr=st.trips||'mixed',h=home();
  const refCar=DB.find(c=>c.pt===best&&(!bodySegs.length||c.seg.some(s=>bodySegs.includes(s)))&&(!wantsAWD()||carHasAWD(c)))||DB.find(c=>c.pt===best)||DB[0];
  const bTco=calcTCO(best,refCar.newP,refCar.brand,0,km);
  const iceRef=DB.find(c=>c.pt==='ice')||DB[0];
  const iceTco=calcTCO('ice',iceRef.newP,iceRef.brand,0,km);
  const dd=getDd();

  // Why text
  let why='';
  if(best==='hev'){
    const savY=Math.max(0,Math.round(iceTco.yf-bTco.yf));
    why=lang==='fr'
      ?`Avec vos trajets ${tr==='short'?'courts et urbains':'mixtes'} et ${fmt(km)} km/an, l'hybride est le meilleur compromis. Vous économisez ${E(savY)} en carburant par an sans jamais brancher.`
      :`With your ${tr==='short'?'short urban':'mixed'} trips and ${fmt(km)}km/year, hybrid is the best balance. You save ${E(savY)} in fuel/year without ever plugging in.`;
  }else if(best==='bev'){
    why=lang==='fr'
      ?`Avec ${h?'votre recharge domicile et ':''} ${fmt(km)} km/an, l'électrique est financièrement très compétitif. Le coût au kilomètre est le plus bas.`
      :`With ${h?'home charging and ':''}${fmt(km)}km/year, electric is financially very competitive. Lowest cost per kilometre.`;
  }else if(best==='phev'){
    why=lang==='fr'
      ?`Avec votre recharge domicile, le PHEV permet de rouler principalement en électrique sur vos trajets courts tout en gardant l'autonomie thermique.`
      :`With home charging, the PHEV lets you run mainly on electric for short trips while keeping petrol range for long journeys.`;
  }else{
    why=lang==='fr'
      ?`Pour votre profil, le moteur essence reste la solution la plus simple et économique à votre kilométrage.`
      :`For your profile, petrol remains the simplest and most economical solution at your mileage level.`;
  }

  // Contextual warnings
  let warns='';
  // PHEV trap banner removed from results — shown dynamically in Q3 feedback instead
  if(best==='bev'&&!h)warns+=`<div class="pill pill-warn">${t('bev_no_charge')}</div>`;
  if(best==='bev'&&h)warns+=`<div class="pill pill-good">${t('bev_great')}</div>`;
  if(best==='hev'&&tr==='short')warns+=`<div class="pill pill-good">${t('hev_urban')}</div>`;
  if(best==='bev'&&dd.wp>20)warns+=`<div class="pill pill-warn">${t('bev_cold').replace('{pct}',dd.wp)}</div>`;
  if(dd.zfe)warns+=`<div class="pill pill-warn">${t('zfe_warn')}</div>`;
  if(dd.ri>1.15)warns+=`<div class="pill pill-warn">${t('repair_high').replace('{pct}',Math.round((dd.ri-1)*100))}</div>`;

  // Diesel-specific warnings
  if(best==='die'&&(tr==='short')){
    warns+=`<div class="pill pill-warn">${lang==='fr'?
      '⚠ Trajets courts: risque FAP (750€ de remplacement moyen)':
      '⚠ Short trips: DPF clogging risk (avg €750 replacement)'}</div>`;
    warns+=`<div class="pill pill-warn">${lang==='fr'?
      '⚠ Diesel déconseillé en usage urbain court':
      '⚠ Diesel not recommended for short urban use'}</div>`;
  }
  if(best==='die'&&(tr==='long'||tr==='vlong')){
    warns+=`<div class="pill pill-good">${lang==='fr'?
      '✓ Usage longue distance: diesel optimisé, FAP protégé':
      '✓ Long-distance use: diesel optimised, DPF protected'}</div>`;
  }
  if(best==='die'){
    warns+=`<div class="pill pill-warn">${lang==='fr'?
      '🛢 ZFE: Crit\u2019Air 2 — vérifiez restrictions de votre ville':
      '🛢 ZFE: Crit\u2019Air 2 — check your city restrictions'}</div>`;
  }

  // Local context bar (only if dept selected)
  let localBar='';
  if(st.dept){
    const repIdx=dd.ri>1?`+${Math.round((dd.ri-1)*100)}%`:`${Math.round((dd.ri-1)*100)}%`;
    const repBadge=dd.ri>1.15?'lbadge-warn':dd.ri<0.95?'lbadge-good':'';
    const zfeBadge=dd.zfe?'lbadge-bad':'lbadge-good';
    const zfeTxt=dd.zfe?t('local_zfe'):t('local_no_zfe');
    const bevWp=`−${dd.wp}%`;
    // Only show localBar if there's something meaningful (repair >5% or cold BEV warning or ZFE)
    const showRepair = Math.abs(dd.ri-1) > 0.05;
    const showZfe = dd.zfe;
    const showBevCold = best==='bev' && dd.wp>10;
    if(showRepair || showZfe || showBevCold){
      localBar=`<div class="local-bar">
        <div class="local-item"><span>${getDeptName()}</span></div>
        ${showRepair?`<div class="local-item">${t('local_repair')} <strong class="${repBadge}" style="background:none">${repIdx}</strong></div>`:''}
        ${showBevCold?`<div class="local-item">${t('local_bev')} <strong>${bevWp}</strong></div>`:''}
        ${showZfe?`<div class="local-item"><span class="local-badge ${zfeBadge}">${zfeTxt}</span></div>`:''}
      </div>`;
    }
  }

  // Break-even
  let beHtml='';
  if(best!=='ice'){
    const extra=refCar.newP-iceRef.newP;
    const savA=(iceTco.yf+iceTco.rep)-(bTco.yf+bTco.rep);
    if(savA>100&&extra>0){
      const yrs=extra/savA;
      const dur=lang==='fr'
        ?(yrs<1?'immédiatement':yrs<=7?(yrs.toFixed(1).replace('.',',')+' ans'):'sur le long terme')
        :(yrs<1?'immediately':yrs<=7?(yrs.toFixed(1)+' years'):'over the long term');
      beHtml=`<div class="breakeven"><div class="breakeven-title">${t('be_title')}</div>
        <div class="breakeven-text">${lang==='fr'
          ?`Le surcoût d'achat (${E(Math.round(extra))}) est récupéré en <strong>${dur}</strong> grâce aux économies (${E(Math.round(savA))}/an).`
          :`The extra purchase cost (${E(Math.round(extra))}) is recovered in <strong>${dur}</strong> through savings (${E(Math.round(savA))}/year).`
        }</div></div>`;
    }
  }

  // PT comparison
  const compPts=best==='die'?['ice','hev','phev','bev','die']:
    (st.trips==='long'||st.trips==='vlong')?['ice','hev','phev','bev','die']:
    ['ice','hev','phev','bev'];
  const ptComp=compPts.map(pt=>{
    // Use best affordable car per PT in user's budget+segment — consistent with result columns
    const pool=DB.filter(car=>{
      if(car.pt!==pt)return false;
      const net=purchAtAge(car,0)-incForCar(car,0);
      const segOk=bodySegs.length===0||car.seg.some(s=>bodySegs.includes(s));
      return net<=st.budget&&segOk;
    });
    const wider=DB.filter(c=>c.pt===pt);
    const ref=(pool.length?pool:wider).sort((a,b)=>carPrefScore(b,pt)-carPrefScore(a,pt))[0]||null;
    if(!ref)return null;
    const tc=calcTCO(pt,ref.newP,ref.brand,0,km);
    return{pt,mo:tc.mo,gp:purchAtAge(ref,0)-incForCar(ref,0),name:ref.name};
  }).filter(Boolean);

  return{best,bTco,iceTco,why,warns,localBar,beHtml,ptComp,refCar,bodySegs};
}
