// Renders the interior HTML of the refine panel (5 sections).
function renderRefinePanelBody(){
  const stylePref = st.style_preference;
  const tradeoff  = st.age_equip_tradeoff || 'balanced';
  const favs      = (st.brand_prefs && st.brand_prefs.favorites) || [];
  const excl      = (st.brand_prefs && st.brand_prefs.excluded) || [];
  const feats     = st.required_features || [];
  const pc        = st.physical_constraints || {};

  // Section 1 — style
  // v50 : utilise les silhouettes v11 (mêmes que celles du parcours guidé) au lieu des SVGs simplistes inline
  const styleStatus = stylePref ? `· ${rt('style_'+stylePref)} ✓` : '';
  const styleGrid = REFINE_STYLE_OPTIONS.map(o=>`
    <div class="style-option${stylePref===o.v?' selected':''}" onclick="pickRefineStyle('${o.v}')">
      ${(typeof silhouetteSVG === 'function' ? silhouetteSVG(o.v) : o.svg)}
      <div class="style-option-label">${rt(o.tkey)}</div>
    </div>`).join('');

  // Section 2 — age/equipment
  const ageStatus = (tradeoff && tradeoff !== 'balanced') ? `· ${rt('age_'+tradeoff)} ✓` : '';
  const agePoints = [['recent','age_recent'],['balanced','age_balanced'],['equipped','age_equipped']].map(([v,k])=>`
    <div class="age-equip-point${tradeoff===v?' active':''}" onclick="pickRefineAgeTradeoff('${v}')">${rt(k)}</div>
  `).join('');

  // Section 3 — brands
  const brandStatus = (favs.length||excl.length) ? `· ❤${favs.length} ✕${excl.length}` : '';
  const brands = getRefineBrandList();
  const brandRows = brands.map(b=>{
    const isFav = favs.includes(b), isExc = excl.includes(b);
    return `<div class="brand-prefs-row">
      <div class="brand-prefs-name">${brandDisplayName(b)}</div>
      <div class="brand-prefs-actions">
        <button class="brand-prefs-btn favorite${isFav?' active':''}" onclick="toggleBrandPref('${b}','favorite')">${rt('brand_favorite')}</button>
        <button class="brand-prefs-btn exclude${isExc?' active':''}"  onclick="toggleBrandPref('${b}','exclude')">${rt('brand_exclude')}</button>
      </div>
    </div>`;
  }).join('');

  // Section 4 — features
  const featStatus = feats.length ? `· ${feats.length}/3 ✓` : '';
  const featGrid = REFINE_FEATURES.map(f=>{
    const sel = feats.includes(f.v);
    return `<div class="feature-option${sel?' selected':''}" onclick="toggleRequiredFeature('${f.v}')">
      <div class="feature-option-check">${sel?'✓':''}</div>
      <div>${rt(f.tkey)}</div>
    </div>`;
  }).join('');

  // Section 5 — physical constraints
  const hasConstraint = !!(pc.max_length_cm || pc.max_width_cm || pc.max_height_cm);
  const physStatus = hasConstraint ? '· ✓' : '';
  const physFields = ['length','width','height'].map(dim=>`
    <div class="physical-field">
      <label>${rt('physical_max_'+dim)}</label>
      <input type="number" min="100" max="700" step="1" placeholder="${rt('physical_placeholder')}"
             value="${pc['max_'+dim+'_cm']||''}"
             onchange="setPhysicalConstraint('${dim}', this.value)">
    </div>
  `).join('');

  const note = `<div class="refine-note">${rt('refine_note_soon')}</div>`;

  return `
    <div class="refine-section open" id="refine-sec-style">
      <div class="refine-section-header" onclick="toggleRefineSection('refine-sec-style')">
        <div class="refine-section-title">${rt('refine_style_title')} <span class="refine-section-status">${styleStatus}</span></div>
        <div class="refine-section-chevron">▾</div>
      </div>
      <div class="refine-section-body">
        <div class="refine-section-sub">${rt('refine_style_sub')}</div>
        <div class="style-grid">${styleGrid}</div>
      </div>
    </div>

    <div class="refine-section" id="refine-sec-age">
      <div class="refine-section-header" onclick="toggleRefineSection('refine-sec-age')">
        <div class="refine-section-title">${rt('refine_age_title')} <span class="refine-section-status">${ageStatus}</span></div>
        <div class="refine-section-chevron">▾</div>
      </div>
      <div class="refine-section-body">
        <div class="refine-section-sub">${rt('refine_age_sub')}</div>
        <div class="age-equip-slider">${agePoints}</div>
      </div>
    </div>

    <div class="refine-section" id="refine-sec-brands">
      <div class="refine-section-header" onclick="toggleRefineSection('refine-sec-brands')">
        <div class="refine-section-title">${rt('refine_brands_title')} <span class="refine-section-status">${brandStatus}</span></div>
        <div class="refine-section-chevron">▾</div>
      </div>
      <div class="refine-section-body">
        <div class="refine-section-sub">${rt('refine_brands_sub')}</div>
        <div class="brand-prefs-list">${brandRows}</div>
      </div>
    </div>

    <div class="refine-section" id="refine-sec-features">
      <div class="refine-section-header" onclick="toggleRefineSection('refine-sec-features')">
        <div class="refine-section-title">${rt('refine_features_title')} <span class="refine-section-status">${featStatus}</span></div>
        <div class="refine-section-chevron">▾</div>
      </div>
      <div class="refine-section-body">
        <div class="refine-section-sub">${rt('refine_features_sub')}</div>
        <div class="features-grid">${featGrid}</div>
        <div id="refine-features-note" class="refine-note" style="min-height:16px"></div>
        ${note}

    </div>

    <div class="refine-section" id="refine-sec-physical">
      <div class="refine-section-header" onclick="toggleRefineSection('refine-sec-physical')">
        <div class="refine-section-title">${rt('refine_physical_title')} <span class="refine-section-status">${physStatus}</span></div>

        <div class="physical-fields">${physFields}</div>

      </div>

  `;
}

function renderResults(){
  const rec=getRec();
  mpTrack('results_shown',{
    recommended_pt: rec.pt,
    budget: st.budget,
    km: getKm(),
    trips: st.trips,
    parking: st.home,
    country: activeCountry,
    body: st.body||[],
    age_bracket: st.age||null,
    dept: st.dept||null,
    urban: st.urban||null,
    lang: lang,
    // Funnel completion flag
    completed: true,
  });
  const{best,bTco,iceTco,why,warns,localBar,beHtml,ptComp,refCar,bodySegs}=rec;
  const ptN={ice:t('ice_n'),hev:t('hev_n'),phev:t('phev_n'),bev:t('bev_n'),die:lang==='fr'?'Diesel':'Diesel'};
  const ptF={ice:t('ice_f'),hev:t('hev_f'),phev:t('phev_f'),bev:t('bev_f'),die:lang==='fr'?'Gazole':'Diesel fuel'};
  const barC={ice:'bar-gray',hev:'bar-teal',phev:'bar-amber',bev:'bar-blue',die:'bar-diesel'};
  const budget=st.budget,km=getKm();

  // Supabase — silent
  storeSession(best,refCar && refCar.id);
  // Email capture widget
  setTimeout(showEmailCapture, 1500);

  // Budget comparison — 3 scenarios
  const scenarios=[
    {age:0,lbl:t('bc_neuf_label'),sub:t('bc_neuf_sub'),fill:'var(--teal-pal)',isNeuf:true},
    {age:2,lbl:t('bc_occ2_label'),sub:t('bc_occ2_sub'),fill:'var(--amber-pal)',isNeuf:false},
    {age:5,lbl:t('bc_occ5_label'),sub:t('bc_occ5_sub'),fill:'var(--bg)',isNeuf:false},
  ];
  // v60 : Option C — pas de déduplication entre colonnes.
  // Chaque colonne montre son TOP indépendamment. Si la même voiture gagne dans plusieurs
  // âges, elle apparaît dans plusieurs colonnes (avec un badge visuel pour indiquer).
  // v53 : on calcule en plus le ranking TCO global avec assouplissement progressif
  // pour aligner le top de chaque colonne sur le pipeline driver-as-filter
  const _v53view = buildResultsView(DB, st);
  const _v53rankings = (_v53view && _v53view.columnsRankings) || {new:[],used2y:[],used5y:[]};
  const _v53levels = (_v53view && _v53view.columnsLevels) || {new:0,used2y:0,used5y:0};
  const _v52ranks = {  // Alias pour rétro-compat
    0: _v53rankings.new || [],
    2: _v53rankings.used2y || [],
    5: _v53rankings.used5y || [],
  };
  const _v52view = _v53view;  // Alias
  // v60 : identifie les car_ids qui apparaissent en top dans plusieurs colonnes
  // (pour badge "Aussi disponible en X ans" dans le rendering)
  const _topCarIdsByAge = {};
  scenarios.forEach(sc => {
    const ranked = (_v52ranks[sc.age] || []).map(r => r.car);
    const topId = (ranked[0] && ranked[0].id) || null;
    if (topId) _topCarIdsByAge[sc.age] = topId;
  });
  const _carAgesAppearance = {};
  Object.entries(_topCarIdsByAge).forEach(([age, id]) => {
    if (!_carAgesAppearance[id]) _carAgesAppearance[id] = [];
    _carAgesAppearance[id].push(parseInt(age,10));
  });
  const scRes=scenarios.map(sc=>{
    // v60 : ranking complet sans dédup, chaque colonne prend ses top 3 indépendamment
    const ranked = (_v52ranks[sc.age] || []).map(r => r.car);
    let cars;
    if (ranked.length > 0) {
      cars = ranked;  // pas de filter shownIds
    } else {
      cars = carsForBudget(budget,sc.age,best,bodySegs,[]);  // [] = pas de exclude
    }
    const bc=cars[0]||null;
    const pp=bc?purchAtAge(bc,sc.age):0;
    const inc=bc?incForCar(bc,sc.age):0;
    const net=pp-inc;
    const saving=bc&&sc.age>0?Math.round(bc.newP-pp):0;
    const mo=bc?calcTCO(bc.pt,bc.newP,bc.brand,sc.age,km).mo:0;
    // v60 : siblings (TCO du bc à TOUS les âges) — pour sparkline
    let bcSiblings = {};
    if (bc) {
      [0, 2, 5].forEach(otherAge => {
        if (otherAge === sc.age) { bcSiblings[otherAge] = Math.round(mo); return; }
        // Cherche le même car dans le ranking de l'autre âge
        const otherRanked = (_v52ranks[otherAge] || []).find(r => r.car && r.car.id === bc.id);
        if (otherRanked) { bcSiblings[otherAge] = Math.round(otherRanked.tcoMonthly); return; }
        // Fallback: calcule on-the-fly
        try {
          const tcoOther = calcTCO(bc.pt, bc.newP, bc.brand, otherAge, km);
          if (tcoOther && tcoOther.mo > 0) bcSiblings[otherAge] = Math.round(tcoOther.mo);
        } catch (e) {}
      });
    }
    // v60 : badge "aussi en X ans" si même car gagne dans plusieurs colonnes
    const bcAlsoIn = (bc && _carAgesAppearance[bc.id] && _carAgesAppearance[bc.id].length > 1)

window.checkDisc=function(){

  else{rec=fr?'Essence / Diesel (longs trajets)':de?'Benzin / Diesel (Langstrecke)':nl?'Benzine / Diesel (lange ritten)':es?'Gasolina / Diésel (largas distancias)':it?'Benzina / Diesel (lunghi tragitti)':'Petrol / Diesel (long distance)';emoji='⛽';why=fr?'Sans prise et longs trajets : thermique reste le plus rentable.':'No socket + long trips: ICE remains most cost-effective.';}

  else{const ta=document.createElement('textarea');ta.value=url;document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);}
}

// Auto-detect language from browser + country context
// User can always override manually with the buttons
(function autoDetectLang(){
  const supported = ['fr','en','de','nl','es','it'];
  // For Switzerland: language is determined by navigator.language region
  // Europe/Zurich + de/de-CH → DE, + fr/fr-CH → FR, + it/it-CH → IT
  const isSwiss = activeCountry === 'ch';
  const isBilingual = isSwiss || activeCountry === 'be';
  const map = {
    'fr':'fr','fr-fr':'fr','fr-be':'fr','fr-ch':'fr','fr-lu':'fr','fr-ca':'fr',
    'en':'en','en-gb':'en','en-us':'en','en-au':'en','en-ca':'en',
    'de':'de','de-de':'de','de-at':'de','de-ch':'de',
    'nl':'nl','nl-nl':'nl','nl-be':'nl',
    'es':'es','es-es':'es','es-mx':'es','es-ar':'es','es-co':'es',
    'it':'it','it-it':'it','it-ch':'it',
  };
  const langs = navigator.languages || [navigator.language];
  let detected = langs.map(l => map[l.toLowerCase()] || map[l.toLowerCase().split('-')[0]])
                       .find(l => supported.includes(l));
  // Swiss + Belgian special case: keep language from browser, just confirm country
  if(isSwiss || activeCountry === 'be'){
    const regionalMap = {
      'de-ch':'de','fr-ch':'fr','it-ch':'it','rm-ch':'de', // Swiss
      'nl-be':'nl','fr-be':'fr','de-be':'de',               // Belgian
    };
    const regional = langs.map(l=>regionalMap[l.toLowerCase()]).find(Boolean);
    if(regional) detected = regional;
  }
  if(detected && detected !== lang) setLang(detected);
})();

// ── MOBILE TABS// ── RÉSEAU CONCESSIONNAIRES PAR RÉGION─────────────────
let _mobileTabIdx = 0;

function initMobileTabs(bestIdx) {
  if(window.innerWidth > 680) return;
  _mobileTabIdx = bestIdx || 0;
  renderMobileTabs();
  initMobileSwipe();
}

function renderMobileTabs() {
  const grid = document.querySelector('.budget-compare-grid');
  if(!grid) return;
  const cols = grid.querySelectorAll('.bc-col');
  if(!cols.length) return;

  // Remove old tab bar if exists
  const oldBar = document.getElementById('mobile-tab-bar');
  if(oldBar) oldBar.remove();
  const oldDots = document.getElementById('mobile-dots');
  if(oldDots) oldDots.remove();

  // Build tab labels from column headers
  const tabLabels = Array.from(cols).map((col,i) => {
    const lbl = col.querySelector('.bc-header-label');
    const sub = col.querySelector('.bc-header-sub');
    const isBest = col.classList.contains('best-col');
    return {
      label: lbl ? lbl.textContent.trim() : (i===0?'Neuf':'Occ'),
      sub: sub ? sub.textContent.trim().replace(/\s*·\s*/g,' ') : '',
      isBest
    };
  });

  // Tab bar HTML
  const tabBar = document.createElement('div');
  tabBar.id = 'mobile-tab-bar';
  tabBar.className = 'mobile-tab-bar';
  tabBar.innerHTML = tabLabels.map((t,i) => `
    <button class="mobile-tab-btn${i===_mobileTabIdx?' active':''}${t.isBest?' best-tab':''}"
      onclick="setMobileTab(${i})">
      ${t.label}
    </button>`).join('');
  grid.parentNode.insertBefore(tabBar, grid);

  // Dots
  const dots = document.createElement('div');
  dots.id = 'mobile-dots';
  dots.className = 'mobile-dots';
  dots.innerHTML = tabLabels.map((_,i) =>
    `<div class="mobile-dot${i===_mobileTabIdx?' active':''}" onclick="setMobileTab(${i})"></div>`
  ).join('');
  grid.parentNode.insertBefore(dots, grid.nextSibling);

  // Show active col
  cols.forEach((col,i) => col.classList.toggle('mobile-active', i===_mobileTabIdx));
}

function setMobileTab(idx) {
  // Suppress stagger animation on tab switch
  document.querySelectorAll('.bc-col').forEach(col=>{
    col.style.animation='none';
    col.style.opacity='1';
    col.style.transform=col.classList.contains('best-col')?'translateY(-6px)':'translateY(0)';
  });
  const grid = document.querySelector('.budget-compare-grid');
  if(!grid) return;
  const cols = grid.querySelectorAll('.bc-col');
  _mobileTabIdx = Math.max(0, Math.min(idx, cols.length-1));

  cols.forEach((col,i) => col.classList.toggle('mobile-active', i===_mobileTabIdx));

  // Update tabs
  document.querySelectorAll('.mobile-tab-btn').forEach((btn,i) =>
    btn.classList.toggle('active', i===_mobileTabIdx));

  // Update dots
  document.querySelectorAll('.mobile-dot').forEach((dot,i) =>
    dot.classList.toggle('active', i===_mobileTabIdx));
}

function initMobileSwipe() {
  const grid = document.querySelector('.budget-compare-grid');
  if(!grid) return;
  let startX = 0, startY = 0, startTarget = null;
  grid.addEventListener('touchstart', e => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    startTarget = e.target;
  }, {passive:true});
  grid.addEventListener('touchend', e => {
    // Don't trigger swipe if touch started inside a table or scroll area
    if(startTarget && (startTarget.closest('table') || startTarget.closest('.age-table-wrap'))) return;
    const dx = e.changedTouches[0].clientX - startX;
    const dy = e.changedTouches[0].clientY - startY;
    if(Math.abs(dx) < 40 || Math.abs(dy) > Math.abs(dx)) return;
    const cols = grid.querySelectorAll('.bc-col');
    if(dx < 0) setMobileTab(Math.min(_mobileTabIdx+1, cols.length-1));
    else setMobileTab(Math.max(_mobileTabIdx-1, 0));
  }, {passive:true});
}

// Re-init on resize
window.addEventListener('resize', () => {
  if(window.innerWidth <= 680) {
    const bestCol = document.querySelector('.bc-col.best-col');
    const cols = document.querySelectorAll('.bc-col');
    let bestIdx = 0;
    cols.forEach((c,i) => { if(c.classList.contains('best-col')) bestIdx=i; });
    initMobileTabs(bestIdx);
  } else {
    const oldBar = document.getElementById('mobile-tab-bar');
    if(oldBar) oldBar.remove();
    const oldDots = document.getElementById('mobile-dots');
    if(oldDots) oldDots.remove();
    document.querySelectorAll('.bc-col').forEach(c => c.classList.remove('mobile-active'));
  }
});

// DEPRECIATION CHART SVG (v38 Phase B)
// ══════════════════════════════════════════════════════════════
// Render an SVG chart showing depreciation over 5 years with:
//   - Filled area for confidence cone (p10..p90)
//   - Bold line for median (p50)
//   - 3 milestone markers (year 1, 3, 5)
//   - Y-axis grid
//   - X-axis labels (years)
//
// Inspired by the existing v37 SVG style (lines 7766+).

function renderDepreciationChartSvg(points, options) {
  options = options || {};
  if (!points || points.length === 0) return '<div class="garage-empty-mini">—</div>';

  const W = options.width || 640;
  const H = options.height || 280;
  const PAD_L = 60, PAD_R = 24, PAD_T = 24, PAD_B = 40;
  const PW = W - PAD_L - PAD_R;
  const PH = H - PAD_T - PAD_B;

  // Domain
  const allValues = [];
  points.forEach(p => { allValues.push(p.p10, p.p50, p.p90); });
  const yMin = 0;
  const yMax = Math.max(...allValues) * 1.05;
  const xMin = 0;
  const xMax = points.length - 1;

  const sx = i => PAD_L + (PW * (i - xMin)) / (xMax - xMin || 1);
  const sy = v => PAD_T + PH - (PH * (v - yMin)) / (yMax - yMin || 1);

  const cur = (options.country === 'ch') ? 'CHF' : '€';
  const fmtV = v => {
    if (v >= 100000) return Math.round(v/1000) + 'k';
    if (v >= 10000) return (Math.round(v/100)/10).toFixed(0) + 'k';
    return Math.round(v).toLocaleString('fr-FR');
  };

  // Y axis grid
  let yGrid = '';
  let yLabels = '';
  const ticks = 5;
  for (let i = 0; i <= ticks; i++) {
    const v = yMin + (yMax - yMin) * i / ticks;
    const y = sy(v);
    yGrid += `<line x1="${PAD_L}" y1="${y}" x2="${W - PAD_R}" y2="${y}" stroke="#e4e1d9" stroke-width="0.5" stroke-dasharray="2,3" />`;
    yLabels += `<text x="${PAD_L - 8}" y="${y + 4}" text-anchor="end" font-size="11" fill="#888" font-family="system-ui">${fmtV(v)}</text>`;
  }

  // X axis labels
  let xLabels = '';
  points.forEach((p, i) => {
    const x = sx(i);
    xLabels += `<text x="${x}" y="${H - 12}" text-anchor="middle" font-size="11" fill="#888" font-family="system-ui">${p.year}</text>`;
    if (i === 0) {
      xLabels += `<text x="${x}" y="${H - 24}" text-anchor="middle" font-size="10" fill="#aaa" font-family="system-ui">Aujourd'hui</text>`;
    } else {
      xLabels += `<text x="${x}" y="${H - 24}" text-anchor="middle" font-size="10" fill="#aaa" font-family="system-ui">+${i} ${i===1?'an':'ans'}</text>`;
    }
  });

  // Confidence cone
  const upperPts = points.map((p, i) => `${sx(i)},${sy(p.p90)}`).join(' ');
  const lowerPts = points.map((p, i) => `${sx(i)},${sy(p.p10)}`).reverse().join(' ');
  const conePath = `<polygon points="${upperPts} ${lowerPts}" fill="#1D9E75" fill-opacity="0.12" stroke="none" />`;

  // Outline cone
  const upperLine = points.map((p, i) => `${i===0?'M':'L'} ${sx(i)} ${sy(p.p90)}`).join(' ');
  const lowerLine = points.map((p, i) => `${i===0?'M':'L'} ${sx(i)} ${sy(p.p10)}`).join(' ');
  const coneOutlines = `
    <path d="${upperLine}" fill="none" stroke="#1D9E75" stroke-width="1" stroke-opacity="0.3" stroke-dasharray="2,3" />
    <path d="${lowerLine}" fill="none" stroke="#1D9E75" stroke-width="1" stroke-opacity="0.3" stroke-dasharray="2,3" />
  `;

  // Median line
  const medianPath = points.map((p, i) => `${i===0?'M':'L'} ${sx(i)} ${sy(p.p50)}`).join(' ');
  const medianLine = `<path d="${medianPath}" fill="none" stroke="#1D9E75" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />`;

  // Milestones (year 1, 3, 5)
  const milestones = [1, 3, 5].filter(i => i < points.length);
  let milestoneCircles = '';
  let milestoneLabels = '';
  milestones.forEach(i => {
    const p = points[i];
    const x = sx(i), y = sy(p.p50);
    milestoneCircles += `
      <circle cx="${x}" cy="${y}" r="6" fill="#1D9E75" stroke="#fff" stroke-width="2" />
      <circle cx="${x}" cy="${y}" r="11" fill="none" stroke="#1D9E75" stroke-width="1" stroke-opacity="0.25" />
    `;
    const labelY = y - 14;
    milestoneLabels += `
      <rect x="${x-32}" y="${labelY-13}" width="64" height="20" rx="4" fill="#fff" stroke="#1D9E75" stroke-width="1" />
      <text x="${x}" y="${labelY+1}" text-anchor="middle" font-size="11" font-weight="600" fill="#1D9E75" font-family="system-ui">${cur}${fmtV(p.p50)}</text>
    `;
  });

  // Current marker
  const p0 = points[0];
  const currentMarker = `<circle cx="${sx(0)}" cy="${sy(p0.p50)}" r="7" fill="#fff" stroke="#1D9E75" stroke-width="3" />`;

  return `
    <svg width="100%" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" overflow="visible" preserveAspectRatio="xMidYMid meet">
      ${yGrid}
      ${conePath}
      ${coneOutlines}
      ${medianLine}
      ${yLabels}
      ${xLabels}
      ${currentMarker}
      ${milestoneCircles}
      ${milestoneLabels}
    </svg>
  `;
}

function gT(key) {

}

// ── v38.1 : Build brand list from priceGrid (broader than DB funnel)
// Gives access to all scraped AS24 models with their actual fuel options.
// Falls back to DB if priceGrid not yet loaded.
function garageBrandList() {
  if (typeof priceGridData !== 'undefined' && priceGridData) {
    const set = new Set();
    Object.keys(priceGridData).forEach(mid => {
      set.add(mid.split('/')[0]);
    });
    return Array.from(set).sort();
  }
  // Fallback DB
  if (typeof DB === 'undefined') return [];
  const set = new Set();
  DB.forEach(c => set.add(c.brand));
  return Array.from(set).sort();
}

function garageBrandLabel(brand) {
  const SPECIAL = {
    bmw:'BMW', vw:'Volkswagen', ds:'DS', mg:'MG', byd:'BYD',
    landrover:'Land Rover', alfa:'Alfa Romeo', mercedes:'Mercedes-Benz',
    mini:'MINI', smart:'smart',
  };
  if (SPECIAL[brand]) return SPECIAL[brand];
  return brand.charAt(0).toUpperCase() + brand.slice(1);
}

// ── v38.1 : Build model list from priceGrid for a brand
// Returns: [{slug, label, fuels: ['ice','die','hev','phev','bev']}, ...]
// Each model has its actually-scraped motorisations as options.
function garageModelList(brand) {
  if (!brand) return [];
  if (typeof priceGridData !== 'undefined' && priceGridData) {
    const out = [];
    Object.keys(priceGridData).forEach(mid => {
      const [b, slug] = mid.split('/');
      if (b !== brand) return;
      const fuels = Object.keys(priceGridData[mid]);
      out.push({
        slug: slug,
        label: garageModelLabel(slug),
        fuels: fuels,
      });
    });
    return out.sort((a, b) => a.label.localeCompare(b.label));
  }
  // Fallback DB
  if (typeof DB === 'undefined') return [];
  return DB.filter(c => c.brand === brand)
           .map(c => ({slug: c.id, label: c.name, fuels: [c.pt]}))
           .sort((a, b) => a.label.localeCompare(b.label));
}

// ── v38.1 : Pretty-print a model slug
// Ex: "3-series" -> "Série 3", "c-class" -> "Classe C", "model-3" -> "Model 3"
function garageModelLabel(slug) {
  // Capitalize each part separated by hyphens
  const parts = slug.split('-');
  // Special transforms
  if (parts.length >= 2 && parts[parts.length-1] === 'series') {
    return 'Série ' + parts[0]; // "3-series" -> "Série 3"
  }
  if (parts.length >= 2 && parts[parts.length-1] === 'class') {
    return 'Classe ' + parts[0].toUpperCase(); // "c-class" -> "Classe C"
  }
  // Generic: capitalize each word
  return parts.map(p => {
    if (/^\d/.test(p)) return p; // keep numbers as-is
    return p.charAt(0).toUpperCase() + p.slice(1);
  }).join(' ');
}

// ── v38.1 : Pretty-print a powertrain code
function garageFuelLabel(pt) {
  const FR = {
    ice: 'Essence', die: 'Diesel', hev: 'Hybride',
    phev: 'Hybride rechargeable (PHEV)', bev: 'Électrique',
  };
  const EN = {
    ice: 'Petrol', die: 'Diesel', hev: 'Hybrid',
    phev: 'Plug-in hybrid (PHEV)', bev: 'Electric',
  };
  const t = (typeof lang !== 'undefined' && lang === 'en') ? EN : FR;
  return t[pt] || pt.toUpperCase();
}

// ── Render the main garage modal
function renderGarageModal(prefilledForm) {
  // Remove existing if any
  const existing = document.getElementById('garage-modal');
  if (existing) existing.remove();

  const overlay = document.createElement('div');
  overlay.id = 'garage-modal';
  overlay.className = 'garage-modal-overlay';
  overlay.innerHTML = `
    <div class="garage-modal-card" role="dialog" aria-labelledby="garage-modal-title">
      <button class="garage-modal-close" onclick="closeGarageModal()" aria-label="${gT('close')}">×</button>
      <div class="garage-modal-header">
        <h2 id="garage-modal-title">🚗 ${gT('title')}</h2>
        <p>${gT('subtitle')}</p>
      </div>
      <div id="garage-modal-body" class="garage-modal-body"></div>
    </div>
  `;
  document.body.appendChild(overlay);

  // Lock scroll
  document.body.style.overflow = 'hidden';

  // Render content based on state
  if (prefilledForm) {
    renderGarageForm(prefilledForm);
  } else {
    renderGarageList();
  }

  // ESC to close
  document.addEventListener('keydown', _garageEscHandler);
  // Click outside
  overlay.addEventListener('click', e => {
    if (e.target === overlay) closeGarageModal();
  });

  if (typeof mpTrack === 'function') mpTrack('garage_open', {count: GarageStore.count()});
}

function _garageEscHandler(e) {
  if (e.key === 'Escape') closeGarageModal();
}

function closeGarageModal() {
  const m = document.getElementById('garage-modal');
  if (m) m.remove();
  document.body.style.overflow = '';
  document.removeEventListener('keydown', _garageEscHandler);
  updateGarageBadge();
}

  const name = (vehicle.snapshot && vehicle.snapshot.name) || (car && car.name) || vehicle.modelName || '–';

    <div class="garage-vcard" data-id="${vehicle.id}">
      <div class="garage-vcard-top" onclick="renderGarageDetail('${vehicle.id}')" style="cursor:pointer">

        <div class="garage-vcard-row">
          <span class="garage-vcard-label">${gT('card_value_now')}</span>
          <span class="garage-vcard-value">${cur}${fmtN(value)}${cur2}</span>
        </div>
        ${purchase ? `
        <div class="garage-vcard-row">
          <span class="garage-vcard-label">${gT('card_purchase')}</span>
          <span class="garage-vcard-value-small">${cur}${fmtN(purchase)}${cur2}</span>

// v39 : cascade brand -> model -> fuel
function updateGarageModelOptions(brand, selectedSlug, selectedPt) {
  const sel = document.getElementById('gf-model');
  if (!sel) return;
  if (!brand) {
    sel.innerHTML = `<option value="">${gT('form_model_ph')}</option>`;
    updateGarageFuelOptions('', '');
    return;
  }
  const models = garageModelList(brand);
  sel.innerHTML = `<option value="">${gT('form_model_ph')}</option>` +
    models.map(m => `<option value="${m.slug}" ${m.slug===selectedSlug?'selected':''}>${m.label}</option>`).join('');

  // If a model was pre-selected, populate fuels
  if (selectedSlug) {
    updateGarageFuelOptions(selectedSlug, selectedPt);
  } else {
    updateGarageFuelOptions('', '');
  }
}

function updateGarageFuelOptions(slug, selectedPt) {
  const fuelSel = document.getElementById('gf-fuel');
  if (!fuelSel) return;
  const brand = (document.getElementById('gf-brand') || {}).value;
  if (!brand || !slug) {
    fuelSel.innerHTML = `<option value="">${gT('form_fuel_ph') || 'Choisissez une motorisation…'}</option>`;
    updateGarageEngineOptions('', '');
    return;
  }
  // Find fuels available for this model in priceGridData
  let fuels = [];
  if (typeof priceGridData !== 'undefined' && priceGridData) {
    const mid = `${brand}/${slug}`;
    if (priceGridData[mid]) {
      fuels = Object.keys(priceGridData[mid]);
    }
  }
  if (fuels.length === 0) {
    // Fallback: allow all common fuels
    fuels = ['ice', 'die', 'hev', 'phev', 'bev'];
  }
  fuelSel.innerHTML = `<option value="">${gT('form_fuel_ph') || 'Choisissez une motorisation…'}</option>` +
    fuels.map(p => `<option value="${p}" ${p===selectedPt?'selected':''}>${garageFuelLabel(p)}</option>`).join('');
  // Trigger engine options refresh
  updateGarageEngineOptions(selectedPt || '', '');
}

// v60 : cascade fuel -> engine (version specifier)
// Lit catalog.engines_observed pour proposer les engine_codes observés
// v60.6 : filtre par année si gf-year est rempli (cache les engines incompatibles)
function updateGarageEngineOptions(pt, selectedEngine) {
  const engSel = document.getElementById('gf-engine');
  if (!engSel) return;
  const defaultOpt = `<option value="">${lang==='fr'?'Je ne sais pas / Toutes versions':'I don\'t know / All versions'}</option>`;
  if (!pt) { engSel.innerHTML = defaultOpt; return; }
  const brand = (document.getElementById('gf-brand') || {}).value;
  const slug  = (document.getElementById('gf-model') || {}).value;
  if (!brand || !slug) { engSel.innerHTML = defaultOpt; return; }

  // v60.6 : lire l'année du véhicule pour filtrer les engines compatibles
  const yearStr = (document.getElementById('gf-year') || {}).value;
  const userYear = yearStr ? parseInt(yearStr, 10) : null;
  const YEAR_TOLERANCE = 1;  // accepte ±1 an pour pre-production / late stock

  // Lookup engines in vehicle_catalog (v6 has engines_observed dict)
  let engines = [];
  if (typeof vehicleCatalogData !== 'undefined' && vehicleCatalogData && vehicleCatalogData.catalog) {
    const cat = vehicleCatalogData.catalog;
    const entry = Object.values(cat).find(e =>
      e && e.brand === brand && e.model_family === slug &&
      e.engines_observed && e.engines_observed[pt]
    );
    if (entry) engines = entry.engines_observed[pt] || [];
  }
  if (engines.length === 0) {
    engSel.innerHTML = defaultOpt;
    return;
  }

  // v60.6 : filter by year if year is set
  let filteredEngines = engines;
  let yearFilterActive = false;
  if (userYear && userYear >= 1990 && userYear <= 2030) {
    const compatible = engines.filter(e => {
      if (e.year_min == null || e.year_max == null) return true;  // unknown range → keep
      return (e.year_min - YEAR_TOLERANCE) <= userYear && userYear <= (e.year_max + YEAR_TOLERANCE);
    });
    if (compatible.length > 0) {
      filteredEngines = compatible;
      yearFilterActive = true;
    }
    // else: fallback to all engines (degrade gracefully if no engine matches the year)
  }

  // Build options
  const hint = yearFilterActive
    ? ` <span style="color:#888;font-style:italic">(filtré pour année ${userYear})</span>`
    : '';
  engSel.innerHTML = defaultOpt +
    filteredEngines.map(e => {
      const hp = e.hp_est ? ` · ${e.hp_est} ch` : '';
      const delta = e.delta_pct ? ` · ${e.delta_pct > 0 ? '+' : ''}${e.delta_pct.toFixed(1)}%` : '';
      const yr = (e.year_min != null && e.year_max != null && e.year_min !== e.year_max)
                  ? ` · ${e.year_min}-${e.year_max}`
                  : (e.year_min != null ? ` · ${e.year_min}+` : '');
      const sel = e.code === selectedEngine ? 'selected' : '';
      return `<option value="${e.code}" ${sel}>${e.label}${hp}${delta}${yr}</option>`;
    }).join('');
}

function saveGarageForm(editId) {
  const errEl = document.getElementById('gf-err');
  errEl.style.display = 'none';
  const brand = document.getElementById('gf-brand').value;
  const slug = document.getElementById('gf-model').value;
  const pt = document.getElementById('gf-fuel').value;
  const engineCode = (document.getElementById('gf-engine') || {}).value || null;
  const year = parseInt(document.getElementById('gf-year').value);
  const km = parseInt(document.getElementById('gf-km').value);
  const price = parseInt(document.getElementById('gf-price').value);
  const pyear = parseInt(document.getElementById('gf-pyear').value) || null;
  const country = document.getElementById('gf-country').value;
  const akm = parseInt(document.getElementById('gf-akm').value) || 15000;

  const showErr = msg => { errEl.textContent = msg; errEl.style.display = 'block'; };
  if (!brand) return showErr(gT('err_brand'));
  if (!slug) return showErr(gT('err_model'));
  if (!pt) return showErr(gT('err_fuel') || 'Veuillez choisir une motorisation');
  if (!year || year < 1990 || year > new Date().getFullYear()) return showErr(gT('err_year'));
  if (km < 0 || km > 800000 || isNaN(km)) return showErr(gT('err_km'));
  if (price < 0 || price > 500000 || isNaN(price)) return showErr(gT('err_price'));

  // v60 : engine label (for display) and delta_pct (for TCO multiplier)
  let engineLabel = null;
  let engineDeltaPct = 0;
  if (engineCode && typeof vehicleCatalogData !== 'undefined' && vehicleCatalogData.catalog) {
    const entry = Object.values(vehicleCatalogData.catalog).find(e =>
      e && e.brand === brand && e.model_family === slug &&
      e.engines_observed && e.engines_observed[pt]
    );
    if (entry) {
      const e = (entry.engines_observed[pt] || []).find(x => x.code === engineCode);
      if (e) { engineLabel = e.label; engineDeltaPct = e.delta_pct || 0; }
    }
  }

  // v39 : build vehicle from grid (brand, slug, pt) — no DB.find needed
  const displayNameBase = `${garageBrandLabel(brand)} ${garageModelLabel(slug)} ${garageFuelLabel(pt)}`;
  const displayName = engineLabel ? `${displayNameBase} (${engineLabel})` : displayNameBase;

  const vehicle = {
    // v39 fields (canonical)
    gridBrand: brand,
    gridSlug: slug,
    gridPt: pt,
    // v60 : engine-level precision
    engineCode: engineCode,
    engineLabel: engineLabel,
    engineDeltaPct: engineDeltaPct,
    // Snapshot for resilience (DB might change, grid might shrink)
    snapshot: {
      brand: brand,
      name: displayName,
      pt: pt,
      segment: 'compact',  // best-effort default
      newP: null,           // unknown — will be inferred from grid age=0 if needed
    },
    // Backward compat: still set modelId if a matching DB entry exists
    modelId: (function() {
      if (typeof DB === 'undefined') return null;
      const c = DB.find(c => c.brand === brand && c.pt === pt);
      return c ? c.id : null;
    })(),
    year: year,
    km: km,
    purchasePrice: price,
    purchaseYear: pyear,
    country: country,
    annual_km: akm,
  };

  if (editId) {
    GarageStore.update(editId, vehicle);
    if (typeof mpTrack === 'function') mpTrack('garage_update', {brand, slug, pt, engine: engineCode});
  } else {
    GarageStore.add(vehicle);
    if (typeof mpTrack === 'function') mpTrack('garage_add', {brand, slug, pt, engine: engineCode});
  }

  renderGarageList();
  updateGarageBadge();
}

// ══════════════════════════════════════════════════════════════
// TCO DECOMPOSITION (v38 Phase C)
// ══════════════════════════════════════════════════════════════
function estimateMaintenance(vehicle) {
  const car = garageResolveCar(vehicle);
  if (!car) return null;
  const age = garageAge(vehicle);

  const SEGMENT_BASE = {
    micro: 400, small: 550, compact: 700, mid: 850,
    suv_compact: 750, suv_mid: 950, suv_large: 1200,
    saloon: 900, coupe_sport: 1100, mpv: 850,
  };
  const BRAND_MULT = {
    dacia: 0.75, mg: 0.85, byd: 0.85, suzuki: 0.80,
    toyota: 0.85, lexus: 0.95, honda: 0.85, mazda: 0.90,
    hyundai: 0.85, kia: 0.85, mitsubishi: 0.90, subaru: 0.95,
    vw: 1.00, skoda: 0.95, seat: 0.95, opel: 0.95,
    renault: 0.95, peugeot: 1.00, citroen: 1.00,
    ford: 1.00, fiat: 1.05,
    bmw: 1.50, audi: 1.45, mercedes: 1.50,
    volvo: 1.30, mini: 1.35, alfa: 1.40, ds: 1.30,
    cupra: 1.20, polestar: 1.25,
    porsche: 2.00, jaguar: 1.90, tesla: 0.65,
    landrover: 2.20,
  };
  const PT_MULT = { bev: 0.65, hev: 0.95, phev: 1.05, ice: 1.00, die: 1.10 };
  const AGE_MULT = [
    1.00, 1.05, 1.10, 1.30, 1.55, 1.80,
    2.05, 2.30, 2.55, 2.80, 3.05, 3.30, 3.55, 3.80, 4.05, 4.30
  ];

  const expectedKm = Math.max(age, 1) * 15000;
  const kmRatio = (vehicle.km || 0) / Math.max(expectedKm, 1);
  const KM_MULT = Math.max(0.85, Math.min(1.5, 0.85 + kmRatio * 0.15));

  let segment = 'compact';
  if (vehicle.snapshot && vehicle.snapshot.segment) segment = vehicle.snapshot.segment;
  else if (car.seg && car.seg[0]) segment = car.seg[0];

  const base = SEGMENT_BASE[segment] || 700;
  const brand = BRAND_MULT[car.brand] || 1.0;
  const pt = PT_MULT[(car.pt || 'ice').toLowerCase()] || 1.0;
  const ageM = AGE_MULT[Math.min(age, 15)];

  const annualAverage = Math.round(base * brand * pt * ageM * KM_MULT);
  return {
    annual: annualAverage,
    monthly: Math.round(annualAverage / 12),
    breakdown: { base, brand, pt, age: ageM, km: KM_MULT, segment },
    confidence: age <= 5 ? 'high' : age <= 10 ? 'medium' : 'low',
  };
}

function decomposeTcoMonthly(vehicle) {
  const car = garageResolveCar(vehicle);
  if (!car) return null;

  const age = garageAge(vehicle);
  const annualKm = vehicle.annual_km || 15000;

  const savedCountry = (typeof activeCountry !== 'undefined') ? activeCountry : null;
  if (vehicle.country && typeof activeCountry !== 'undefined') {
    activeCountry = vehicle.country;
  }
  const savedKm = (typeof st !== 'undefined') ? st.km : null;
  if (typeof st !== 'undefined') {
    if (annualKm < 12000) st.km = 'u10';
    else if (annualKm < 22000) st.km = 'm20';
    else if (annualKm < 35000) st.km = 'm35';
    else st.km = 'o35';
  }

  let result;
  try {
    let valueNow = (typeof purchAtAge === 'function') ? purchAtAge(car, age) : 0;
    let valueNextYear = (typeof purchAtAge === 'function') ? purchAtAge(car, age + 1) : 0;
    // v60 : applique engine_delta_pct si l'user a précisé la version (ex: C250d ≠ médiane C-class diesel)
    const _eDeltaLive = getEngineDeltaLive(vehicle); if (_eDeltaLive && Math.abs(_eDeltaLive) > 0.1) {
      const mult = (1 + _eDeltaLive / 100);
      valueNow = Math.round(valueNow * mult);
      valueNextYear = Math.round(valueNextYear * mult);
    }
    const deprAnnual = Math.max(0, valueNow - valueNextYear);
    const deprMonthly = Math.round(deprAnnual / 12);

    const fuelAnnual = (typeof fuelCost === 'function')
      ? fuelCost((car.pt || 'ice').toLowerCase(), st.trips || 'mixed', annualKm) : 0;
    const fuelMonthly = Math.round(fuelAnnual / 12);

    const maint = estimateMaintenance(vehicle);
    const maintMonthly = maint ? maint.monthly : 0;

    const insAnnual = (typeof calcInsurance === 'function')
      ? calcInsurance(car, valueNow, age) : 0;
    const insMonthly = Math.round(insAnnual / 12);

    const taxAnnual = (typeof calcAnnualTax === 'function')
      ? calcAnnualTax(car, valueNow, age) : 0;
    const taxMonthly = Math.round(taxAnnual / 12);

    const total = deprMonthly + fuelMonthly + maintMonthly + insMonthly + taxMonthly;

    result = {
      lines: [
        {key:'depr',  label_fr:'Dépréciation',  label_en:'Depreciation',  monthly:deprMonthly,  color:'#1D9E75'},
        {key:'fuel',  label_fr:'Carburant',     label_en:'Fuel/Energy',   monthly:fuelMonthly,  color:'#5DADE2'},
        {key:'maint', label_fr:'Entretien',     label_en:'Maintenance',   monthly:maintMonthly, color:'#F39C12'},
        {key:'ins',   label_fr:'Assurance',     label_en:'Insurance',     monthly:insMonthly,   color:'#9B59B6'},
        {key:'tax',   label_fr:'Taxes',         label_en:'Taxes',         monthly:taxMonthly,   color:'#7F8C8D'},
      ],
      total: total,
      annual: total * 12,
      meta: {
        valueNow, valueNextYear, deprAnnual,
        fuelAnnual, maintAnnual: maint ? maint.annual : 0,
        insAnnual, taxAnnual,
        annualKm, age, country: vehicle.country,
        maintConfidence: maint ? maint.confidence : 'low',
      },
    };
  } finally {
    if (savedCountry !== null) activeCountry = savedCountry;
    if (savedKm !== null && typeof st !== 'undefined') st.km = savedKm;
  }
  return result;
}

// ══════════════════════════════════════════════════════════════
// TCO CURVE PROJECTION (v46) — 5-year stacked TCO
// ══════════════════════════════════════════════════════════════
// projectTcoCurve(vehicle, yearsAhead) renvoie un tableau de points
// [{yearOffset, year, age, depr, fuel, maint, ins, tax, total}]
// pour stacked area chart.

function projectTcoCurve(vehicle, yearsAhead) {
  yearsAhead = yearsAhead || 5;
  const car = garageResolveCar(vehicle);
  if (!car) return [];

  const currentAge = garageAge(vehicle);
  const annualKm = vehicle.annual_km || 15000;
  const points = [];

  // Save state for purchAtAge / TCO calls
  const savedCountry = (typeof activeCountry !== 'undefined') ? activeCountry : null;
  if (vehicle.country && typeof activeCountry !== 'undefined') {
    activeCountry = vehicle.country;
  }
  const savedKm = (typeof st !== 'undefined') ? st.km : null;
  if (typeof st !== 'undefined') {
    if (annualKm < 12000) st.km = 'u10';
    else if (annualKm < 22000) st.km = 'm20';
    else if (annualKm < 35000) st.km = 'm35';
    else st.km = 'o35';
  }

  try {
    for (let dy = 0; dy <= yearsAhead; dy++) {
      const age = currentAge + dy;
      const year = (new Date().getFullYear()) + dy;

      // Valeur actuelle et future pour calcul dépréciation annuelle
      const valNow = (typeof purchAtAge === 'function') ? purchAtAge(car, age) : 0;
      const valNext = (typeof purchAtAge === 'function') ? purchAtAge(car, age + 1) : 0;
      const deprAnnual = Math.max(0, valNow - valNext);
      const deprMo = Math.round(deprAnnual / 12);

      // Carburant : stable (basé sur conso)
      const fuelAnnual = (typeof fuelCost === 'function')
        ? fuelCost((car.pt || 'ice').toLowerCase(), st.trips || 'mixed', annualKm) : 0;
      const fuelMo = Math.round(fuelAnnual / 12);

      // Entretien : utilise estimateMaintenance avec un véhicule "vieillit"
      const futureVehicle = Object.assign({}, vehicle, {
        km: (vehicle.km || 0) + annualKm * dy,
      });
      // adjust age via fake year
      futureVehicle.year = (vehicle.year || (new Date().getFullYear() - currentAge)) - dy;
      const maint = (typeof estimateMaintenance === 'function')
        ? estimateMaintenance(futureVehicle) : null;
      const maintMo = maint ? maint.monthly : 0;

      // Assurance : basée sur valeur actuelle
      const insAnnual = (typeof calcInsurance === 'function')
        ? calcInsurance(car, valNow, age) : 0;
      const insMo = Math.round(insAnnual / 12);

      // Taxes
      const taxAnnual = (typeof calcAnnualTax === 'function')
        ? calcAnnualTax(car, valNow, age) : 0;
      const taxMo = Math.round(taxAnnual / 12);

      const total = deprMo + fuelMo + maintMo + insMo + taxMo;

      points.push({
        yearOffset: dy,
        year: year,
        age: age,
        depr: deprMo,
        fuel: fuelMo,
        maint: maintMo,
        ins: insMo,
        tax: taxMo,
        total: total,
      });
    }
  } finally {
    if (savedCountry !== null) activeCountry = savedCountry;
    if (savedKm !== null && typeof st !== 'undefined') st.km = savedKm;
  }

  return points;
}

// ══════════════════════════════════════════════════════════════
// TCO STACKED AREA SVG (v46)
// ══════════════════════════════════════════════════════════════
function renderTcoStackedSvg(points, options) {
  options = options || {};
  if (!points || points.length === 0) return '';

  const W = options.width || 640;
  const H = options.height || 280;
  const PAD_L = 60, PAD_R = 24, PAD_T = 24, PAD_B = 50;
  const PW = W - PAD_L - PAD_R;
  const PH = H - PAD_T - PAD_B;

  const cur = (options.country === 'ch') ? 'CHF' : '€';

  // Colors aligned with donut
  const layers = [
    {key:'tax',   label_fr:'Taxes',        label_en:'Taxes',        color:'#7F8C8D'},
    {key:'ins',   label_fr:'Assurance',    label_en:'Insurance',    color:'#9B59B6'},
    {key:'maint', label_fr:'Entretien',    label_en:'Maintenance',  color:'#F39C12'},
    {key:'fuel',  label_fr:'Carburant',    label_en:'Fuel/Energy',  color:'#5DADE2'},
    {key:'depr',  label_fr:'Dépréciation', label_en:'Depreciation', color:'#1D9E75'},
  ];

  // Domain
  const yMax = Math.max(...points.map(p => p.total)) * 1.15;
  const yMin = 0;
  const xMax = points.length - 1;

  const sx = i => PAD_L + (PW * i) / (xMax || 1);
  const sy = v => PAD_T + PH - (PH * (v - yMin)) / (yMax - yMin || 1);

  const fmtV = v => (v >= 1000) ? (Math.round(v/100)/10).toFixed(1) + 'k' : Math.round(v);

  // Y grid
  let yGrid = '', yLabels = '';
  const ticks = 4;
  for (let i = 0; i <= ticks; i++) {
    const v = yMin + (yMax - yMin) * i / ticks;
    const y = sy(v);
    yGrid += `<line x1="${PAD_L}" y1="${y}" x2="${W - PAD_R}" y2="${y}" stroke="#e4e1d9" stroke-width="0.5" stroke-dasharray="2,3" />`;
    yLabels += `<text x="${PAD_L - 8}" y="${y + 4}" text-anchor="end" font-size="11" fill="#888" font-family="system-ui">${cur}${fmtV(v)}</text>`;
  }

  // X labels
  let xLabels = '';
  points.forEach((p, i) => {
    const x = sx(i);
    xLabels += `<text x="${x}" y="${H - 30}" text-anchor="middle" font-size="11" fill="#888" font-family="system-ui">${p.year}</text>`;
    if (i === 0) {
      xLabels += `<text x="${x}" y="${H - 16}" text-anchor="middle" font-size="10" fill="#aaa" font-family="system-ui">Auj.</text>`;
    } else {
      xLabels += `<text x="${x}" y="${H - 16}" text-anchor="middle" font-size="10" fill="#aaa" font-family="system-ui">+${i}a</text>`;
    }
  });

  // Build cumulative stacks (bottom-up : tax, ins, maint, fuel, depr)
  // Each layer is filled between its bottom (sum of layers below) and its top
  let areas = '';
  const cumBelow = points.map(() => 0);
  layers.forEach(layer => {
    const topPts = points.map((p, i) => {
      const topVal = cumBelow[i] + (p[layer.key] || 0);
      return [sx(i), sy(topVal)];
    });
    const bottomPts = points.map((p, i) => [sx(i), sy(cumBelow[i])]).reverse();
    const allPts = [...topPts, ...bottomPts].map(([x, y]) => `${x},${y}`).join(' ');
    areas += `<polygon points="${allPts}" fill="${layer.color}" fill-opacity="0.85" />`;
    // Update cumBelow
    points.forEach((p, i) => { cumBelow[i] += (p[layer.key] || 0); });
  });

  // Total line on top
  const totalPath = points.map((p, i) => `${i===0?'M':'L'} ${sx(i)} ${sy(p.total)}`).join(' ');
  const totalLine = `<path d="${totalPath}" fill="none" stroke="#2C2C2A" stroke-width="2" stroke-linecap="round" />`;

  // Total dots + value labels
  let dots = '';
  points.forEach((p, i) => {
    const x = sx(i), y = sy(p.total);
    dots += `<circle cx="${x}" cy="${y}" r="4" fill="#fff" stroke="#2C2C2A" stroke-width="2" />`;
    if (i === 0 || i === points.length - 1 || i === Math.floor(points.length / 2)) {
      const labelY = y - 10;
      dots += `<rect x="${x-26}" y="${labelY-12}" width="52" height="18" rx="3" fill="#fff" stroke="#2C2C2A" stroke-width="1" />`;
      dots += `<text x="${x}" y="${labelY+1}" text-anchor="middle" font-size="11" font-weight="600" fill="#2C2C2A" font-family="system-ui">${cur}${p.total}</text>`;
    }
  });

  // Legend (bottom)
  const lang = options.lang || 'fr';
  const legendItems = layers.slice().reverse().map((l, i) => {
    const lbl = lang === 'en' ? l.label_en : l.label_fr;
    return `<g transform="translate(${PAD_L + i * 110},${H - 4})">
      <rect width="11" height="11" fill="${l.color}" rx="2" />
      <text x="16" y="9" font-size="10" fill="#444" font-family="system-ui">${lbl}</text>
    </g>`;
  }).join('');

  return `
    <svg width="100%" viewBox="0 0 ${W} ${H + 18}" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
      ${yGrid}
      ${areas}
      ${totalLine}
      ${yLabels}
      ${xLabels}
      ${dots}
      ${legendItems}
    </svg>
  `;
}

function renderTcoDonutSvg(decomposition, options) {
  options = options || {};
  if (!decomposition || !decomposition.lines) return '';

  const W = options.width || 220;
  const H = options.height || 220;
  const cx = W / 2, cy = H / 2;
  const rOuter = 90, rInner = 60;

  const lines = decomposition.lines.filter(l => l.monthly > 0);
  const total = lines.reduce((s, l) => s + l.monthly, 0);
  if (total === 0) return '';

  let cumAngle = -Math.PI / 2;
  const arcs = lines.map(l => {
    const angle = (l.monthly / total) * Math.PI * 2;
    const a0 = cumAngle, a1 = cumAngle + angle;
    cumAngle = a1;
    const x0Out = cx + rOuter * Math.cos(a0), y0Out = cy + rOuter * Math.sin(a0);
    const x1Out = cx + rOuter * Math.cos(a1), y1Out = cy + rOuter * Math.sin(a1);
    const x0In = cx + rInner * Math.cos(a0), y0In = cy + rInner * Math.sin(a0);
    const x1In = cx + rInner * Math.cos(a1), y1In = cy + rInner * Math.sin(a1);
    const largeArc = angle > Math.PI ? 1 : 0;
    const path = `M ${x0Out} ${y0Out} A ${rOuter} ${rOuter} 0 ${largeArc} 1 ${x1Out} ${y1Out} L ${x1In} ${y1In} A ${rInner} ${rInner} 0 ${largeArc} 0 ${x0In} ${y0In} Z`;
    return `<path d="${path}" fill="${l.color}" stroke="#fff" stroke-width="1.5" />`;
  }).join('');

  const cur = (options.country === 'ch') ? 'CHF' : '€';
  return `
    <svg width="100%" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
      ${arcs}
      <text x="${cx}" y="${cy - 6}" text-anchor="middle" font-size="11" fill="#888" font-family="system-ui">Total/mois</text>
      <text x="${cx}" y="${cy + 16}" text-anchor="middle" font-size="22" font-weight="600" fill="#1D9E75" font-family="system-ui">${cur} ${total}</text>
    </svg>
  `;
}

        <h3 style="margin-top:0">${fr ? 'Changer mon critère' : 'Change my criterion'}</h3>
        <p style="font-size:13px;margin-bottom:8px">${fr
          ? `Vous pouvez changer votre critère principal à tout moment. Vos autres réponses (budget, kilométrage, etc.) sont conservées.`
          : `You can change your main criterion at any time. Your other answers (budget, mileage, etc.) are preserved.`}</p>
        <button class="btn-secondary-driver" onclick="changeDriverFromModal()">${fr ? 'Modifier mon critère' : 'Change my criterion'}</button>
      </div>

      <div class="driver-limitations">
        <strong>${fr ? 'Limites de cette interprétation' : 'Limitations of this interpretation'} :</strong><br>
        ${limitsText}
      </div>
    </div>
  `;
  document.body.appendChild(m);
  m.addEventListener('click', e => { if (e.target === m) m.remove(); });

  if (typeof mpTrack === 'function') mpTrack('methodology_driver_open', {driver});
}

// "Changer mon critère" depuis la modale driver
function changeDriverFromModal() {
  // Ferme la modale
  const m = document.getElementById('method-driver-modal');
  if (m) m.remove();
  // Renvoie à l'étape de sélection du driver (Q1 dans v40 = budget+pref fusionné)
  step = 1;
  if (typeof render === 'function') render();
  if (typeof mpTrack === 'function') mpTrack('driver_change_from_modal', {previous_driver: st.pref});
}

// AUTH MODAL UI (v48)
// ══════════════════════════════════════════════════════════════

function openAuthModal(){
  const existing = document.getElementById('auth-modal');
  if (existing) existing.remove();

  const m = document.createElement('div');
  m.id = 'auth-modal';
  m.className = 'auth-modal-overlay';
  m.innerHTML = renderAuthModalContent();
  document.body.appendChild(m);
  m.addEventListener('click', e => { if (e.target === m) closeAuthModal(); });

  if (typeof mpTrack === 'function') mpTrack('auth_modal_opened');
}

function closeAuthModal(){
  const m = document.getElementById('auth-modal');
  if (m) m.remove();
}

function renderAuthModalContent(){
  const fr = lang === 'fr';
  const user = AuthService.getUser();

  if (user) {
    // Connected state
    const email = user.email || '';
    const initial = (email[0] || '?').toUpperCase();
    const since = user.created_at ? new Date(user.created_at).toLocaleDateString(lang === 'fr' ? 'fr-FR' : 'en-GB') : '';
    return `
      <div class="auth-modal-card">
        <button class="auth-modal-close" onclick="closeAuthModal()" aria-label="Close">×</button>
        <h2 class="auth-modal-title">${fr ? 'Mon compte' : 'My account'}</h2>
        <p class="auth-modal-sub">${fr ? 'Votre garage est synchronisé sur tous vos appareils.' : 'Your garage is synced across all your devices.'}</p>

        <div class="auth-user-info">
          <div class="auth-user-avatar">${initial}</div>
          <div>
            <div class="auth-user-email">${email}</div>
            ${since ? `<div style="font-size:11px;color:var(--muted);margin-top:2px">${fr ? 'Membre depuis' : 'Member since'} ${since}</div>` : ''}
          </div>
        </div>

        <button class="auth-signout-btn" onclick="handleSignOut()">${fr ? 'Se déconnecter' : 'Sign out'}</button>

        <div class="auth-foot">
          ${fr ? 'Vos données restent privées et ne sont jamais partagées.' : 'Your data stays private and is never shared.'}
        </div>
      </div>
    `;
  }

  // Not connected — show sign-in options
  return `
    <div class="auth-modal-card">
      <button class="auth-modal-close" onclick="closeAuthModal()" aria-label="Close">×</button>
      <h2 class="auth-modal-title">${fr ? 'Connexion' : 'Sign in'}</h2>
      <p class="auth-modal-sub">${fr
        ? 'Synchronisez votre garage sur tous vos appareils. Aucun mot de passe à retenir.'
        : 'Sync your garage across all your devices. No password to remember.'}</p>

      <div class="auth-method">
        <button class="auth-google-btn" onclick="handleGoogleSignIn()">
          <span class="auth-google-icon"></span>
          <span>${fr ? 'Continuer avec Google' : 'Continue with Google'}</span>
        </button>
      </div>

      <div class="auth-divider">${fr ? 'ou' : 'or'}</div>

      <form class="auth-email-form" onsubmit="handleMagicLinkSubmit(event); return false;">
        <input type="email" class="auth-email-input" id="auth-email-input"
               placeholder="${fr ? 'votre.email@example.com' : 'your.email@example.com'}"
               required autocomplete="email">
        <button type="submit" class="auth-magic-btn" id="auth-magic-btn">
          ${fr ? 'Recevoir un lien de connexion' : 'Receive a login link'}
        </button>
      </form>

      <div id="auth-feedback" style="display:none"></div>

      <div class="auth-foot">
        ${fr
          ? 'En vous connectant, vous acceptez notre <a href="privacy.html" target="_blank" style="color:inherit">politique de confidentialité</a>. Aucune publicité, aucune revente.'
          : 'By signing in, you accept our <a href="privacy.html" target="_blank" style="color:inherit">privacy policy</a>. No ads, no data resale.'}
      </div>
    </div>
  `;
}

async function handleMagicLinkSubmit(event){
  event.preventDefault();
  const input = document.getElementById('auth-email-input');
  const btn = document.getElementById('auth-magic-btn');
  const feedback = document.getElementById('auth-feedback');
  if (!input || !btn || !feedback) return;

  const email = input.value.trim();
  if (!email || !email.includes('@')) {
    feedback.style.display = 'block';
    feedback.className = 'auth-feedback error';
    feedback.textContent = lang === 'fr' ? 'Email invalide.' : 'Invalid email.';
    return;
  }

  btn.disabled = true;
  btn.textContent = lang === 'fr' ? 'Envoi...' : 'Sending...';

  try {
    await AuthService.signInMagicLink(email);
    feedback.style.display = 'block';
    feedback.className = 'auth-feedback success';
    feedback.innerHTML = lang === 'fr'
      ? `📧 <strong>Lien envoyé à ${email}</strong><br>Vérifiez votre boîte mail (et les spams).`
      : `📧 <strong>Link sent to ${email}</strong><br>Check your inbox (and spam folder).`;
    input.disabled = true;
    btn.textContent = lang === 'fr' ? '✓ Envoyé' : '✓ Sent';
  } catch(e) {
    feedback.style.display = 'block';
    feedback.className = 'auth-feedback error';
    feedback.textContent = (lang === 'fr' ? 'Erreur : ' : 'Error: ') + (e.message || 'unknown');
    btn.disabled = false;
    btn.textContent = lang === 'fr' ? 'Recevoir un lien de connexion' : 'Receive a login link';
  }
}

async function handleGoogleSignIn(){
  try {
    await AuthService.signInGoogle();
    // Redirect happens automatically
  } catch(e) {
    const feedback = document.getElementById('auth-feedback');
    if (feedback) {
      feedback.style.display = 'block';
      feedback.className = 'auth-feedback error';
      feedback.textContent = (lang === 'fr' ? 'Erreur Google : ' : 'Google error: ') + (e.message || 'OAuth provider not configured');
    }
  }
}

async function handleSignOut(){
  try {
    await AuthService.signOut();
    closeAuthModal();
  } catch(e) {
    console.error('[Auth] signOut failed:', e);
  }
}

// Update auth button state
function updateAuthButton(){
  const btn = document.getElementById('authBtn');
  const label = document.getElementById('authBtnLabel');
  if (!btn || !label) return;
  const fr = lang === 'fr';
  if (AuthService.isLoggedIn()) {
    const user = AuthService.getUser();
    const email = user.email || '';
    const short = email.split('@')[0].slice(0, 12);
    btn.classList.add('connected');
    label.textContent = short;
  } else {
    btn.classList.remove('connected');
    label.textContent = fr ? 'Connexion' : 'Sign in';
  }
}

// Wire auth state to UI
window.addEventListener('DOMContentLoaded', () => {
  AuthService.onChange(() => {
    updateAuthButton();
    // If modal is open, re-render its content
    const m = document.getElementById('auth-modal');
    if (m) m.innerHTML = renderAuthModalContent();
  });
  // Initial render
  setTimeout(updateAuthButton, 200);
});

// GARAGE SYNC SERVICE (v48)
// ══════════════════════════════════════════════════════════════
const GarageSyncService = (function(){
  let _syncInProgress = false;

  async function syncFromLocal(){
    if (_syncInProgress) return;
    if (!AuthService.isLoggedIn()) return;
    const user = AuthService.getUser();
    const client = AuthService.getClient();
    if (!user || !client) return;

    _syncInProgress = true;
    try {
      const localVehicles = (typeof GarageStore !== 'undefined' && GarageStore.list)
        ? GarageStore.list() : [];
      // Fetch existing remote vehicles
      const { data: remoteRows, error: fetchErr } = await client
        .from('garage_vehicles')
        .select('id, vehicle_data')
        .eq('user_id', user.id);
      if (fetchErr) {
        console.warn('[Sync] fetch failed:', fetchErr.message);
        return;
      }
      const remoteIds = new Set((remoteRows || []).map(r => r.vehicle_data && r.vehicle_data.id).filter(Boolean));

      // Push local vehicles not yet on server
      for (const v of localVehicles) {
        if (!v.id || remoteIds.has(v.id)) continue;
        await client.from('garage_vehicles').insert({
          user_id: user.id,
          vehicle_data: v,
        });
      }
      if (typeof mpTrack === 'function') mpTrack('garage_synced', {n_local: localVehicles.length});
    } catch(e) {
      console.warn('[Sync] error:', e);
    } finally {
      _syncInProgress = false;
    }
  }

  return {syncFromLocal};
})();

// SAVE BANNER (v48) — contextual prompt to sign in
// ══════════════════════════════════════════════════════════════
const SAVE_BANNER_DISMISS_KEY = 'carpiq_save_banner_dismissed';
const SAVE_BANNER_DISMISS_DAYS = 7;

function shouldShowSaveBanner(){
  if (AuthService.isLoggedIn()) return false;
  try {
    const dismissed = localStorage.getItem(SAVE_BANNER_DISMISS_KEY);
    if (!dismissed) return true;
    const ts = parseInt(dismissed, 10);
    const days = (Date.now() - ts) / (1000 * 60 * 60 * 24);
    return days > SAVE_BANNER_DISMISS_DAYS;
  } catch(e) { return true; }
}

function dismissSaveBanner(){
  try { localStorage.setItem(SAVE_BANNER_DISMISS_KEY, String(Date.now())); } catch(e){}
  const b = document.getElementById('save-banner');
  if (b) b.remove();
  if (typeof mpTrack === 'function') mpTrack('save_banner_dismissed');
}

function renderSaveBanner(){
  if (!shouldShowSaveBanner()) return '';
  const fr = lang === 'fr';
  return `
    <div class="save-banner" id="save-banner">
      <span class="save-banner-icon">☁️</span>
      <div class="save-banner-text">
        <strong>${fr ? 'Sauvegardez votre garage' : 'Save your garage'}.</strong>
        ${fr
          ? ' Connectez-vous pour retrouver votre garage sur tous vos appareils.'
          : ' Sign in to access your garage on all your devices.'}
      </div>
      <button class="save-banner-cta" onclick="openAuthModal()">${fr ? 'Se connecter' : 'Sign in'}</button>
      <button class="save-banner-dismiss" onclick="dismissSaveBanner()" aria-label="${fr ? 'Fermer' : 'Dismiss'}">×</button>
    </div>
  `;
}
