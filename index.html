// Fallback : dérive un slug modèle depuis car.name par extraction heuristique.
// Utilisé pour les modèles non mappés dans AS24_MODEL_BASE.
function _extractModelSlugFromName(car){
  let name = (car.name||'').toLowerCase();
  // Enlever la marque du début du nom
  const brandName = (car.brand||'').toLowerCase();
  const brandAliases = {vw:'volkswagen',mercedes:'mercedes-benz',alfa:'alfa-romeo'};
  for(const b of [brandName, brandAliases[brandName]].filter(Boolean)){
    if(name.startsWith(b)){ name = name.slice(b.length).trim(); break; }
  }
  // Enlever la parenthèse de génération éventuelle "(gén. 2019)" / "(2019-2022)"
  name = name.replace(/\s*\([^)]*\)\s*/g,' ');
  // Enlever les mots qui ne font pas partie du slug modèle
  name = name.replace(/\b(essence|diesel|hybrid|phev|hev|bev|mild|electric|e-tech|tsi|tdi|etsi|dci|cdti|crdi|dsg|quattro|xdrive|awd|4motion|4x4|plug-in)\b/gi,' ');
  // Prendre les 1-2 premiers tokens restants
  const tokens = name.split(/\s+/).filter(Boolean);
  const slug = tokens.slice(0, 2).join('-').replace(/[^a-z0-9.-]/g,'');
  return slug || (car.brand||'');
}

function as24ModelBase(car){
  const key = `${car.brand}:${car.id}`;
  if(AS24_MODEL_BASE[key]) return AS24_MODEL_BASE[key];
  return _extractModelSlugFromName(car);
}

// Builder principal : retourne l'URL AS24 correcte pour ce (car, country).
// Supporte :
//   - CH : format legacy /fr/s/mo-X/mk-Y/ft-Z (compatible v6 scraper)
//   - Autres : format /lst/ avec slug localisé + suffixe multigén si requis
function buildAS24Url(car, country, opts){
  opts = opts || {};
  const age = opts.age || 0;
  const now = new Date().getFullYear();
  const yearMax = now - Math.max(0, age - 1);
  const yearMin = now - age - 2;

  const brandSlug = AS24_BRAND_SLUGS[car.brand] || car.brand;
  const domain = AS24_DOMAIN[country] || AS24_DOMAIN.fr;

  // ── CH legacy format ──────────────────────────────────────────────────
  if(country === 'ch'){
    // Slugs simples : on utilise car.id ou name, pas les overrides /lst/.
    // BMW série → "mg-3-series", Mercedes classe → "mg-c-class", sinon "mo-X".
    const baseModel = as24ModelBase(car);
    const isMG = (car.brand==='bmw' && /^[1-8]-series$/.test(baseModel))
              || (car.brand==='mercedes' && /^[a-z]+-class$/.test(baseModel));
    const prefix = isMG ? 'mg' : 'mo';
    const brandCH = car.brand==='vw' ? 'vw' : car.brand;  // CH garde "vw" pas "volkswagen"
    const ft = car.pt==='ice' ? '/ft-petrol'
             : car.pt==='die' ? '/ft-diesel'
             : car.pt==='bev' ? '/ft-electric'
             : '';  // hybrid : pas de /ft-, mais param fuelTypeGroups
    const q = new URLSearchParams({firstRegistrationYearFrom: yearMin});
    if(car.pt==='hev' || car.pt==='phev') q.set('fuelTypeGroups[0]','hybrid');
    return `https://www.${domain}/fr/s/${prefix}-${baseModel}/mk-${brandCH}${ft}?${q.toString()}`;
  }

  // ── Format /lst/ moderne (FR, DE, BE, NL, IT, ES) ─────────────────────
  const baseModel = as24ModelBase(car);
  const overrideKey = `${car.brand}:${baseModel}`;
  const overrides = AS24_MODEL_OVERRIDES_BY_COUNTRY[country] || {};
  const localizedModel = overrides[overrideKey] || baseModel;

  // Suffixe multigén si ce (brand, localizedModel) est dans la liste
  const needsKey = `${brandSlug}:${localizedModel}`;
  const needsSuffix = AS24_NEEDS_SUFFIX[country] && AS24_NEEDS_SUFFIX[country].has(needsKey);
  const suffix = needsSuffix ? `-${AS24_MULTIGEN_SUFFIX[country]||'(alle)'}` : '';
  const finalSlug = localizedModel + suffix;

  // Fuel code AS24 (Apify confirmed)
  const fuelCode = {ice:'B', die:'D', bev:'E', hev:'2', phev:'2'}[car.pt] || 'B';
  const cy = AS24_CY[country] || 'F';
  const params = new URLSearchParams({
    atype:'C', cy, fuel:fuelCode, sort:'standard', desc:'0',
    ustate:'N,U', fregfrom:yearMin, fregto:yearMax,
  });

  const pathPrefix = AS24_PATH_PREFIX[country] || '/lst';
  return `https://www.${domain}${pathPrefix}/${brandSlug}/${finalSlug}?${params.toString()}`;
}

// LOCALSTORAGE PERSISTENCE
// Saves last session so returning users can resume where they left.
// Scope : state `st` + current step + lang. Does NOT store email or PII.
// Versioned to allow future migrations.
// ══════════════════════════════════════════════════════════════
const LS_KEY = 'carpiq_session_v1';
const LS_TTL_DAYS = 30; // oldest session we will prompt to resume

function saveSession(){
  try{
    const payload = {
      v: 1,
      ts: Date.now(),
      lang,
      step,
      st: {
        pref: st.pref, budget: st.budget, km: st.km, trips: st.trips,
        charging: st.charging, body: st.body, bodyMod: st.bodyMod,
        dept: st.dept, urban: st.urban, age: st.age,
        // Refinement state (Part B)
        style_preference: st.style_preference,
        age_equip_tradeoff: st.age_equip_tradeoff,
        brand_prefs: st.brand_prefs,
        required_features: st.required_features,
        physical_constraints: st.physical_constraints,
        // Guided discovery state
        guided: st.guided,
      },
    };
    localStorage.setItem(LS_KEY, JSON.stringify(payload));
  }catch(e){/* localStorage disabled or quota full */}
}

function loadSession(){
  try{
    const raw = localStorage.getItem(LS_KEY);
    if(!raw) return null;
    const p = JSON.parse(raw);
    if(!p || p.v !== 1 || !p.st) return null;
    // Reject if older than TTL
    if(Date.now() - p.ts > LS_TTL_DAYS*86400*1000) return null;
    // Reject if user hadn't gone past intro (nothing worth resuming)
    if(p.step < 2) return null;
    return p;
  }catch(e){ return null; }
}

function clearSession(){
  try{ localStorage.removeItem(LS_KEY); }catch(e){}
}

function resumeSession(p){
  if(!p || !p.st) return;
  Object.assign(st, p.st);
  if(p.lang) lang = p.lang;
  step = p.step;
  mpTrack('session_resumed', { step: p.step, days_since: Math.round((Date.now()-p.ts)/86400000) });
  render();
}

// AGE CURVE ENGINE
// ══════════════════════════════════════════════════════════════
function agePt(pt,newP,brand,age,km){
  const curve=DEPR[pt]||DEPR.ice,idx=Math.min(age,10),sIdx=Math.min(idx+5,10);
  const purchP=Math.round(newP*curve[idx]),saleP=Math.round(newP*curve[sIdx]);
  const depr5=purchP-saleP,ydAvg=depr5/5;
  const maint=Math.round(annualMaint(pt,brand)*MAINT_MULT[idx]*insMod());
  const rep=repairCost(pt,brand,idx);
  const yf=fuelCost(pt,st.trips||'mixed',km);
  const totalMonthly=(depr5+(yf+maint+rep)*5)/60;
  const risk=(BPROB[pt]||BPROB.ice)[idx];
  return{age,purchP,ydAvg,maint,rep,yf,totalMonthly,risk};
}
function curveData(pt,newP,brand,km){return Array.from({length:11},(_,a)=>agePt(pt,newP,brand,a,km))}
function optZone(pts){
  const min=Math.min(...pts.map(p=>p.totalMonthly));
  const z=pts.filter(p=>p.totalMonthly<=min*1.06);
  return z.length?{s:z[0].age,e:z[z.length-1].age}:{s:2,e:4};
}
function renderCurve(best,refNewP,brand){
  const km=curveKm;
  const pm=curveData(best,refNewP,brand,km);
  const hRef=DB.find(c=>c.pt==='hev')?.newP||refNewP;
  const ph=best!=='hev'?curveData('hev',hRef,'toyota',km):null;
  const iRef=DB.find(c=>c.pt==='ice')?.newP||refNewP*0.85;
  const pi=best!=='ice'?curveData('ice',iRef,'renault',km):null;
  const all=[...pm,...(ph||[]),...(pi||[])];
  const allM=all.map(p=>p.totalMonthly);
  const minY=Math.max(0,Math.min(...allM)-80),maxY=Math.max(...allM)+100;
  const W=560,H=240,pL=58,pR=16,pT=20,pB=40,cW=W-pL-pR,cH=H-pT-pB;
  const xP=a=>pL+a/10*cW,yP=m=>pT+cH-(m-minY)/(maxY-minY)*cH;
  const mkP=(pts,clr,dash,w=2)=>{if(!pts && pts.length)return'';const d=pts.map((p,i)=>`${i?'L':'M'}${xP(p.age).toFixed(1)},${yP(p.totalMonthly).toFixed(1)}`).join(' ');return`<path d="${d}" fill="none" stroke="${clr}" stroke-width="${w}" ${dash?'stroke-dasharray="4,4"':''} stroke-linecap="round" stroke-linejoin="round"/>`;};
  const opt=optZone(pm);
  const x1=xP(opt.s),x2=xP(opt.e);
  let g='';let gm=Math.ceil(minY/200)*200;
  while(gm<maxY){const y=yP(gm);g+=`<line x1="${pL}" y1="${y.toFixed(1)}" x2="${W-pR}" y2="${y.toFixed(1)}" stroke="#e8e6df" stroke-width="1"/><text x="${pL-4}" y="${y.toFixed(1)}" text-anchor="end" dominant-baseline="central" fill="#9C9A92" font-size="9" font-family="DM Sans,sans-serif">${fmt(gm)}</text>`;gm+=200;}
  let xl='';[0,2,4,6,8,10].forEach(a=>{xl+=`<text x="${xP(a).toFixed(1)}" y="${H-8}" text-anchor="middle" fill="#9C9A92" font-size="9" font-family="DM Sans,sans-serif">${a}${lang==='fr'?' an':' yr'}</text>`;});
  // Y-axis: grid lines + labels
  const ySteps=4;
  let yl='';
  for(let i=0;i<=ySteps;i++){
    const val=minY+(maxY-minY)*i/ySteps;
    const yy=yP(val).toFixed(1);
    // Grid line
    yl+=`<line x1="${pL}" y1="${yy}" x2="${W-pR}" y2="${yy}" stroke="#EEECE8" stroke-width="1"/>`;
    // Label: format as €XXX
    const lbl=val>=1000?'€'+(val/1000).toFixed(1)+'k':'€'+Math.round(val);
    yl+=`<text x="${pL-6}" y="${(parseFloat(yy)+3.5).toFixed(1)}" text-anchor="end" fill="#9C9A92" font-size="8.5" font-family="DM Sans,sans-serif">${lbl}</text>`;
  }
  // Y-axis title (rotated)
  const yTitle=lang==='fr'?'€/mois':'€/month';
  yl+=`<text x="10" y="${(pT+cH/2).toFixed(1)}" text-anchor="middle" fill="#9C9A92" font-size="8" font-family="DM Sans,sans-serif" transform="rotate(-90,10,${(pT+cH/2).toFixed(1)})">${yTitle}</text>`;
  const ptC={ice:'#B4B2A9',hev:'#1D9E75',phev:'#E9921A',bev:'#2A7DC9'},mc=ptC[best]||'#1D9E75';
  const or=`<rect x="${x1.toFixed(1)}" y="${pT}" width="${(x2-x1).toFixed(1)}" height="${cH}" fill="#1D9E75" fill-opacity="0.10" rx="2"/>
    <line x1="${x1.toFixed(1)}" y1="${pT}" x2="${x1.toFixed(1)}" y2="${pT+cH}" stroke="#1D9E75" stroke-width="1" stroke-dasharray="3,3"/>
    <line x1="${x2.toFixed(1)}" y1="${pT}" x2="${x2.toFixed(1)}" y2="${pT+cH}" stroke="#1D9E75" stroke-width="1" stroke-dasharray="3,3"/>
    <text x="${((x1+x2)/2).toFixed(1)}" y="${(pT+12).toFixed(1)}" text-anchor="middle" fill="#0F6E56" font-size="9" font-weight="500" font-family="DM Sans,sans-serif">${t('curve_opt')}</text>`;
  const svg=`<svg width="100%" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" overflow="visible">${yl}${or}${pi?mkP(pi,'#B4B2A9',true,1.5):''}${ph&&best!=='hev'?mkP(ph,'#1D9E75',true,1.5):''}${mkP(pm,mc,false,2.5)}${xl}</svg>`;
  const newM=pm[0]?.totalMonthly||0;
  const optMs=pm.filter(p=>p.age>=opt.s&&p.age<=opt.e).map(p=>p.totalMonthly);
  const optM=optMs.length?Math.min(...optMs):newM;
  const sav=Math.round(newM-optM);
  const ageStr=opt.s===opt.e?`${opt.s}${lang==='fr'?' an':' yr'}`:`${opt.s}–${opt.e}${lang==='fr'?' ans':' yrs'}`;
  const insight=sav>30?`<div class="curve-insight">${lang==='fr'?'Pour votre profil,':'For your profile,'} <strong>${ageStr}</strong> ${lang==='fr'?'est la zone optimale —':'is the optimal cost zone —'} <strong>${E(sav)}</strong> ${lang==='fr'?'de moins par mois vs neuf.':'less per month vs new.'}</div>`:'';
  const tpts=[0,1,2,3,4,5,6,8,10].map(a=>agePt(best,refNewP,brand,a,km));
  const rCell=p=>{const r=p.risk;let clr='var(--teal)',lb=lang==='fr'?'Faible':'Low';if(r>=15){clr='var(--red)';lb=lang==='fr'?'Élevé':'High';}else if(r>=8){clr='var(--amber)';lb=lang==='fr'?'Modéré':'Moderate';}else if(r>=4){clr='var(--muted)';lb=lang==='fr'?'Surveiller':'Watch';}return`<span style="color:${clr};font-weight:500">${r.toFixed(1)}%</span><span style="color:${clr};font-size:10px"> ${lb}</span>`;};
  const rows=tpts.map(p=>{const isO=p.age>=opt.s&&p.age<=opt.e;const km2=Math.round(p.age*getKm());return`<tr class="${isO?'optimal':''}"><td>${p.age}${lang==='fr'?' an':' yr'}${isO?`<span class="badge-opt">${lang==='fr'?'Opt.':'Opt.'}</span>`:''}</td><td>${fmt(km2)}</td><td>${E(p.purchP)}</td><td>${E(Math.round(p.ydAvg))}</td><td>${E(p.maint)}</td><td>${E(p.rep)}</td><td><strong>${E(Math.round(p.totalMonthly))}</strong></td><td>${rCell(p)}</td></tr>`;}).join('');

function rCurve(best,refNewP,brand){
  const km=curveKm,pm=curveData(best,refNewP,brand,km);
  const hRef=DB.find(c=>c.pt==='hev')?.newP||refNewP,ph=best!=='hev'?curveData('hev',hRef,'toyota',km):null;
  const iRef=DB.find(c=>c.pt==='ice')?.newP||refNewP*0.85,pi=best!=='ice'?curveData('ice',iRef,'renault',km):null;
  const all=[...pm,...(ph||[]),...(pi||[])],allM=all.map(p=>p.totalMonthly);
  const minY=Math.max(0,Math.min(...allM)-50),maxY=Math.max(...allM)+80;
  const W=560,H=240,pL=58,pR=16,pT=20,pB=40,cW=W-pL-pR,cH=H-pT-pB;
  const xP=a=>pL+a/10*cW,yP=m=>pT+cH-(m-minY)/(maxY-minY)*cH;
  const mkP=(pts,clr,dash,w=2)=>{if(!pts && pts.length)return'';const d=pts.map((p,i)=>`${i?'L':'M'}${xP(p.age).toFixed(1)},${yP(p.totalMonthly).toFixed(1)}`).join(' ');return`<path d="${d}" fill="none" stroke="${clr}" stroke-width="${w}" ${dash?'stroke-dasharray="4,4"':''} stroke-linecap="round" stroke-linejoin="round"/>`;};
  const opt=optZone(pm),x1=xP(opt.s),x2=xP(opt.e);
  const ptC={ice:'#B4B2A9',hev:'#1D9E75',phev:'#E9921A',bev:'#2A7DC9'},mc=ptC[best]||'#1D9E75';
  // Y axis — identical to renderCurve
  const ySteps=5;
  let yl='';
  for(let i=0;i<=ySteps;i++){
    const val=minY+(maxY-minY)*i/ySteps;
    const yy=yP(val).toFixed(1);
    yl+=`<line x1="${pL}" y1="${yy}" x2="${W-pR}" y2="${yy}" stroke="#EEECE8" stroke-width="1"/>`;
    const lbl=val>=1000?'€'+(val/1000).toFixed(1)+'k':'€'+Math.round(val);
    yl+=`<text x="${pL-6}" y="${(parseFloat(yy)+3.5).toFixed(1)}" text-anchor="end" fill="#9C9A92" font-size="8.5" font-family="DM Sans,sans-serif">${lbl}</text>`;
  }
  const yTitle=lang==='fr'?'€/mois':'€/month';
  yl+=`<text x="10" y="${(pT+cH/2).toFixed(1)}" text-anchor="middle" fill="#9C9A92" font-size="8" font-family="DM Sans,sans-serif" transform="rotate(-90,10,${(pT+cH/2).toFixed(1)})">${yTitle}</text>`;
  // X axis labels
  let xl='';[0,2,4,6,8,10].forEach(a=>{xl+=`<text x="${xP(a).toFixed(1)}" y="${H-8}" text-anchor="middle" fill="#9C9A92" font-size="9" font-family="DM Sans,sans-serif">${a}${lang==='fr'?' an':' yr'}</text>`;});
  const or=`<rect x="${x1.toFixed(1)}" y="${pT}" width="${(x2-x1).toFixed(1)}" height="${cH}" fill="#1D9E75" fill-opacity="0.10" rx="2"/>`;
  const w=document.getElementById('csw');
  if(w)w.innerHTML=`<svg width="100%" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" overflow="visible">${yl}${or}${pi?mkP(pi,'#B4B2A9',true,1.5):''}${ph&&best!=='hev'?mkP(ph,'#1D9E75',true,1.5):''}${mkP(pm,mc,false,2.5)}${xl}</svg>`;
}

const app=document.getElementById('app');
const NSTEPS=7; // steps 1,2,6,7 active; 3,4,5 unused/merged
function render(){
  // Persist session for returning users (non-blocking, fail-safe inside)
  saveSession();
  // Resume banner : visible only on intro screen (step 0).
  // Remove it as soon as user moves to any other step.
  if(step !== 0){
    const b = document.getElementById('resume-banner');
    if(b) b.remove();
  }
  // Scroll to top on each step change
  window.scrollTo({top: 0, behavior: 'smooth'});
  // Track step navigation
  const stepNames = {0:'intro',1:'budget',2:'pref',3:'km_trips_charge',4:'unused',5:'unused',6:'body',7:'locage'};
  if (step <= 7) {
    mpTrack('step_view', {
      step_num: step,
      step_name: stepNames[step] || 'step_'+step,
      budget: st.budget || null,
      km: st.km || null,
    });
  }
  const app=document.getElementById('app');
  if(app){app.style.opacity='0';app.style.transform='translateY(8px)';
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      app.style.transition='opacity .18s ease,transform .18s ease';
      app.style.opacity='1';app.style.transform='translateY(0)';
    }));
  }
  // Guided discovery takes over rendering when active (even after page reload
  // since st.guided is persisted in localStorage via saveSession).
  if(st.guided && st.guided.active){
    if(st.guided.step >= 5) renderGuidedResult();
    else renderGuidedStep(st.guided.step);
    return;
  }
  if(step===0)renderIntro();
  else if(step>=1&&step<=NSTEPS)renderQ(step);
  else renderResults();
  updateProg();
}

function renderQ(s){
  if(s===1){renderPref();return}                      // v40: budget+pref merged on step 1
  if(s===2){step=3;render();return}                   // v40: step 2 deprecated, jump to next
  if(s===3){renderKmTripsCharge();return}             // P2: km/trips/charging third
  if(s===4){step=6;render();return}                   // unused slot, skip
  if(s===5){step=6;render();return}                   // charging merged — legacy skip
  if(s===6){
    // P3: if Guide-moi inferred the body, skip renderBody entirely
    if(st.guided && st.guided.inferred_body && st.guided.inferred_body.length > 0){
      step=7;render();return;
    }
    renderBody();return;
  }
  if(s===7){renderLocAge();return}
  // Fallback (should not happen)
  step++;render();
}

let _silhouetteUidCounter = 0;
function silhouetteSVG(key, opts) {
  opts = opts || {};
  const tpl = SILHOUETTE_SVGS[key];
  if (!tpl) return '';
  // Unique gradient id per render to avoid conflicts when multiple silhouettes
  // are mounted on the same page (Chrome shares <defs> ids globally)
  const uid = (++_silhouetteUidCounter);
  // Shadow opacity : on dark cards, increase to remain perceptible
  const shadow = opts.dark ? '0.3' : '0.15';
  return tpl.replace(/\{UID\}/g, uid).replace(/\{SHADOW\}/g, shadow);
}

// ── Entry/exit ─────────────────────────────────────────────────────
function startGuidedDiscovery(){
  mpTrack('guided_discovery_started', {country:activeCountry, lang:lang, pref_was_set:!!st.pref});
  st.guided = {
    active:true, step:1, startedAt:Date.now(), stepStartedAt:Date.now(),
    usage_contexts:[], visual_attractions:[], dilemma_answer:null, ownership_horizon:null,
    step_durations:[], had_backtrack:false, step4_skipped:false,
    inferred_driver:null, driver_accepted:null, inference_result:null, _pendingOverride:null, inferred_body:null,
  };
  saveSession();
  renderGuidedStep(1);
}

function exitGuidedDiscovery(){
  if(st.guided && st.guided.active){
    mpTrack('guided_discovery_abandoned', {at_step: st.guided.step});
  }
  st.guided.active = false;
  saveSession();
  renderPref();
}

// ── Step navigation ───────────────────────────────────────────────
function guidedGoToStep(n){
  // Close current step : record its duration
  const now = Date.now();
  const prev = st.guided.stepStartedAt || now;
  const prevDuration = now - prev;
  // stepDurations is kept ordered by sequence of visits (may include re-visits)
  st.guided.step_durations.push({step: st.guided.step, ms: prevDuration});
  if(n < st.guided.step) st.guided.had_backtrack = true;
  st.guided.step = n;
  st.guided.stepStartedAt = now;
  saveSession();
  if(n >= 5) renderGuidedResult(); else renderGuidedStep(n);
}

// ── Handlers per step ─────────────────────────────────────────────
function toggleUsageScene(v){
  const arr = st.guided.usage_contexts;
  const i = arr.indexOf(v);
  if(i >= 0){ arr.splice(i, 1); }
  else {
    if(arr.length >= 2) arr.shift();  // FIFO at 2
    arr.push(v);
  }
  renderGuidedStep(1);
}
function toggleVisualAttraction(v){
  const arr = st.guided.visual_attractions;
  const i = arr.indexOf(v);
  if(i >= 0){ arr.splice(i, 1); }
  else {
    if(arr.length >= 3) arr.shift();  // FIFO at 3
    arr.push(v);
  }
  renderGuidedStep(2);
}
function pickDilemma(v){
  st.guided.dilemma_answer = v;
  renderGuidedStep(3);
}
function pickHorizon(v){
  st.guided.ownership_horizon = v;
  st.guided.step4_skipped = false;
  renderGuidedStep(4);
}
function skipHorizon(){
  st.guided.ownership_horizon = null;
  st.guided.step4_skipped = true;
  mpTrack('guided_step_4_completed', {ownership_horizon:null, skipped:true, duration_ms:Date.now()-st.guided.stepStartedAt, country:activeCountry});
  // On saute direct au résultat (on ne reste pas sur l'étape 4)
  st.guided.step = 5;
  saveSession();
  renderGuidedResult();
}

// Submit current step → move on. Individual buttons validate & track.
function guidedNext(){
  const g = st.guided;
  const stepDuration = Date.now() - g.stepStartedAt;
  if(g.step === 1){
    if(g.usage_contexts.length !== 2) return;  // button should already be disabled
    mpTrack('guided_step_1_completed', {usage_contexts:g.usage_contexts, duration_ms:stepDuration, country:activeCountry});
    guidedGoToStep(2);
  } else if(g.step === 2){
    if(g.visual_attractions.length < 2) return;
    mpTrack('guided_step_2_completed', {visual_attractions:g.visual_attractions, first_attraction:g.visual_attractions[0], count:g.visual_attractions.length, duration_ms:stepDuration, country:activeCountry});
    guidedGoToStep(3);
  } else if(g.step === 3){
    if(!g.dilemma_answer) return;
    mpTrack('guided_step_3_completed', {dilemma_answer:g.dilemma_answer, duration_ms:stepDuration, country:activeCountry});
    guidedGoToStep(4);
  } else if(g.step === 4){
    mpTrack('guided_step_4_completed', {ownership_horizon:g.ownership_horizon, skipped:false, duration_ms:stepDuration, country:activeCountry});
    guidedGoToStep(5);
  }
}

// ── Inference algorithm ───────────────────────────────────────────
// Scoring v2 (post-review). Changements vs v1 :
//   1. Discrimination eco renforcée :
//      - modern → eco ×3 (au lieu de ×2), premium ×0 (au lieu de ×1)
//      - urban_short → eco +3 (au lieu de +2)
//      - Signal combinatoire : long_trips + modern (dans top 2) → eco +2
//   2. Tie-breaking par priorité d'engagement (au lieu d'ordre d'itération) :
//      eco > family > sport > premium > ratio > cost
//      Rationale : quand deux drivers sont à égalité, on privilégie celui
//      qui reflète un choix actif plutôt qu'un défaut (cost).
function inferDriverFromGuided(){
  const g = st.guided;
  const scores = {cost:0, ratio:0, premium:0, sport:0, eco:0, family:0};

  // Usage contexts (signals forts)
  if(g.usage_contexts.includes('family_weekend')){ scores.family += 3; scores.ratio += 1; }
  if(g.usage_contexts.includes('long_trips')){ scores.premium += 2; scores.eco += 1; scores.family += 1; }
  if(g.usage_contexts.includes('urban_short')){ scores.eco += 3; scores.cost += 1; }  // +3 au lieu de +2 (fix 1)
  if(g.usage_contexts.includes('commute')){ scores.cost += 2; scores.ratio += 1; scores.eco += 1; }
  if(g.usage_contexts.includes('leisure_nature')){ scores.family += 1; scores.sport += 1; }

  // Visual attractions — first click weighs more
  const visualWeights = {0:3, 1:2, 2:1};
  g.visual_attractions.forEach((v, idx) => {
    const w = visualWeights[idx] || 1;
    switch(v){
      case 'sporty':    scores.sport   += w*2; scores.premium += w; break;
      case 'elegant':   scores.premium += w*2; scores.ratio   += w; break;
      case 'modern':    scores.eco     += w*3; break;  // eco ×3, premium retiré (fix 1)
      case 'rugged':    scores.family  += w*2; scores.sport   += w; break;
      case 'minimal':   scores.cost    += w*2; scores.eco     += w; break;
      case 'practical': scores.family  += w*2; scores.ratio   += w; break;
    }
  });

  // Signal combinatoire (fix 1.3) : longs voyages + choix moderne dans
  // les 2 premiers visuels = profil BEV long-trajet → eco +2.
  if(g.usage_contexts.includes('long_trips') && g.visual_attractions.slice(0,2).includes('modern')){
    scores.eco += 2;
  }

  // Dilemma
  if(g.dilemma_answer === 'rational'){ scores.cost += 3; scores.ratio += 2; scores.family += 1; }
  else if(g.dilemma_answer === 'pleasure'){ scores.sport += 3; scores.premium += 2; }
  else if(g.dilemma_answer === 'depends'){ scores.ratio += 2; }

  // Horizon (if answered)
  if(g.ownership_horizon === 3){ scores.premium += 2; scores.sport += 1; }
  else if(g.ownership_horizon === 5){ scores.ratio += 2; scores.family += 1; }
  else if(g.ownership_horizon === 10){ scores.cost += 2; scores.family += 2; scores.eco += 1; }

  // ── Tie-breaking intelligent (fix 2) ──────────────────────────────
  // En cas d'égalité, on privilégie les drivers "motivés" (engagement actif)
  // sur les drivers "par défaut". Ordre décroissant d'engagement :
  const TIE_PRIORITY = ['eco', 'family', 'sport', 'premium', 'ratio', 'cost'];
  // Fallback 'ratio' si tous les scores sont à 0 (cas dégénéré).
  let maxScore = 0, topDriver = 'ratio';
  for(const d of TIE_PRIORITY){
    if(scores[d] > maxScore){ maxScore = scores[d]; topDriver = d; }
  }
  let secondScore = 0, secondDriver = null;
  for(const d of TIE_PRIORITY){
    if(d !== topDriver && scores[d] > secondScore){ secondScore = scores[d]; secondDriver = d; }
  }
  return {
    inferred: topDriver,
    secondary: secondDriver,
    all_scores: scores,
    confidence: maxScore / (maxScore + secondScore || 1),
  };
}

// ── P3: Body inference (guided discovery) ─────────────────────────
// Après inférence du driver, on infère aussi les 2-3 segments de carrosserie
// à partir des mêmes signaux (usage + visuels + horizon), ce qui permet de
// bypasser l'étape Q5 (renderBody) pour les utilisateurs passés par Guide-moi.
// Rationale : l'expérience Guide-moi promet "découvrons ensemble", imposer
// ensuite un choix abstrait de carrosserie casserait cette promesse.
function inferBodyFromGuided(){
  const g = st.guided;
  if(!g) return null;
  const scores = {
    city:0, compact:0, saloon:0, wagon:0,
    suv_compact:0, suv_family:0, suv_large:0,
    mpv:0, coupe:0, sport:0,
  };

  // Usage signals
  if(g.usage_contexts.includes('commute')){ scores.compact += 2; scores.city += 2; scores.saloon += 1; }
  if(g.usage_contexts.includes('urban_short')){ scores.city += 3; scores.compact += 2; scores.suv_compact += 1; }
  if(g.usage_contexts.includes('family_weekend')){ scores.suv_compact += 2; scores.suv_family += 2; scores.wagon += 2; scores.mpv += 2; scores.compact += 1; }
  if(g.usage_contexts.includes('long_trips')){ scores.saloon += 2; scores.wagon += 2; scores.suv_family += 1; scores.suv_large += 1; }
  if(g.usage_contexts.includes('leisure_nature')){ scores.suv_compact += 2; scores.suv_family += 2; scores.suv_large += 1; }

  // Visual signals — first click weighs more
  const vw = {0:2, 1:1, 2:0.5};
  g.visual_attractions.forEach((v, idx)=>{
    const w = vw[idx] || 0.5;
    switch(v){
      case 'sporty':    scores.coupe += 3*w; scores.sport += 3*w; scores.compact += 1*w; break;
      case 'elegant':   scores.saloon += 3*w; scores.coupe += 1*w; break;
      case 'modern':    scores.saloon += 2*w; scores.suv_compact += 1*w; scores.compact += 1*w; break;
      case 'rugged':    scores.suv_compact += 2*w; scores.suv_family += 3*w; scores.suv_large += 2*w; break;
      case 'minimal':   scores.city += 3*w; scores.compact += 2*w; break;
      case 'practical': scores.wagon += 3*w; scores.mpv += 3*w; scores.suv_compact += 1*w; scores.compact += 1*w; break;
    }
  });

  // Horizon (light bias)
  if(g.ownership_horizon === 10){ scores.wagon += 1; scores.suv_family += 1; scores.saloon += 0.5; }
  else if(g.ownership_horizon === 3){ scores.coupe += 0.5; scores.suv_compact += 0.5; }

  // Select top segments within 70% of max score
  const sorted = Object.entries(scores)
    .filter(([_,s])=>s > 0)
    .sort((a,b)=>b[1]-a[1]);
  if(sorted.length === 0) return null;
  const maxScore = sorted[0][1];
  const threshold = maxScore * 0.7;
  const topSegments = sorted
    .filter(([_,s])=>s >= threshold)
    .slice(0, 3)
    .map(([seg])=>seg);
  return topSegments;
}

// ── Generate explanatory signals for result screen ────────────────
function generateGuidedSignals(){
  const g = st.guided;
  const signals = [];

  // Usage-based
  if(g.usage_contexts.includes('family_weekend') && g.usage_contexts.includes('long_trips')){
    signals.push(gt('signal_family_travels'));
  } else if(g.usage_contexts.includes('commute') && g.usage_contexts.includes('urban_short')){
    signals.push(gt('signal_daily_urban'));
  } else if(g.usage_contexts.includes('commute')){
    signals.push(gt('signal_commute_eco'));
  } else if(g.usage_contexts.includes('leisure_nature')){
    signals.push(gt('signal_leisure_active'));
  } else if(g.usage_contexts.includes('long_trips')){
    signals.push(gt('signal_long_trips_focus'));
  }

  // Visual-based (using first/strongest attraction)
  const firstVisual = g.visual_attractions[0];
  if(firstVisual){ signals.push(gt('signal_visual_' + firstVisual)); }

  // Dilemma-based
  if(g.dilemma_answer === 'rational') signals.push(gt('signal_rational'));
  else if(g.dilemma_answer === 'pleasure') signals.push(gt('signal_pleasure'));
  else if(g.dilemma_answer === 'depends') signals.push(gt('signal_depends'));

  // Horizon-based
  if(g.ownership_horizon === 3) signals.push(gt('signal_horizon_short'));
  else if(g.ownership_horizon === 5) signals.push(gt('signal_horizon_mid'));
  else if(g.ownership_horizon === 10) signals.push(gt('signal_horizon_long'));

  return signals.slice(0, 3);
}

// ── Result actions ────────────────────────────────────────────────
function acceptInferredDriver(){
  const g = st.guided;
  g.driver_accepted = true;
  st.pref = g.inferred_driver;
  // P3: apply body inference + track
  const inferredBody = inferBodyFromGuided();
  if(inferredBody && inferredBody.length > 0){
    st.body = inferredBody;
    g.inferred_body = inferredBody;
  }
  mpTrack('guided_discovery_completed', _guidedTrackingPayload(true));
  g.active = false;
  saveSession();
  step = 3;  // P2 nouvelle séquence : budget=1 (déjà saisi), pref=2 (inféré), km/trips=3
  render();
}
function modifyInferredDriver(){
  const g = st.guided;
  g.driver_accepted = false;
  mpTrack('guided_discovery_completed', _guidedTrackingPayload(false));
  // On conserve le contexte guidé pour pouvoir tracer l'override final
  // (Signal 2 du review : tracer vers quel driver l'utilisateur bascule).
  // La fenêtre d'override reste ouverte tant que l'utilisateur n'a pas
  // validé un choix manuel ou quitté la page.
  g.active = false;
  g._pendingOverride = {
    inferred: g.inferred_driver,
    secondary: (g.inference_result && g.inference_result.secondary) || null,
    all_scores: (g.inference_result && g.inference_result.all_scores) || null,
    openedAt: Date.now(),
  };
  saveSession();
  renderPref();
}

// Appelé par onclick sur les cartes de renderPref. Si un override guidé
// est en attente, tracker 'guided_discovery_manual_override' avec
// comparaison inféré/choisi/secondaire puis consommer l'override.
function selectManualPref(v){
  st.pref = v;
  mpTrack('pref_selected', {pref:v, country:activeCountry, lang:lang});
  // Détection override post-guidé
  const g = st.guided;
  if(g && g._pendingOverride){
    const po = g._pendingOverride;
    const isSecondary = po.secondary === v;
    const isInferred = po.inferred === v;
    mpTrack('guided_discovery_manual_override', {
      inferred_driver: po.inferred,
      secondary_driver: po.secondary,
      chosen_driver: v,
      chose_secondary: isSecondary,   // Signal 2 key metric : confusion #1/#2
      chose_top3: _driverIsTop3(v, po.all_scores),
      all_scores: po.all_scores,
      time_from_result_to_choice_ms: Date.now() - po.openedAt,
      country:activeCountry, lang:lang,
    });
    g._pendingOverride = null;
  }
  renderPref();
}

// Helper : true si driver v est parmi les 3 meilleurs scores.
function _driverIsTop3(v, scores){
  if(!scores) return false;
  const sorted = Object.entries(scores).sort((a,b)=>b[1]-a[1]);
  return sorted.slice(0,3).some(([k])=>k===v);
}
function _guidedTrackingPayload(accepted){
  const g = st.guided;
  const r = g.inference_result || {};
  return {
    usage_contexts:g.usage_contexts,
    visual_attractions:g.visual_attractions,
    first_attraction:g.visual_attractions[0] || null,
    dilemma_answer:g.dilemma_answer,
    ownership_horizon:g.ownership_horizon,
    step4_skipped:g.step4_skipped,
    inferred_driver:g.inferred_driver,
    secondary_driver:r.secondary,
    confidence:r.confidence,
    all_scores:r.all_scores,
    driver_accepted:accepted,
    // P3: body inference tracking
    inferred_body:g.inferred_body || null,
    body_count:(g.inferred_body ? g.inferred_body.length : 0),
    total_duration_ms:Date.now() - g.startedAt,
    step_durations:g.step_durations,
    had_backtrack:g.had_backtrack,
    country:activeCountry,
    lang:lang,
  };
}

// ── Render each step ──────────────────────────────────────────────
function _guidedProgress(n){
  return `<div class="guided-progress">${[1,2,3,4].map(i=>`<div class="guided-progress-dot${i<=n?' filled':''}"></div>`).join('')}</div>`;
}
function _guidedHeader(n, qKey, subKey){
  return `<div class="guided-header">
    <div class="guided-step-indicator">${gt('guided_step', {n})}</div>
    ${_guidedProgress(n)}
    <h1 class="guided-question">${gt(qKey)}</h1>
    <div class="guided-subtitle">${gt(subKey)}</div>
  </div>`;
}
function _guidedNavBar(n, opts){
  opts = opts || {};
  const canContinue = opts.canContinue;
  const skip = opts.skip;
  const isLast = n === 4;
  return `<div class="guided-nav">
    <div class="guided-nav-left">
      ${n > 1 ? `<button class="btn btn-ghost" onclick="guidedGoToStep(${n-1})">${gt('guided_back')}</button>` : `<button class="guided-exit-btn" onclick="exitGuidedDiscovery()">${gt('guided_exit')}</button>`}
    </div>
    <div class="guided-nav-right">
      ${skip ? `<button class="guided-skip-btn" onclick="skipHorizon()">${gt('guided_skip')}</button>` : ''}
      <button class="btn btn-primary" onclick="guidedNext()" ${canContinue?'':'disabled'}>${gt('guided_continue')}</button>
    </div>
  </div>`;
}

function renderGuidedStep(n){
  if(n === 1) return _renderGuidedStep1();
  if(n === 2) return _renderGuidedStep2();
  if(n === 3) return _renderGuidedStep3();
  if(n === 4) return _renderGuidedStep4();
  renderGuidedResult();
}

function _renderGuidedStep1(){
  const g = st.guided;
  const options = GUIDED_USAGE_SCENES.map(o=>{
    const sel = g.usage_contexts.includes(o.v);
    return `<div class="guided-usage-option${sel?' selected':''}" onclick="toggleUsageScene('${o.v}')">
      <div class="guided-usage-icon">${o.icon}</div>
      <div class="guided-usage-title">${_gLabel(o)}</div>
      <div class="guided-usage-desc">${_gDesc(o)}</div>
    </div>`;
  }).join('');
  app.innerHTML = `<div class="card guided-container">
    ${_guidedHeader(1, 'guided_step1_q', 'guided_step1_sub')}
    <div class="guided-usage-grid">${options}</div>
    ${_guidedNavBar(1, {canContinue: g.usage_contexts.length === 2})}
  </div>`;
}

function _renderGuidedStep2(){
  const g = st.guided;
  const options = GUIDED_VISUAL_OPTIONS.map(o=>{
    const idx = g.visual_attractions.indexOf(o.v);
    const sel = idx >= 0;
    const badge = sel ? `<div class="guided-visual-order-badge">${idx+1}</div>` : '';
    // v40 : silhouettes premium en variante sombre (cards en fond sombre)
    const svg = silhouetteSVG(o.v, {dark: true});
    return `<div class="guided-visual-option${sel?' selected':''}" onclick="toggleVisualAttraction('${o.v}')">
      ${badge}
      ${svg}
      <div class="guided-visual-option-label">${_gLabel(o)}</div>
    </div>`;
  }).join('');
  app.innerHTML = `<div class="card guided-container">
    ${_guidedHeader(2, 'guided_step2_q', 'guided_step2_sub')}
    <div class="guided-visual-grid">${options}</div>
    ${_guidedNavBar(2, {canContinue: g.visual_attractions.length >= 2})}
  </div>`;
}

function _renderGuidedStep3(){
  const g = st.guided;
  const options = GUIDED_DILEMMA_OPTIONS.map(o=>{
    const sel = g.dilemma_answer === o.v;
    return `<div class="guided-dilemma-option${sel?' selected':''}" onclick="pickDilemma('${o.v}')">
      <div class="guided-dilemma-icon">${o.icon}</div>

        <div class="guided-dilemma-title">${_gLabel(o)}</div>
        <div class="guided-dilemma-desc">${_gDesc(o)}</div>

  }).join('');
  app.innerHTML = `<div class="card guided-container">

function renderGuidedResult(){
  const g = st.guided;
  const result = inferDriverFromGuided();
  g.inferred_driver = result.inferred;
  g.inference_result = result;

  const inferredLabel = gt('driver_label_' + result.inferred);
  const secondaryLabel = result.secondary ? gt('driver_label_' + result.secondary) : '';
  const signals = generateGuidedSignals();
  const signalsHtml = signals.map(s => `<li>${s}</li>`).join('');

  // P3: body inference preview. Compute and cache so user can see what body
  // types will be pre-applied when they accept.
  const inferredBody = inferBodyFromGuided();
  g.inferred_body = inferredBody;  // cached for acceptInferredDriver()
  const bodyBlock = (inferredBody && inferredBody.length > 0)
    ? `<div class="guided-result-body-block">
         <div class="guided-result-body-title">${gt('guided_body_inferred_title')}</div>
         <div class="guided-result-body-tags">${inferredBody.map(seg=>`<span class="body-tag">${gt('body_'+seg)}</span>`).join('')}</div>
       </div>`
    : '';

  app.innerHTML = `<div class="card">
    <div class="guided-result">
      <div class="guided-result-icon">🧭</div>
      <h1 class="guided-result-title">${gt('guided_result_title')}</h1>
      <div class="guided-result-profile">${inferredLabel}</div>
      <div class="guided-result-rationale">
        <div class="guided-result-rationale-title">${gt('guided_result_rationale_title')}</div>
        <ul>${signalsHtml}</ul>
      </div>
      ${bodyBlock}
      ${secondaryLabel ? `<div class="guided-result-secondary">${gt('guided_result_secondary_hint', {secondary: secondaryLabel})}</div>` : ''}
      <div class="guided-result-actions">

}

function filterCmpDropdown(query){

// ══════════════════════════════════════════════════════════════
// v54 + v59 (B1) : Sélecteur de comparaison en cascade
// 4 niveaux : marque → modèle (avec génération) → carburant → engine précis
//
// Utilise CatalogService quand la marque a des entrées _a1_processed=true
// (BMW en A1.1, Mercedes/VW/Audi en A1.2+...). Fallback DB legacy sinon
// (3 niveaux : marque → modèle → motorisation, comme v54).
// ══════════════════════════════════════════════════════════════

// v59: synthèse de fake-cars depuis le catalog v4 pour les marques A1-curées
// Format compat avec les cars DB legacy : id/name/brand/pt/newP/seg/co2_wltp/...
// Une fake-car = 1 (catalog_id × engine_id) avec config par défaut.
function _cmpSynthesizeCars() {
  if (typeof CatalogService === 'undefined' || !CatalogService.isLoaded()) return [];
  const out = [];
  const brands = CatalogService.listBrands();
  for (const brand of brands) {
    const groups = CatalogService.listModelsByBrand(brand);
    for (const grp of groups) {
      for (const entry of grp.generations) {
        if (!entry._a1_processed) continue; // skip auto-mapping non-curé
        const cid = entry.id;
        const fullEntry = CatalogService.getVehicle(cid);
        if (!fullEntry) continue;
        // Pour chaque engine distinct, prendre la 1ère config disponible (body+drivetrain par défaut)
        const seenEngines = new Set();
        for (const cfg of fullEntry.available_configs || []) {
          if (seenEngines.has(cfg.engine)) continue;
          seenEngines.add(cfg.engine);
          const eng = fullEntry.engines && fullEntry.engines[cfg.engine];
          if (!eng) continue;
          const priceObj = CatalogService.computePriceNew(cid, cfg.engine, cfg.body, cfg.drivetrain);
          const newP = priceObj && priceObj.price_eur ? priceObj.price_eur : null;
          if (newP == null) continue; // pas de prix → on saute (calculs TCO impossibles)
          const fakeCar = {
            id: cid + '__' + cfg.engine,
            name: fullEntry.canonical_name + ' ' + (eng.label || cfg.engine),
            brand: fullEntry.brand,
            pt: eng.powertrain || 'ice',
            seg: fullEntry.seg || [],
            newP: newP,
            co2_wltp: eng.co2_wltp != null ? eng.co2_wltp : 0,
            fuel_l_100: eng.fuel_l_100 != null ? eng.fuel_l_100 : 0,
            elec_wh_km: eng.elec_wh_km != null ? eng.elec_wh_km : 0,
            kwh: eng.battery_kwh != null ? eng.battery_kwh : 0,
            wltp_range_km: eng.wltp_range_km != null ? eng.wltp_range_km : 0,
            isHistorical: !entry.current_generation,
            // metadata catalog (pour debug et réversibilité)
            _from_catalog: true,
            _catalog_id: cid,
            _engine_id: cfg.engine,
            _default_body: cfg.body,
            _default_drivetrain: cfg.drivetrain,
            _generation_label: entry.generation_label || entry.generation,
            _engine_label: eng.label || cfg.engine,
            _model_family: entry.model_family,
          };
          out.push(fakeCar);
        }
      }
    }
  }
  return out;
}

// v59: source de cars pour le sélecteur compare = DB legacy + fake-cars catalog
// Utilisée uniquement par le compare (le garage et l'écran résultats restent sur DB).
function getAllCarsForCompare() {
  return [...getAllCarsForDropdown(), ..._cmpSynthesizeCars()];
}

// v59: une marque est "curée A1" si CatalogService a au moins une entrée _a1_processed=true
function _cmpIsBrandCurated(brand) {
  if (typeof CatalogService === 'undefined' || !CatalogService.isLoaded()) return false;
  const groups = CatalogService.listModelsByBrand(brand);
  for (const grp of groups) {
    for (const entry of grp.generations) {
      if (entry._a1_processed) return true;
    }
  }
  return false;
}

// Helpers : extraction de la liste des marques / modèles / motorisations
// v59 : union DB legacy + brands catalog (curés ou non), triés alphabétiquement
function _cmpBrandList() {
  const set = new Set();
  // Cars legacy DB
  getAllCarsForDropdown().forEach(c => { if (c.brand) set.add(c.brand); });
  // Brands catalog (couvre les marques A1-curées qui pourraient ne pas être en DB legacy)
  if (typeof CatalogService !== 'undefined' && CatalogService.isLoaded()) {
    CatalogService.listBrands().forEach(b => set.add(b));
  }
  return Array.from(set).sort();
}

// v54 fallback : extraction d'un modelKey à partir du car.name (DB legacy)
// Pour grouper "BMW Série 3" / "BMW 330e (2019-2022)" sous le même modèle
function _cmpModelKeyForCar(car) {
  if (!car || !car.name) return car && car.id;
  // v59 : si la car vient du catalog, le modelKey = catalog_id (groupe par génération)
  if (car._from_catalog && car._catalog_id) return car._catalog_id;
  // Sinon, ancienne logique regex
  let n = car.name.replace(/\s*\([^)]*\)\s*/g, '').trim();
  const blab = (typeof garageBrandLabel === 'function') ? garageBrandLabel(car.brand).toLowerCase() : car.brand;
  if (n.toLowerCase().startsWith(blab)) {
    n = n.substring(blab.length).trim();
  }
  n = n.replace(/\s+(Hybrid|PHEV|Electric|Diesel|RWD|Performance|Long Range)$/i, '').trim();
  return n || car.id;
}

// v59 : retourne les modèles d'une marque
// Si marque A1-curée → groupes catalog (1 entrée par génération avec generation_label distinct)
// Sinon → groupage DB legacy par regex (comme v54)
function _cmpModelsForBrand(brand) {
  if (!brand) return [];
  if (_cmpIsBrandCurated(brand)) {
    // Source : catalog v4 — on liste 1 entrée par catalog_id (= modèle+génération)
    const groups = CatalogService.listModelsByBrand(brand);
    const out = [];
    for (const grp of groups) {
      for (const entry of grp.generations) {
        if (!entry._a1_processed) continue; // ne montrer que les A1-curés
        // Label : "Série 3" si une seule génération, "Série 3 (G20)" sinon
        const sameGroupCount = grp.generations.filter(g => g._a1_processed).length;
        let label = entry.model_label || grp.label || entry.canonical_name;
        if (sameGroupCount > 1 && entry.generation_label) {
          label += ' (' + entry.generation_label + ')';
        }
        out.push({ key: entry.id, label: label, _catalogEntry: entry });
      }
    }
    return out.sort((a, b) => a.label.localeCompare(b.label));
  }
  // Fallback DB legacy
  const all = getAllCarsForDropdown().filter(c => c.brand === brand);
  const groups = {};
  all.forEach(car => {
    const key = _cmpModelKeyForCar(car);
    if (!groups[key]) groups[key] = { key, label: key, cars: [] };
    groups[key].cars.push(car);
  });
  return Object.values(groups).sort((a, b) => a.label.localeCompare(b.label));
}

// v59 : retourne les powertrains distincts disponibles pour un modèle
// Si modelKey est un catalog_id → engines.powertrain distincts ; sinon DB legacy
function _cmpFuelsForModel(brand, modelKey) {
  if (!brand || !modelKey) return [];
  if (_cmpIsBrandCurated(brand)) {
    const entry = CatalogService.getVehicle(modelKey);
    if (!entry || !entry.engines) return [];
    // Ne lister que les engines qui ont au moins 1 available_config (i.e. réellement vendus)
    const enginesWithConfigs = new Set();
    (entry.available_configs || []).forEach(cfg => enginesWithConfigs.add(cfg.engine));
    const ptSet = new Set();
    Object.entries(entry.engines).forEach(function(kv){
      const engId = kv[0], eng = kv[1];
      if (!enginesWithConfigs.has(engId)) return;
      if (eng.powertrain) ptSet.add(eng.powertrain);
    });
    return Array.from(ptSet);
  }
  // Fallback DB legacy
  const models = _cmpModelsForBrand(brand);
  const grp = models.find(m => m.key === modelKey);
  if (!grp || !grp.cars) return [];
  const ptSet = new Set();
  grp.cars.forEach(c => ptSet.add(c.pt));
  return Array.from(ptSet);
}

// v59 NOUVEAU : 4ème niveau cascade — engines précis pour un (catalog_id × powertrain)
// Retourne array de {engine_id, label, has_sport, ...}. Vide si marque non-A1.
function _cmpEnginesForModelFuel(brand, modelKey, pt) {
  if (!brand || !modelKey || !pt) return [];
  if (!_cmpIsBrandCurated(brand)) return [];
  const entry = CatalogService.getVehicle(modelKey);
  if (!entry || !entry.engines) return [];
  const enginesWithConfigs = new Set();
  (entry.available_configs || []).forEach(cfg => enginesWithConfigs.add(cfg.engine));
  const out = [];
  Object.entries(entry.engines).forEach(function(kv){
    const engId = kv[0], eng = kv[1];
    if (!enginesWithConfigs.has(engId)) return;
    if (eng.powertrain !== pt) return;
    out.push({
      engine_id: engId,
      label: eng.label || engId,
      sport_flag: !!eng.sport_flag,
      power_hp: eng.power_hp || null,
    });
  });
  // Sort : non-sport d'abord puis sport, et alpha sur label dans chaque catégorie
  out.sort(function(a, b){
    if (a.sport_flag !== b.sport_flag) return a.sport_flag ? 1 : -1;
    return a.label.localeCompare(b.label);
  });
  return out;
}

// État de la cascade (v59 : ajout _cmpEngine pour 4ème niveau)
let _cmpBrand = '';
let _cmpModelKey = '';
let _cmpPt = '';
let _cmpEngine = '';

// v59 : sélection finale → résout customCmpCar
// Si marque A1 → "${catalog_id}__${engine_id}" (cascade 4 niveaux requise)
// Sinon (DB legacy) → ancien comportement (3 niveaux : la car par brand+modelKey+pt)
function _cmpResolveCar() {
  const isA1 = _cmpIsBrandCurated(_cmpBrand);
  if (isA1) {
    if (!_cmpBrand || !_cmpModelKey || !_cmpPt || !_cmpEngine) {
      customCmpCar = null;
      return null;
    }
    customCmpCar = _cmpModelKey + '__' + _cmpEngine;
    // Vérification : la fake-car existe bien dans la liste compare
    const allC = getAllCarsForCompare();
    const found = allC.find(function(c){ return c.id === customCmpCar; });
    if (!found) {
      console.warn('[cmp] fake-car not found:', customCmpCar);
      customCmpCar = null;
      return null;
    }
    return found;
  }
  // Fallback DB legacy (cascade 3 niveaux)
  if (!_cmpBrand || !_cmpModelKey || !_cmpPt) {
    customCmpCar = null;
    return null;
  }
  const all = getAllCarsForDropdown().filter(c =>
    c.brand === _cmpBrand &&
    _cmpModelKeyForCar(c) === _cmpModelKey &&
    c.pt === _cmpPt
  );
  if (all.length === 0) {
    customCmpCar = null;
    return null;
  }
  const nonHist = all.filter(c => !c.isHistorical);
  const car = nonHist[0] || all[0];
  customCmpCar = car.id;
  return car;
}

// Handlers cascade (v59 : reset _cmpEngine sur changements amont, et auto-pick si une seule option)
function cmpOnBrandChange(b) {
  _cmpBrand = b;
  _cmpModelKey = '';
  _cmpPt = '';
  _cmpEngine = '';
  customCmpCar = null;
  const recCarId = _cmpRecCarId || '';
  const recAge = _cmpRecAge || 0;
  renderCustomCompare(recCarId, recAge);
}

function cmpOnModelChange(mk) {
  _cmpModelKey = mk;
  _cmpPt = '';
  _cmpEngine = '';
  customCmpCar = null;
  const fuels = _cmpFuelsForModel(_cmpBrand, mk);
  if (fuels.length === 1) {
    _cmpPt = fuels[0];
    // Si A1 + 1 seul engine pour ce powertrain → auto-pick aussi
    if (_cmpIsBrandCurated(_cmpBrand)) {
      const engines = _cmpEnginesForModelFuel(_cmpBrand, mk, _cmpPt);
      if (engines.length === 1) {
        _cmpEngine = engines[0].engine_id;
      }
    }
    _cmpResolveCar();
  }
  const recCarId = _cmpRecCarId || '';
  const recAge = _cmpRecAge || 0;
  renderCustomCompare(recCarId, recAge);
}

function cmpOnPtChange(pt) {
  _cmpPt = pt;
  _cmpEngine = '';
  customCmpCar = null;
  // Si A1 + 1 seul engine pour ce powertrain → auto-pick
  if (_cmpIsBrandCurated(_cmpBrand) && _cmpModelKey) {
    const engines = _cmpEnginesForModelFuel(_cmpBrand, _cmpModelKey, pt);
    if (engines.length === 1) {
      _cmpEngine = engines[0].engine_id;
    }
  }
  _cmpResolveCar();
  const recCarId = _cmpRecCarId || '';
  const recAge = _cmpRecAge || 0;
  renderCustomCompare(recCarId, recAge);
}

// v59 NOUVEAU : 4ème niveau cascade
function cmpOnEngineChange(eng) {
  _cmpEngine = eng;
  _cmpResolveCar();
  const recCarId = _cmpRecCarId || '';
  const recAge = _cmpRecAge || 0;
  renderCustomCompare(recCarId, recAge);
}

// Stockage du recCarId/recAge pour les handlers cascade
let _cmpRecCarId = null;
let _cmpRecAge = null;

function renderCustomCompare(recCarId, recAge){
  recAge = (recAge !== undefined && recAge !== null) ? recAge : 0;
  // Mémoriser pour les handlers cascade
  _cmpRecCarId = recCarId;
  _cmpRecAge = recAge;
  const wrap = document.getElementById('custom-compare-wrap');
  if(!wrap) return;

  // v54 : cascade brand → model → pt (style garage)
  const brands = _cmpBrandList();
  const fr = lang === 'fr';

  const brandOpts = '<option value="">' + (fr?'Choisir une marque…':'Choose a brand…') + '</option>' +
    brands.map(b => '<option value="'+b+'"' + (b===_cmpBrand?' selected':'') + '>' +
      (typeof garageBrandLabel === 'function' ? garageBrandLabel(b) : b) + '</option>').join('');

  let modelOpts = '<option value="">' + (fr?'Choisir un modèle…':'Choose a model…') + '</option>';
  if (_cmpBrand) {
    const models = _cmpModelsForBrand(_cmpBrand);
    modelOpts += models.map(m => '<option value="'+m.key+'"' +
      (m.key===_cmpModelKey?' selected':'') + '>' + m.label + '</option>').join('');
  }
  const modelDisabled = !_cmpBrand;

  let ptOpts = '<option value="">' + (fr?'Motorisation…':'Powertrain…') + '</option>';
  let ptDisabled = !_cmpModelKey;
  if (_cmpModelKey) {
    const fuels = _cmpFuelsForModel(_cmpBrand, _cmpModelKey);
    const ptLabel = {ice:fr?'⛽ Essence':'⛽ Petrol', die:fr?'⛽ Diesel':'⛽ Diesel',
                     hev:fr?'⚡ Hybride':'⚡ Hybrid', phev:fr?'🔌 Hybride rechargeable':'🔌 Plug-in hybrid',
                     bev:fr?'🔋 Électrique':'🔋 Electric'};
    ptOpts += fuels.map(p => '<option value="'+p+'"' +
      (p===_cmpPt?' selected':'') + '>' + (ptLabel[p]||p) + '</option>').join('');
  }

  // v59 (B1) : 4ème niveau cascade — engine précis, visible uniquement si marque A1-curée
  const isA1 = _cmpIsBrandCurated(_cmpBrand);
  let engineOpts = '<option value="">' + (fr?'Modèle précis…':'Specific engine…') + '</option>';
  let engineDisabled = !isA1 || !_cmpPt;
  if (isA1 && _cmpPt && _cmpModelKey) {
    const engines = _cmpEnginesForModelFuel(_cmpBrand, _cmpModelKey, _cmpPt);
    engineOpts += engines.map(function(e){
      const sportPrefix = e.sport_flag ? '🏁 ' : '';
      const hpSuffix = e.power_hp ? ' (' + e.power_hp + ' ch)' : '';
      return '<option value="'+e.engine_id+'"' +
        (e.engine_id===_cmpEngine?' selected':'') + '>' +
        sportPrefix + e.label + hpSuffix + '</option>';
    }).join('');
  }

  const ages = [0,1,2,3,5];
  const ageBtns = ages.map(function(a){
    const lbl = a===0?(lang==='fr'?'Neuf':'New'):(a+' '+(lang==='fr'?'an':'yr'));
    const active = customCmpAge===a?' active':'';
    return '<button class="age-toggle-btn'+active+'" onclick="customCmpAge='+a+';renderCustomCompare(\''+recCarId+'\','+recAge+')">'+lbl+'</button>';
  }).join('');

  // Comparison table
  let tableHtml = '';
  let verdictHtml = '';

  if(customCmpCar){
    // v59 (B1) : utiliser getAllCarsForCompare() pour trouver aussi les fake-cars catalog
    const allC = getAllCarsForCompare();
    const recCar = allC.find(function(c){return c.id===recCarId;});
    const userCar = allC.find(function(c){return c.id===customCmpCar;});
    if(recCar && userCar){
      const km = getKm();
      const recTco = calcTCO(recCar.pt, recCar.newP, recCar.brand, recAge, km);
      const userTco = calcTCO(userCar.pt, userCar.newP, userCar.brand, customCmpAge, km);
      const recPurchP = purchAtAge(recCar, recAge);
      const recInc = incForCar(recCar, recAge);
      const userPurchP = purchAtAge(userCar, customCmpAge);
      const userInc = incForCar(userCar, customCmpAge);
      const diff = Math.round(userTco.mo - recTco.mo);
      const diff5y = Math.round(Math.abs(diff)*60);

      function cmpRow(label, recVal, userVal, lowerIsBetter){
        if(lowerIsBetter===undefined) lowerIsBetter=true;
        const recN = Math.round(recVal);
        const userN = Math.round(userVal);
        const recBetter = lowerIsBetter ? recN <= userN : recN >= userN;
        const recNote = recBetter && recN !== userN ? '<span class="cmp-better">✓ '+E(Math.abs(recN-userN))+' moins</span>' : '';
        const userNote = !recBetter && recN !== userN ? '<span class="cmp-worse">✗ +'+E(Math.abs(recN-userN))+'</span>' : '';
        return '<tr><td class="label-col">'+label+'</td><td class="val-col rec-val">'+E(recN)+recNote+'</td><td class="val-col user-val">'+E(userN)+userNote+'</td></tr>';
      }

      const recAgeLabel = recAge===0?(lang==='fr'?'Neuf':'New'):(recAge+(lang==='fr'?' an':' yr'));
      const userAgeLabel = customCmpAge===0?(lang==='fr'?'Neuf':'New'):(customCmpAge+(lang==='fr'?' an':' yr'));
      const recRelBadge = relLabel(recCar.brand,recCar.pt,recCar.id);
      const userRelBadge = relLabel(userCar.brand, userCar.pt);

      const recPriceCell = E(recPurchP-recInc)+(recInc>0?'<span style="font-size:10px;color:var(--teal)"> (bonus -'+E(recInc)+')</span>':'');
      const userPriceCell = E(userPurchP-userInc)+(userInc>0?'<span style="font-size:10px;color:var(--teal)"> (bonus -'+E(userInc)+')</span>':'');

      const depLabel = lang==='fr'?'Dépréciation / an':'Depreciation / year';
      const fuelLabel = lang==='fr'?'Carburant / an':'Fuel / year';
      const maintLabel = lang==='fr'?'Entretien / an':'Maintenance / year';
      const repLabel = lang==='fr'?'Réparations / an':'Repairs / year';
      const relLabel2 = lang==='fr'?'Fiabilité':'Reliability';
      const totalLabel = lang==='fr'?'Budget mensuel':lang==='de'?'Monatsbudget':lang==='nl'?'Maandbudget':lang==='es'?'Presupuesto mensual':lang==='it'?'Budget mensile':'Monthly budget';
      const purchLabel = lang==='fr'?'Prix achat':'Purchase price';

      tableHtml = '<div style="overflow-x:auto;-webkit-overflow-scrolling:touch">'
        +'<table class="cmp-table" style="min-width:300px">'
        +'<thead><tr>'
        +'<th style="background:var(--bg);color:var(--muted);text-align:left;font-size:11px">'+( lang==='fr'?'Ligne de coût':'Cost line')+'</th>'
        +'<th class="rec-col">📌 '+recCar.name+'<br><span style="font-weight:400;font-size:10px">'+recAgeLabel+' · <span class="'+recRelBadge.cls+'">'+recRelBadge.txt+'</span></span></th>'
        +'<th class="user-col">🔍 '+userCar.name+'<br><span style="font-weight:400;font-size:10px">'+userAgeLabel+' · <span class="'+userRelBadge.cls+'">'+userRelBadge.txt+'</span></span></th>'
        +'</tr></thead><tbody>'
        +'<tr><td class="label-col">'+purchLabel+'</td><td class="val-col rec-val">'+recPriceCell+'</td><td class="val-col user-val">'+userPriceCell+'</td></tr>'
        +cmpRow(depLabel, recTco.depr5/5, userTco.depr5/5)
        +cmpRow(fuelLabel, recTco.yf, userTco.yf)
        +cmpRow(maintLabel, recTco.maint, userTco.maint)
        +cmpRow(repLabel, recTco.rep, userTco.rep)
        +'<tr><td class="label-col">'+relLabel2+'</td>'
        +'<td class="val-col rec-val" style="font-size:11px"><span class="'+recRelBadge.cls+'">'+recRelBadge.stars+' '+recRelBadge.txt+'</span></td>'
        +'<td class="val-col user-val" style="font-size:11px"><span class="'+userRelBadge.cls+'">'+userRelBadge.stars+' '+userRelBadge.txt+'</span></td></tr>'
        +'<tr class="cmp-total-row">'
        +'<td class="label-col" style="font-weight:500">'+totalLabel+'</td>'
        +'<td class="val-col rec-val">'+E(Math.round(recTco.mo))+'/mois</td>'
        +'<td class="val-col user-val">'+E(Math.round(userTco.mo))+'/mois</td>'
        +'</tr></tbody></table></div>';

      if(Math.abs(diff) < 15){
        verdictHtml = '<div class="cmp-verdict equal">'+(lang==='fr'?'Coûts équivalents — le choix dépend de vos préférences.':'Equivalent costs — choose based on your preferences.')+'</div>';
      } else if(diff > 0){
        verdictHtml = '<div class="cmp-verdict worse">'
          +(lang==='fr'
            ?(userCar.name+' coûte <strong>'+E(diff)+'/mois</strong> de plus — soit <strong>'+E(diff5y)+'</strong> sur 5 ans.')
            :(userCar.name+' costs <strong>'+E(diff)+'/month</strong> more — <strong>'+E(diff5y)+'</strong> over 5 years.'))
          +'</div>';
      } else {
        verdictHtml = '<div class="cmp-verdict better">'
          +(lang==='fr'
            ?(userCar.name+' coûte <strong>'+E(Math.abs(diff))+'/mois</strong> de moins — <strong>'+E(diff5y)+'</strong> économisés sur 5 ans.')
            :(userCar.name+' costs <strong>'+E(Math.abs(diff))+'/month</strong> less — <strong>'+E(diff5y)+'</strong> saved over 5 years.'))
          +'</div>';
      }
    }
  }

  const titleTxt = lang==='fr'?'Comparer avec un autre modèle':'Compare with another model';
  const subTxt = lang==='fr'?'Sélectionnez un modèle, étape par étape.':'Select a model, step by step.';
  const ageLbl = lang==='fr'?'Âge du modèle à comparer :':'Age of model to compare:';

  let ageSec = '';
  if(customCmpCar){
    ageSec = '<div style="margin-top:14px"><div style="font-size:12px;font-weight:500;color:var(--muted);margin-bottom:8px">'+ageLbl+'</div>'
      +'<div class="age-toggle-row">'+ageBtns+'</div></div>';
  }

  // v54 : 3 selects en cascade marque / modèle / motorisation
  const cascadeStyle = 'width:100%;box-sizing:border-box;padding:12px 14px;border:1.5px solid var(--border);border-radius:11px;font-size:14px;font-family:var(--font-b);background:#fff;color:var(--ink);outline:none;margin-bottom:10px;cursor:pointer;transition:border-color .15s';
  const cascadeStyleDisabled = cascadeStyle + ';opacity:0.5;cursor:not-allowed;background:var(--bg)';

  const labelStyle = 'font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);margin-bottom:4px;display:block';

  wrap.innerHTML = '<div class="custom-compare">'
    +'<div class="custom-compare-title">'+titleTxt+'</div>'
    +'<div class="custom-compare-sub">'+subTxt+'</div>'

    +'<div style="margin-top:14px">'

    // Étape 1 : Marque
    +'<label style="'+labelStyle+'">'+(fr?'1. Marque':'1. Brand')+'</label>'
    +'<select id="cmp-cascade-brand" style="'+cascadeStyle+'"'
    +' onchange="cmpOnBrandChange(this.value)">'
    +brandOpts
    +'</select>'

    // Étape 2 : Modèle
    +'<label style="'+labelStyle+'">'+(fr?'2. Modèle':'2. Model')+'</label>'
    +'<select id="cmp-cascade-model"'
    + (modelDisabled?' disabled':'')
    +' style="'+(modelDisabled?cascadeStyleDisabled:cascadeStyle)+'"'
    +' onchange="cmpOnModelChange(this.value)">'
    +modelOpts
    +'</select>'

    // Étape 3 : Motorisation
    +'<label style="'+labelStyle+'">'+(fr?'3. Motorisation':'3. Powertrain')+'</label>'
    +'<select id="cmp-cascade-pt"'
    + (ptDisabled?' disabled':'')
    +' style="'+(ptDisabled?cascadeStyleDisabled:cascadeStyle)+'"'
    +' onchange="cmpOnPtChange(this.value)">'
    +ptOpts
    +'</select>'

    // Étape 4 (v59 B1) : Engine précis — affiché uniquement si la marque est A1-curée
    + (isA1 ?
        ('<label style="'+labelStyle+'">'+(fr?'4. Modèle précis':'4. Specific engine')+'</label>'
        +'<select id="cmp-cascade-engine"'
        + (engineDisabled?' disabled':'')
        +' style="'+(engineDisabled?cascadeStyleDisabled:cascadeStyle)+'"'
        +' onchange="cmpOnEngineChange(this.value)">'
        +engineOpts
        +'</select>')
        : '')

    +ageSec
    +'</div>'
    +tableHtml
    +verdictHtml
    +'</div>';
}


function renderSelectedCarKPI(){
  const wrap=document.getElementById('selected-car-kpi');
  if(!wrap||!selectedCar) return;
  curveKm=getKm();
  const {car,age}=selectedCar;
  const tco=calcTCO(car.pt,car.newP,car.brand,age,getKm());
  const pp=purchAtAge(car,age),inc=incForCar(car,age),net=pp-inc;
  const rl=relLabel(car.brand,car.pt,car.id);
  const ptN={ice:t('ice_n'),hev:t('hev_n'),phev:t('phev_n'),bev:t('bev_n'),die:lang==='fr'?'Diesel':'Diesel'};
    const orig=carOrigin(car.brand);
  const ageLabel=age===0?(lang==='fr'?'Neuf':'New'):`${age}${lang==='fr'?' an':' yr'}`;
  const histBadge=car.isHistorical?`<span class="hist-badge">Gén. ${car.genYear}</span>`:'';
  const tripC=Math.round(fuelCost(car.pt,st.trips||'mixed',500));
  const phevBoth=car.pt==='phev'?phevFuelBoth(getKm()):null;
  const tripLabel=lang==='fr'?'Paris → Marseille':'Paris → Marseille';
  const kpiItems=[
    [lang==='fr'?'Dépréciation / an':'Depreciation / yr', E(Math.round(tco.depr5/5)), false],
    ...(car.pt==='phev'?[
      // PHEV: show both scenarios — transparency first
      // PHEV: show current scenario + comparison with alternatives
      (()=>{
        const pb=phevFuelBoth(getKm());
        const curLabel=pb.isCharged?(lang==='fr'?'🔌 Carburant (branché)':'🔌 Fuel (charged)'):
                       pb.isPartial?(lang==='fr'?'🔋 Carburant (partiellement branché)':'🔋 Fuel (partial charge)'):
                                    (lang==='fr'?'⛽ Carburant (non branché)':'⛽ Fuel (uncharged)');
        const curVal=E(pb.current);
        const altLabel=pb.isCharged?
          (lang==='fr'?`⛽ Si non branché`:`⛽ If uncharged`):
          (lang==='fr'?`🔌 Si recharge quotidienne`:`🔌 If daily charged`);
        const altVal=pb.isCharged?
          E(pb.uncharged)+` (×${(pb.uncharged/pb.charged).toFixed(1)})`:
          E(pb.charged);
        return [[curLabel, curVal+'/an', false],[altLabel,`<span style="color:var(--muted);font-size:11px">${altVal}/an</span>`,false]];
      })().flat(1),
    ]:[
      [lang==='fr'?'Carburant / an':'Fuel / yr', E(Math.round(tco.yf)), false],
    ]),
    [lang==='fr'?'Entretien / an':'Maintenance / yr', E(tco.maint), false],
    [lang==='fr'?'Réparations / an'+(st.dept?' (local)':''):'Repairs / yr', E(tco.rep), false],
    [lang==='fr'?'Fiabilité marque':'Brand reliability', rl.stars+' '+rl.txt, false],
    [tripLabel+' (aller)',
      car.pt==='phev'
        ?`${lang==='fr'?'🔌 branché':'🔌 charged'}: ${E(Math.round(fuelCost('phev',st.trips||'mixed',500)*0.4))} / ${lang==='fr'?'⛽ non branché':'⛽ uncharged'}: ${E(tripC)}`
        :E(tripC)+' énergie', false],
    ...(calcAnnualTax(car,net,age)>0?[[
      lang==='fr'?'🏛 Taxes véhicule / an':lang==='de'?'🏛 Kfz-Steuer / J':lang==='nl'?'🏛 Wegenbelasting / j':lang==='es'?'🏛 IVTM / año':lang==='it'?'🏛 Bollo auto / a':'🏛 Vehicle tax / yr',
      E(calcAnnualTax(car,net,age)),
      false
    ]]:[]),
    [lang==='fr'?'🛡 Assurance / an':lang==='de'?'🛡 Versicherung / J':lang==='nl'?'🛡 Verzekering / j':lang==='es'?'🛡 Seguro / año':lang==='it'?'🛡 Assicurazione / a':'🛡 Insurance / yr',
      (()=>{
        const insEst = calcInsurance(car, net, age);
        const pct = Math.min(100, Math.max(5, (insEst - 400) / (2500 - 400) * 100));
        const clr = insEst < 700 ? 'var(--teal)' : insEst < 1200 ? 'var(--amber)' : '#e74c3c';
        const lvl = insEst < 700 ? (lang==='fr'?'Économique':'Low') : insEst < 1200 ? (lang==='fr'?'Modérée':'Medium') : (lang==='fr'?'Élevée':'High');
        const profil = st.age ? ' · '+{u30:lang==='fr'?'<30 ans':'<30 yrs',30:'30-45',45:'45-60',60:lang==='fr'?'>60 ans':'>60 yrs'}[st.age] : '';
        return `${E(insEst)} <span style="font-size:10px;color:${clr}">${lvl}${profil}</span>
                <div style="height:3px;background:var(--border);border-radius:2px;margin-top:3px;overflow:hidden"><div style="height:100%;width:${pct.toFixed(0)}%;background:${clr};border-radius:2px"></div></div>`;
      })(), false],
    [lang==='fr'?'Budget mensuel':lang==='de'?'Monatsbudget':lang==='nl'?'Maandbudget':lang==='es'?'Presupuesto mensual':lang==='it'?'Budget mensile':'Monthly budget', E(Math.round(tco.mo + calcInsurance(car,net,age)/12))+'/mois', true],

    <div class="sel-car-header">
      <div>
        <div style="font-size:11px;font-weight:500;color:var(--teal);text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px">${lang==='fr'?'Modèle sélectionné':'Selected model'} · ${ageLabel}</div>
        <div class="sel-car-name">${car.name}${histBadge}</div>

        </div>
      </div>
      <div class="sel-car-price">
        <div style="font-size:11px;color:var(--muted)">${lang==='fr'?"Prix d'achat":'Purchase price'}</div>

function setBcPtFilter(colIdx, pt){mpTrack('filter_pt',{pt_filter:pt,col:colIdx});
  bcPtFilters[colIdx] = bcPtFilters[colIdx]===pt ? null : pt;
  // Re-render just the models section of this column
  const col = document.getElementById(`bc-col-${colIdx}`);
  if(!col) return;
  const modelsDiv = col.querySelector('.bc-models');
  const filterDiv = col.querySelector('.bc-pt-filter-row');
  if(!modelsDiv) return;
  // Re-filter cars
  const scData = window._scRes?.[colIdx];
  if(!scData) return;
  // Use allCars (full list) not cars (top 3 only) for PT filtering
  const pool = scData.allCars || scData.cars;
  const ptGroups={bev:[1.0, 0.882, 0.769, 0.659, 0.57, 0.519, 0.473, 0.432, 0.395, 0.362, 0.332],xhev:['hev','phev'],ice:[1.0, 0.829, 0.732, 0.687, 0.61, 0.568, 0.53, 0.496, 0.465, 0.437, 0.412]};
  const activePts = bcPtFilters[colIdx] ? (ptGroups[bcPtFilters[colIdx]]||[bcPtFilters[colIdx]]) : null;
  const filtered = activePts
    ? pool.filter(car=>activePts.includes(car.pt))
    : pool;
  const km = getKm();
  // If filter returns nothing → widen budget to find cars of this PT
  let display = filtered;
  let showingFallback = false;
  if(filtered.length === 0 && activePts !== null){
    // Search wider: +50% budget, no segment filter
    const widerPool = carsForBudget(Math.round(st.budget*1.5), scData.age, null, [], [])
      .filter(car=>activePts.includes(car.pt));
    display = widerPool.length > 0 ? widerPool : pool;
    showingFallback = true;
  }
  modelsDiv.innerHTML = (showingFallback 
    ? `<div style="font-size:10px;color:var(--muted);padding:4px 8px;font-style:italic">${lang==='fr'?'Aucun modèle dans ce groupe — meilleurs disponibles :':'No model in this group — best available:'}</div>`
    : '') + display.slice(0,3).map((car,ci)=>{
    const age=scData.age;
    return bcCarHtml(car,age,ci===0);
  }).join('')||`<div style="font-size:11px;color:var(--faint);padding:8px">${t('no_car_found')}</div>`;
  // Update chip active states
  if(filterDiv){
    filterDiv.querySelectorAll('.bc-pt-chip').forEach(chip=>{
      chip.classList.toggle('active', chip.dataset.pt===bcPtFilters[colIdx]);
    });
  }
}

function selectCar(carId,age){
  const allCars=getAllCarsForDropdown();
  const car=allCars.filter(x=>x&&x.id).find(x=>x.id===carId);
  if(!car) return;
  selectedCar={car,age};
  document.querySelectorAll('.bc-model-item').forEach(el=>el.classList.remove('car-selected'));
  const uid=carId+'_'+age;
  document.querySelectorAll('[data-uid="'+uid+'"]').forEach(el=>el.classList.add('car-selected'));
  renderSelectedCarKPI();
}



function bcCarHtml(car,age,isTop){
  if(!car)return`<div style="font-size:11px;color:var(--faint);padding:8px 0">${t('no_car_found')}</div>`;
  const pp=purchAtAge(car,age),inc=incForCar(car,age),net=pp-inc;
  const km=getKm();const tco=calcTCO(car.pt,car.newP,car.brand||'renault',age,km);
  const mo=tco.mo;
  const ptN={ice:t('ice_n'),hev:t('hev_n'),phev:t('phev_n'),bev:t('bev_n'),die:lang==='fr'?'Diesel':'Diesel'};
  const phevBoth=car.pt==='phev'?phevFuelBoth(getKm()):null;
  const maxMo=Math.max(...(window._scRes||[{mo:500}]).map(s=>s.mo||0))||1;
  const pct=Math.round(mo/maxMo*100);
  const ptC={ice:'#B4B2A9',hev:'var(--teal-md)',phev:'#E9921A',bev:'var(--blue)',die:'#8B6914'};
  const priceStr=age===0?(inc>0?`${E(pp)} → <strong style="color:var(--teal)">${E(net)}</strong>`:E(pp)):`${E(pp)} <span style="color:var(--faint);font-size:10px">(neuf ${E(car.newP)})</span>`;
  const pts=(lang==='fr'?car.pf:car.pe).slice(0,2).map(p=>`<div style="font-size:11px;color:var(--muted);display:flex;gap:4px"><span style="color:var(--teal)">✓</span>${p}</div>`).join('');
  const rl=relLabel(car.brand,car.pt,car.id);
  const uid=car.id+'_'+age;
  return`<div class="bc-model-item clickable" data-uid="${uid}" onclick="selectCar('${car.id}',${age})">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
      <div style="flex:1;min-width:0">
        <div style="display:flex;gap:5px;align-items:center;flex-wrap:wrap;margin-bottom:3px">
          <div class="bc-badge badge-teal-sm">${ptN[car.pt]}</div>
          <span class="rel-badge ${rl.cls}">${rl.txt}</span>
          ${car.pt==='die'?`<span style="background:#c0392b;color:#fff;font-size:9px;padding:1px 5px;border-radius:4px;font-weight:500">⚠ ZFE</span>`:''}
        </div>
        <div class="bc-model-name" style="font-size:14px;font-weight:600;margin-bottom:2px">${car.name}</div>
        <div class="bc-model-price">${priceStr}</div>
        ${car._widened?`<div style="font-size:9px;color:var(--muted);font-style:italic;margin-top:2px">Fourchette élargie — aucun modèle dans votre tranche</div>`:''}
      </div>
      <div style="flex-shrink:0;text-align:center;background:var(--teal-pal);border-radius:10px;padding:8px 10px;border:1.5px solid var(--teal-lt);min-width:64px">
        <div style="font-size:22px;font-family:var(--font-d);color:var(--teal);line-height:1;white-space:nowrap">${E(calcMonthlyTotal(car,age))}</div>
        <div style="font-size:10px;color:var(--teal-md);font-weight:600;margin-top:1px">${lang==='fr'?'/mois':lang==='de'?'/Monat':lang==='nl'?'/maand':lang==='es'?'/mes':lang==='it'?'/mese':'/mo'}</div>
        <div style="font-size:9px;color:var(--muted);font-weight:500">tout compris</div>
      </div>
    </div>
    ${car.pt==='phev'&&phevBoth?`<div style="font-size:10px;background:#FFF9C4;border-radius:5px;padding:3px 8px;margin:4px 0;line-height:1.6">${(()=>{
      const yf=tco.yf;
      const moCharged=Math.round(mo+(phevBoth.charged-yf)/12);
      const moUncharged=Math.round(mo+(phevBoth.uncharged-yf)/12);
      const lPrise=lang==='fr'?'🔌 Avec prise':lang==='de'?'🔌 Mit Stecker':'🔌 Home socket';
      const lSans=lang==='fr'?'⛽ Sans recharge':lang==='de'?'⛽ Ohne Laden':'⛽ No charge';
      if(phevBoth.isCharged)return`<span style="color:var(--teal);font-weight:600">${lPrise}: ${E(moCharged)}/mois</span> · ${lSans}: ~${E(moUncharged)}/mois`;
      return`${lSans}: <strong>${E(moUncharged)}/mois</strong> · ${lPrise}: ~${E(moCharged)}/mois`;
    })()}</div>`:''}
    ${pts}
    <div class="bc-monthly-bar" style="margin-top:6px"><div class="bc-monthly-fill" style="width:${pct}%;background:${ptC[car.pt]}"></div></div>
    <div style="text-align:right;margin-top:5px">
      <div style="font-size:10px;color:var(--teal)">${lang==='fr'?'Voir détail →':lang==='de'?'Details →':lang==='es'?'Ver detalle →':lang==='it'?'Dettagli →':'Details →'}</div>
    </div>
  </div>`;
}

// Toggle the whole refine panel open/closed.
function toggleRefinePanel(){
  const btn = document.getElementById('btn-refine');
  const panel = document.getElementById('refine-panel');
  if(!btn || !panel) return;
  const isOpen = panel.style.display === 'block';
  panel.style.display = isOpen ? 'none' : 'block';
  btn.classList.toggle('open', !isOpen);
  if(!isOpen) mpTrack('refine_panel_opened', {});
}

// Toggle a single refine section.
function toggleRefineSection(sectionId){
  const el = document.getElementById(sectionId);
  if(!el) return;
  el.classList.toggle('open');
}

// Apply the choice for section 1 (style).
function pickRefineStyle(val){
  st.style_preference = (st.style_preference === val) ? null : val;
  mpTrack('refine_style_selected', {style: st.style_preference});
  updateRefinePanel();
  recomputeResultsAfterRefine();
}

// Apply the choice for section 2 (age/equipment).
function pickRefineAgeTradeoff(val){
  st.age_equip_tradeoff = val;
  mpTrack('refine_age_tradeoff', {tradeoff: val});
  updateRefinePanel();
  recomputeResultsAfterRefine();
}

// Toggle a brand between neutral / favorite / excluded.
// Clicking the same button twice removes the status (back to neutral).
function toggleBrandPref(brand, kind){
  st.brand_prefs = st.brand_prefs || {favorites:[], excluded:[]};
  const fav = st.brand_prefs.favorites, exc = st.brand_prefs.excluded;
  // Remove from the other list if present
  if(kind === 'favorite'){
    const iE = exc.indexOf(brand); if(iE>=0) exc.splice(iE,1);
    const iF = fav.indexOf(brand);
    if(iF>=0) fav.splice(iF,1); else fav.push(brand);
  } else if(kind === 'exclude'){
    const iF = fav.indexOf(brand); if(iF>=0) fav.splice(iF,1);
    const iE = exc.indexOf(brand);
    if(iE>=0) exc.splice(iE,1); else exc.push(brand);
  }
  mpTrack('refine_brand_prefs', {
    favorites_count: fav.length,
    excluded_count: exc.length,
  });
  updateRefinePanel();
  recomputeResultsAfterRefine();
}

// Toggle a required feature. FIFO eviction at max 3.
function toggleRequiredFeature(val){
  st.required_features = st.required_features || [];
  const idx = st.required_features.indexOf(val);
  if(idx >= 0){
    st.required_features.splice(idx, 1);
  } else {
    if(st.required_features.length >= 3){
      st.required_features.shift(); // FIFO
      const note = document.getElementById('refine-features-note');
      if(note){ note.textContent = rt('features_max_reached'); setTimeout(()=>{if(note)note.textContent=''},3000); }
    }
    st.required_features.push(val);
  }
  mpTrack('refine_required_features', {features: [...st.required_features]});
  updateRefinePanel();
  recomputeResultsAfterRefine();
}

// Physical constraints — plain input onchange.
function setPhysicalConstraint(dim, value){
  st.physical_constraints = st.physical_constraints || {};
  const n = parseInt(value, 10);
  st.physical_constraints['max_'+dim+'_cm'] = (isNaN(n) || n <= 0) ? null : n;
  mpTrack('refine_physical_constraints', {
    has_length: !!st.physical_constraints.max_length_cm,
    has_width:  !!st.physical_constraints.max_width_cm,
    has_height: !!st.physical_constraints.max_height_cm,
  });
  updateRefinePanel();
  recomputeResultsAfterRefine();
}

// Recompute results columns after any refinement change.
// Re-runs renderResults() with fade animation.
function recomputeResultsAfterRefine(){
  saveSession();
  // Subtle toast
  const toast = document.getElementById('refine-toast') || (()=>{ const t=document.createElement('div'); t.id='refine-toast'; t.className='refine-updated-toast'; document.body.appendChild(t); return t; })();
  toast.textContent = rt('refine_updated');
  toast.classList.add('show');
  setTimeout(()=>toast.classList.remove('show'), 1800);
  // Re-render the full results page. We preserve the open state of the refine panel.
  const panelWasOpen = document.getElementById('refine-panel') && document.getElementById('refine-panel').style.display === 'block';
  renderResults();
  if(panelWasOpen){
    setTimeout(()=>{
      const p = document.getElementById('refine-panel');
      const b = document.getElementById('btn-refine');
      if(p) p.style.display = 'block';
      if(b) b.classList.add('open');
    }, 30);
  }
}

// Re-render the refine panel body in place (no full re-render of results).
function updateRefinePanel(){
  const host = document.getElementById('refine-panel');
  if(!host) return;
  host.innerHTML = renderRefinePanelBody();
}

// Build list of brands to offer for tri-state preferences.
// Source = brands currently present in DB (deduplicated, sorted).
function getRefineBrandList(){
  const seen = new Set();
  const pool = (typeof DB !== 'undefined' ? DB : []).concat(typeof DB_HIST!=='undefined'?DB_HIST:[]);
  pool.forEach(c=>{ if(c && c.brand) seen.add(c.brand); });
  return Array.from(seen).sort();
}
