name: CarPIQ — Scrape CH Occasion

on:
  schedule:
    # Rotation mensuelle — semaine 1 : occasion CH
    # Lundi à 22h00 CET (21h00 UTC)
    - cron: '0 21 1-7 * 1'   # Premier lundi du mois
  workflow_dispatch:          # Lancement manuel possible

jobs:

  # ── Job 1 : VAG (VW, Audi, Skoda, Seat, Cupra, Porsche) ──────────────────
  scrape-vag:
    name: VAG Group
    runs-on: ubuntu-latest
    timeout-minutes: 340   # < 6h
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Chrome
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update -q
          sudo apt-get install -y google-chrome-stable

      - name: Install dependencies
        run: pip install selenium webdriver-manager

      - name: Restore existing prices
        run: |
          git pull origin main --rebase || true

      - name: Scrape VAG
        run: |
          python3 carpiq_price_scraper_v6.py --country ch --brand vw --output prices_v6.json
          python3 carpiq_price_scraper_v6.py --country ch --brand audi --output prices_v6.json
          python3 carpiq_price_scraper_v6.py --country ch --brand skoda --output prices_v6.json
          python3 carpiq_price_scraper_v6.py --country ch --brand seat --output prices_v6.json
          python3 carpiq_price_scraper_v6.py --country ch --brand cupra --output prices_v6.json
          python3 carpiq_price_scraper_v6.py --country ch --brand porsche --output prices_v6.json

      - name: Commit results
        run: |
          git config user.name "CarPIQ Bot"
          git config user.email "bot@carpiq.eu"
          git add prices_v6.json
          git diff --staged --quiet || git commit -m "🤖 Scrape CH occasion — VAG [$(date +%Y-%m-%d)]"
          git push

  # ── Job 2 : Premium allemand (BMW, Mercedes) ──────────────────────────────
  scrape-premium:
    name: Premium DE
    runs-on: ubuntu-latest
    timeout-minutes: 340
    needs: scrape-vag   # Attend que VAG soit terminé (évite conflits git)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Chrome
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update -q
          sudo apt-get install -y google-chrome-stable
      - run: pip install selenium webdriver-manager
      - run: git pull origin main --rebase || true

      - name: Scrape Premium
        run: |
          python3 carpiq_price_scraper_v6.py --country ch --brand bmw --output prices_v6.json
          python3 carpiq_price_scraper_v6.py --country ch --brand mercedes --output prices_v6.json

      - name: Commit results
        run: |
          git config user.name "CarPIQ Bot"
          git config user.email "bot@carpiq.eu"
          git add prices_v6.json
          git diff --staged --quiet || git commit -m "🤖 Scrape CH occasion — Premium [$(date +%Y-%m-%d)]"
          git push

  # ── Job 3 : Français + Japonais ───────────────────────────────────────────
